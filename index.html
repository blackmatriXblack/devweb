<tr><td>SwiftUI View</td><td><code>struct MyView: View { var body: some View { Text(&quot;Hello&quot;) } }</code></td><td>Build UI via @ViewBuilder body property; modifiers: .padding(), .background(), .cornerRadius(), .onAppear, .onTapGesture</td></tr><tr><td>CLLocationManager</td><td><code>CLLocationManager().requestWhenInUseAuthorization() / .startUpdatingLocation()</code></td><td>GPS, WiFi, and cellular location; configure desiredAccuracy, distanceFilter, activityType; delegate receives didUpdateLocations and didFailWithError</td></tr><tr><td>WKWebView</td><td><code>WKWebView(frame:, configuration:) / .load(URLRequest(url:))</code></td><td>Embed web content with WKWebViewConfiguration for JavaScript, cookies, processPool</td></tr></table><h3>Build &amp; Package APIs</h3><ul><li><code>Xcode Build System</code> — xcodebuild CLI: <code>xcodebuild -project App.xcodeproj -scheme App -sdk iphoneos -configuration Release archive</code></li><li><code>XCFramework</code> — Binary framework for multiple platforms: <code>xcodebuild -create-xcframework -framework ios.framework -framework ios_sim.framework -output Combined.xcframework</code></li><li><code>SPM (Swift Package Manager)</code> — <code>swift package init --type executable</code>, Package.swift manifest with dependencies, targets, products</li><li><code>App Store Connect API</code> — REST API: <code>POST /api/v1/apps</code> (create app), <code>POST /api/v1/builds</code> (upload), token-based authentication with JWT</li><li><code>Code Signing</code> — <code>codesign -s &quot;Apple Distribution: Team&quot; --entitlements App.entitlements App.app</code>, <code>security find-identity -v -p codesigning</code></li><li><code>TestFlight</code> — Beta distribution: <code>altool --upload-app -f App.ipa -u user@apple.com</code>, internal/external tester groups</li></ul><h3>Platform-Specific APIs</h3><table><tr><th>Framework</th><th>API Examples</th><th>Capability</th></tr><tr><td>CoreML</td><td><code>MLModel(contentsOf: url).prediction(from: input)</code></td><td>On-device ML inference (Vision, Natural Language, Sound Analysis, Create ML models)</td></tr><tr><td>ARKit</td><td><code>ARSession.run(configuration:) / ARSCNView / ARWorldMap</code></td><td>Augmented reality with 6DOF tracking, scene understanding, people occlusion, LiDAR depth</td></tr><tr><td>CoreBluetooth</td><td><code>CBCentralManager.scanForPeripherals() / CBPeripheral.discoverServices()</code></td><td>BLE 4.0+ communication; supports central and peripheral roles, background operation</td></tr><tr><td>HealthKit</td><td><code>HKHealthStore.requestAuthorization(toShare:, read:) / HKSampleQuery</code></td><td>Health and fitness data access (steps, heart rate, sleep, workouts, clinical records)</td></tr><tr><td>StoreKit</td><td><code>StoreKit.Product.products(for: identifiers) / PurchaseIntent / Transaction.updates</code></td><td>In-app purchases, subscriptions (StoreKit 2, async API), receipt validation, StoreKit configuration testing</td></tr><tr><td>Push Notifications</td><td><code>UNUserNotificationCenter.requestAuthorization() / APNs (HTTP/2): POST /3/device/{device_token}</code></td><td>Remote and local notifications via UserNotifications framework; APNs payload with aps dictionary including alert, badge, sound</td></tr></table>"},{"category":"Programming Languages","title":"C","tags":["compiled","procedural","systems","low-level","memory","pointer","embedded"],"summary":"C is a procedural language providing direct memory access via pointers and manual memory management. Foundation of systems programming.","content":"<h3>Core Types &amp; Data Structures</h3><table><tr><th>Type</th><th>Size (typical)</th><th>Format Specifier</th></tr><tr><td>char</td><td>1 byte</td><td>%c</td></tr><tr><td>short</td><td>2 bytes</td><td>%hd</td></tr><tr><td>int</td><td>4 bytes</td><td>%d</td></tr><tr><td>long</td><td>4 or 8 bytes</td><td>%ld</td></tr><tr><td>long long</td><td>8 bytes</td><td>%lld</td></tr><tr><td>float</td><td>4 bytes</td><td>%f</td></tr><tr><td>double</td><td>8 bytes</td><td>%lf</td></tr><tr><td>size_t</td><td>4 or 8 bytes</td><td>%zu</td></tr></table><h4>Compound Types</h4><ul><li><strong>struct</strong> - struct Point { int x; int y; }</li><li><strong>union</strong> - union Data { int i; float f; char str[20]; }</li><li><strong>enum</strong> - enum Color { RED, GREEN, BLUE }</li><li><strong>pointer</strong> - int* ptr; void* generic; const int* read_only</li><li><strong>array</strong> - int arr[10]; char* argv[]; int matrix[3][4]</li><li><strong>function pointer</strong> - int (*cmp)(const void*, const void*)</li></ul><h3>Built-in Functions / Standard Library</h3><table><tr><th>Header</th><th>Key Functions</th></tr><tr><td>&lt;stdio.h&gt;</td><td>printf(), scanf(), fopen(), fclose(), fread(), fwrite(), fgets(), fputs(), fprintf(), fscanf(), sscanf(), sprintf(), snprintf(), perror()</td></tr><tr><td>&lt;stdlib.h&gt;</td><td>malloc(), calloc(), realloc(), free(), atoi(), strtol(), rand(), srand(), qsort(), bsearch(), abs(), exit(), getenv()</td></tr><tr><td>&lt;string.h&gt;</td><td>strlen(), strcpy(), strncpy(), strcat(), strcmp(), strchr(), strstr(), strtok(), memset(), memcpy(), memmove(), memcmp()</td></tr><tr><td>&lt;math.h&gt;</td><td>sin(), cos(), tan(), sqrt(), pow(), exp(), log(), ceil(), floor(), fabs(), fmod()</td></tr><tr><td>&lt;ctype.h&gt;</td><td>isalpha(), isdigit(), isalnum(), isspace(), isupper(), islower(), toupper(), tolower()</td></tr><tr><td>&lt;time.h&gt;</td><td>time(), clock(), difftime(), strftime(), localtime(), gmtime()</td></tr><tr><td>&lt;stdint.h&gt;</td><td>int8_t, int16_t, int32_t, int64_t, uintptr_t, size_t</td></tr></table><h3>Syntax Highlights</h3><ul><li><strong>Preprocessor</strong>: #include, #define, #ifdef, #pragma, ##, # stringify</li><li><strong>Pointer arithmetic</strong>: *(p + i) == p[i], ++p advances by sizeof(T)</li><li><strong>Bitwise ops</strong>: &amp; | ^ ~ &lt;&lt; &gt;&gt;</li><li><strong>Ternary</strong>: condition ? a : b</li><li><strong>Comma operator</strong>: expr1, expr2</li><li><strong>Storage classes</strong>: static, extern, register, auto, _Thread_local</li><li><strong>Qualifiers</strong>: const, volatile, restrict</li><li><strong>Compound literals (C99)</strong>: (int[]){1, 2, 3}</li><li><strong>Designated initializers (C99)</strong>: struct { .x = 1 }</li><li><strong>Flexible array members (C99)</strong>: struct { int len; char data[]; }</li></ul><h3>Common API Patterns</h3><pre>// Error-returning pattern\nenum Error { ERR_NONE = 0, ERR_MEMORY = -1, ERR_IO = -2 };\nenum Error read_file(const char* path, char** buf, size_t* len) {\n    FILE* f = fopen(path, &quot;rb&quot;);\n    if (!f) return ERR_IO;\n    // ... read file ...\n    fclose(f);\n    return ERR_NONE;\n}</pre><h3>Package Management &amp; Tooling</h3><ul><li><strong>Compilers</strong>: GCC, Clang/LLVM, MSVC, TCC, ICC</li><li><strong>Build</strong>: Make, CMake, Meson, Autotools</li><li><strong>Debug</strong>: GDB, LLDB, Valgrind, ASan, UBSan, TSan</li><li><strong>Package</strong>: vcpkg, Conan, apt/yum</li><li><strong>Analysis</strong>: Clang Static Analyzer, Cppcheck, Coverity</li><li><strong>Standards</strong>: C89/C90, C99, C11, C17, C23</li></ul>"},{"category":"Programming Languages","title":"C#","tags":["compiled","Microsoft","OOP",".NET","enterprise","gaming","LINQ"],"summary":"C# is a modern, type-safe, object-oriented language for .NET, used for Windows apps, web services, games, and enterprise software.","content":"<h3>Core Types &amp; Data Structures</h3><table><tr><th>Category</th><th>Type</th><th>Key Members</th></tr><tr><td>Value</td><td>byte, short, int, long, float, double, decimal, char, bool, nint, nuint</td><td>Parse(), TryParse(), ToString(), CompareTo(), Equals(), GetHashCode()</td></tr><tr><td>String</td><td>string (System.String)</td><td>Length, IndexOf(), Substring(), Replace(), Split(), Join(), ToUpper(), ToLower(), Trim(), Contains(), StartsWith(), EndsWith(), Format(), IsNullOrEmpty(), StringBuilder</td></tr><tr><td>DateTime</td><td>System.DateTime</td><td>Now, UtcNow, Today, AddDays(), AddMonths(), Subtract(), ToString(format), Parse(), TryParse(), TimeSpan</td></tr><tr><td>List&lt;T&gt;</td><td>System.Collections.Generic</td><td>Add(), Remove(), RemoveAt(), Clear(), Contains(), Sort(), Find(), FindAll(), Exists(), ForEach(), BinarySearch()</td></tr><tr><td>Dictionary&lt;K,V&gt;</td><td>System.Collections.Generic</td><td>Add(), Remove(), ContainsKey(), TryGetValue(), Keys, Values, Clear()</td></tr><tr><td>HashSet&lt;T&gt;</td><td>System.Collections.Generic</td><td>Add(), Remove(), Contains(), UnionWith(), IntersectWith(), ExceptWith()</td></tr><tr><td>Stack&lt;T&gt;</td><td>System.Collections.Generic</td><td>Push(), Pop(), Peek(), TryPeek(), TryPop()</td></tr><tr><td>Queue&lt;T&gt;</td><td>System.Collections.Generic</td><td>Enqueue(), Dequeue(), Peek(), TryDequeue()</td></tr><tr><td>Record</td><td>record class/struct (C# 9/10)</td><td>ToString(), Equals(), GetHashCode(), Clone(), with expression</td></tr><tr><td>Span&lt;T&gt;</td><td>System (C# 7.2+)</td><td>Length, Slice(), CopyTo(), Fill(), Clear(), ToArray(), IndexOf()</td></tr></table><h3>Built-in Functions / Standard Library</h3><h4>System namespace</h4><ul><li><code>Console</code> - Write(), WriteLine(), ReadLine(), ReadKey(), Clear(), SetCursorPosition()</li><li><code>Convert</code> - ToInt32(), ToString(), ToBoolean(), ChangeType()</li><li><code>Math</code> - Abs(), Max(), Min(), Sqrt(), Pow(), Round(), Floor(), Ceiling(), Sin(), Cos(), Log(), Clamp()</li><li><code>Random</code> - Next(), Next(min, max), NextDouble(), NextBytes(), Shuffle()</li><li><code>Guid</code> - NewGuid(), ToString(), Parse(), TryParse()</li></ul><h4>LINQ (System.Linq)</h4><table><tr><th>Method</th><th>Description</th></tr><tr><td>Where()</td><td>Filter based on predicate</td></tr><tr><td>Select()</td><td>Project each element</td></tr><tr><td>SelectMany()</td><td>Flatten nested sequences</td></tr><tr><td>OrderBy() / ThenBy()</td><td>Sort ascending</td></tr><tr><td>GroupBy()</td><td>Group by key</td></tr><tr><td>Join()</td><td>Join two sequences</td></tr><tr><td>Aggregate()</td><td>Accumulate over sequence</td></tr><tr><td>First() / FirstOrDefault()</td><td>First element or default</td></tr><tr><td>Single() / SingleOrDefault()</td><td>Single element (throws if != 1)</td></tr><tr><td>Any() / All()</td><td>Quantifiers</td></tr><tr><td>Count() / LongCount()</td><td>Count elements</td></tr><tr><td>Sum() / Average() / Min() / Max()</td><td>Aggregate numeric values</td></tr><tr><td>Distinct() / DistinctBy()</td><td>Remove duplicates</td></tr><tr><td>Union() / Intersect() / Except()</td><td>Set operations</td></tr><tr><td>Skip() / Take()</td><td>Partition operations</td></tr><tr><td>Zip()</td><td>Combine sequences pairwise</td></tr></table><h4>Async &amp; Concurrency</h4><ul><li><code>Task</code> / <code>Task&lt;T&gt;</code> - Run(), Delay(), WhenAll(), WhenAny(), FromResult()</li><li><code>ValueTask&lt;T&gt;</code> - Reduced allocation variant</li><li><code>Parallel</code> - For(), ForEach(), Invoke() for data parallelism</li><li><code>ConcurrentDictionary</code>, <code>ConcurrentQueue</code>, <code>BlockingCollection</code></li><li><code>SemaphoreSlim</code>, <code>Monitor</code>, <code>ReaderWriterLockSlim</code></li></ul><h3>Syntax Highlights</h3><ul><li><strong>Properties</strong>: int Age { get; set; } auto-properties</li><li><strong>Records (C# 9+)</strong>: record Person(string Name, int Age);</li><li><strong>Pattern matching</strong>: switch expressions, property patterns, list patterns (C# 11)</li><li><strong>Nullable ref types</strong>: string? with #nullable enable</li><li><strong>Top-level statements (C# 9+)</strong>: no wrapper class</li><li><strong>LINQ query syntax</strong>: from p in people where p.Age &gt; 18 select p.Name</li><li><strong>Extension methods</strong>: static int WordCount(this string str)</li><li><strong>Async streams (C# 8+)</strong>: await foreach</li><li><strong>Index/range (C# 8+)</strong>: arr[^1], arr[1..^1]</li><li><strong>Primary constructors (C# 12)</strong>: class Person(string name) { }</li><li><strong>Collection expressions (C# 12)</strong>: int[] arr = [1, 2, 3];</li></ul><h3>Common API Patterns</h3><pre>// LINQ pipeline with record\npublic record Order(int Id, decimal Amount);\nvar result = orders\n    .Where(o =&gt; o.Amount &gt; 100)\n    .GroupBy(o =&gt; o.Customer)\n    .Select(g =&gt; new { Customer = g.Key, Sum = g.Sum(x =&gt; x.Amount) });\n// Async HTTP\nusing var client = new HttpClient();\nvar response = await client.GetAsync(&quot;https://api.example.com/data&quot;);\nresponse.EnsureSuccessStatusCode();\nvar data = await response.Content.ReadAsStringAsync();</pre><h3>Package Management &amp; Tooling</h3><ul><li><strong>NuGet</strong> - NuGet.org, dotnet add package, PackageReference</li><li><strong>dotnet CLI</strong> - dotnet new/build/run/test/publish/pack</li><li><strong>.NET SDK</strong> - .NET 6/8 LTS, .NET Framework 4.x</li><li><strong>Testing</strong>: xUnit, NUnit, MSTest, Moq, FluentAssertions</li><li><strong>Frameworks</strong>: ASP.NET Core, Blazor, MAUI, EF Core, WPF</li></ul>"},{"category":"Programming Languages","title":"C++","tags":["compiled","OOP","systems","generic","multi-paradigm","high-performance"],"summary":"C++ extends C with object-oriented, generic, and functional features while maintaining low-level memory control.","content":"<h3>Core Types &amp; Data Structures</h3><h4>Primitive Types</h4><table><tr><th>Type</th><th>Size</th></tr><tr><td>bool</td><td>1 byte</td></tr><tr><td>char, wchar_t, char8_t, char16_t, char32_t</td><td>1-4 bytes</td></tr><tr><td>short, int, long, long long</td><td>2-8 bytes</td></tr><tr><td>float, double, long double</td><td>4-16 bytes</td></tr></table><h4>STL Containers</h4><table><tr><th>Container</th><th>Key Methods</th></tr><tr><td>vector&lt;T&gt;</td><td>push_back(), pop_back(), emplace_back(), resize(), reserve(), capacity(), size(), at(), data()</td></tr><tr><td>array&lt;T, N&gt;</td><td>size(), fill(), data(), front(), back(), at()</td></tr><tr><td>deque&lt;T&gt;</td><td>push_front(), push_back(), pop_front(), pop_back()</td></tr><tr><td>list&lt;T&gt;</td><td>push_front(), push_back(), splice(), merge(), sort(), unique()</td></tr><tr><td>map&lt;K,V&gt;</td><td>operator[], at(), insert(), find(), contains() (C++20), try_emplace()</td></tr><tr><td>set&lt;T&gt;</td><td>insert(), find(), count(), lower_bound(), upper_bound(), equal_range()</td></tr><tr><td>unordered_map&lt;K,V&gt;</td><td>insert(), find(), count(), bucket_count(), rehash(), reserve()</td></tr><tr><td>string</td><td>size(), length(), c_str(), substr(), find(), replace(), append(), compare(), starts_with()</td></tr></table><h3>Built-in Functions / Standard Library</h3><h4>Algorithms (&lt;algorithm&gt;)</h4><ul><li><code>std::sort</code>, <code>std::stable_sort</code>, <code>std::partial_sort</code>, <code>std::nth_element</code></li><li><code>std::find</code>, <code>std::find_if</code>, <code>std::binary_search</code></li><li><code>std::lower_bound</code>, <code>std::upper_bound</code>, <code>std::equal_range</code></li><li><code>std::copy</code>, <code>std::copy_if</code>, <code>std::transform</code></li><li><code>std::remove</code>, <code>std::remove_if</code>, <code>std::unique</code></li><li><code>std::accumulate</code>, <code>std::reduce</code> (&lt;numeric&gt;)</li><li><code>std::for_each</code>, <code>std::all_of</code>, <code>std::any_of</code>, <code>std::none_of</code></li></ul><h4>Smart Pointers (&lt;memory&gt;)</h4><ul><li><code>std::unique_ptr&lt;T&gt;</code> - Exclusive ownership, move-only</li><li><code>std::shared_ptr&lt;T&gt;</code> - Reference-counted shared ownership</li><li><code>std::weak_ptr&lt;T&gt;</code> - Non-owning observer, lock()</li></ul><h4>Concurrency</h4><ul><li><code>std::thread</code>, <code>std::jthread</code> (C++20)</li><li><code>std::mutex</code>, <code>std::shared_mutex</code>, <code>std::scoped_lock</code></li><li><code>std::promise</code>/<code>std::future</code>, <code>std::async</code></li><li><code>std::atomic&lt;T&gt;</code> - load(), store(), exchange(), fetch_add()</li></ul><h3>Syntax Highlights</h3><ul><li><strong>RAII</strong> - Resource Acquisition Is Initialization</li><li><strong>Move semantics</strong>: T(T&amp;&amp;) noexcept, std::move()</li><li><strong>Perfect forwarding</strong>: template&lt;typename T&gt; void f(T&amp;&amp;)</li><li><strong>Lambdas</strong>: [capture](params) -&gt; ret { body }, mutable, constexpr</li><li><strong>Concepts (C++20)</strong>: template&lt;std::integral T&gt; void f(T x)</li><li><strong>Ranges (C++20)</strong>: vec | views::filter(pred) | views::transform(f)</li><li><strong>Coroutines (C++20)</strong>: co_await, co_yield, co_return</li><li><strong>Modules (C++20)</strong>: export module foo; import bar;</li><li><strong>Spaceship (C++20)</strong>: auto operator&lt;=&gt;(const T&amp;) = default;</li><li><strong>Structured bindings (C++17)</strong>: auto [k, v] = *map.begin()</li></ul><h3>Common API Patterns</h3><pre>// RAII file wrapper\nclass File {\n    FILE* fp;\npublic:\n    File(const char* path) : fp(fopen(path, &quot;r&quot;)) { }\n    ~File() { if (fp) fclose(fp); }\n    File(const File&amp;) = delete;\n};</pre><h3>Package Management &amp; Tooling</h3><ul><li><strong>Build</strong>: CMake, Meson, Bazel, Premake, Ninja</li><li><strong>Package</strong>: vcpkg, Conan, CPM.cmake</li><li><strong>Compilers</strong>: GCC, Clang, MSVC, ICC, Emscripten</li><li><strong>Debug</strong>: GDB, LLDB, Valgrind, Sanitizers</li><li><strong>Testing</strong>: GoogleTest, Catch2, doctest, Boost.Test</li><li><strong>Analysis</strong>: Clang-Tidy, Clang Static Analyzer</li><li><strong>Standards</strong>: C++98, C++11, C++14, C++17, C++20, C++23</li></ul>"},{"category":"Programming Languages","title":"Dart","tags":["compiled","Google","Flutter","mobile","web","AOT","JIT"],"summary":"Dart is a client-optimized language for fast apps on any platform, primary language for Flutter framework.","content":"<h3>Core Types &amp; Data Structures</h3><table><tr><th>Type</th><th>Key Methods/Properties</th></tr><tr><td>int</td><td>abs(), ceil(), floor(), round(), truncate(), compareTo(), gcd(), isEven, isOdd, isNegative, sign, toDouble(), toRadixString(), parse()</td></tr><tr><td>double</td><td>abs(), ceil(), floor(), round(), truncate(), compareTo(), remainder(), toInt(), toStringAsFixed(), parse()</td></tr><tr><td>String</td><td>length, isEmpty, toUpperCase(), toLowerCase(), trim(), substring(), indexOf(), contains(), startsWith(), endsWith(), replaceAll(), split(), padLeft(), padRight(), codeUnitAt(), compareTo()</td></tr><tr><td>bool</td><td>toString(), &amp;&amp;, ||, ! operators</td></tr><tr><td>List&lt;T&gt;</td><td>length, isEmpty, first, last, reversed, add(), addAll(), insert(), remove(), removeAt(), removeWhere(), clear(), fillRange(), shuffle(), sort(), sublist(), asMap(), map(), where(), firstWhere(), reduce(), fold(), any(), every(), contains(), expand(), take(), skip(), join(), toSet()</td></tr><tr><td>Set&lt;T&gt;</td><td>length, isEmpty, contains(), add(), addAll(), remove(), difference(), intersection(), union(), lookup()</td></tr><tr><td>Map&lt;K,V&gt;</td><td>length, isEmpty, keys, values, entries, containsKey(), [], []=, putIfAbsent(), update(), remove(), clear(), addAll()</td></tr><tr><td>Record (3.0)</td><td>Positional/named tuples: (name, age), $1, $2, or named fields</td></tr></table><h3>Built-in Functions / Standard Library</h3><h4>Core Types</h4><ul><li><code>DateTime</code> - now(), parse(), difference(), isBefore(), isAfter(), add(), subtract(), toIso8601String()</li><li><code>Duration</code> - fromDays(), fromHours(), fromMinutes(), fromSeconds(), inDays, inHours, inMinutes, inSeconds</li><li><code>Uri</code> - parse(), https(), http(), scheme, host, port, path, query, queryParameters</li><li><code>RegExp</code> - hasMatch(), firstMatch(), allMatches(), stringMatch()</li></ul><h4>Async &amp; Concurrency</h4><ul><li><code>Future&lt;T&gt;</code> - then(), catchError(), whenComplete(), timeout()</li><li><code>Stream&lt;T&gt;</code> - listen(), map(), where(), asyncMap(), expand(), take(), skip(), transform(), reduce(), fold()</li><li><code>Isolate</code> - spawn(), ping(), kill(), compute() for parallel execution</li></ul><h4>dart:io</h4><ul><li><code>File</code> - readAsString(), readAsBytes(), writeAsString(), writeAsBytes(), copy(), rename(), delete(), exists(), length()</li><li><code>Directory</code> - create(), createTemp(), list(), rename(), delete(), exists()</li><li><code>HttpClient</code> - getUrl(), postUrl(), close()</li></ul><h3>Syntax Highlights</h3><ul><li><strong>Sound null safety</strong>: Type? for nullable, flow analysis promotes</li><li><strong>Cascade notation</strong>: obj..method1()..method2() chain</li><li><strong>Spread operator</strong>: [...list1, ...list2], { ...map }</li><li><strong>Collection if/for</strong>: [if (cond) x, for (var i in items) i]</li><li><strong>Extension methods</strong>: extension NumParsing on String { }</li><li><strong>Records (3.0)</strong>: (String name, int age) tuple type</li><li><strong>Patterns (3.0)</strong>: var (a, b) = (1, 2); switch with patterns</li><li><strong>Sealed classes (3.0)</strong>: sealed class Shape { }</li><li><strong>Named constructors</strong>: Point.origin() : this.x = 0, this.y = 0;</li><li><strong>Factory constructors</strong>: factory Singleton() =&gt; _instance;</li><li><strong>Async generators</strong>: Stream&lt;int&gt; countStream() async* { yield 1; }</li></ul><h3>Common API Patterns</h3><pre>// API client with records (Dart 3.0)\nFuture&lt;(List&lt;User&gt;, int total)&gt; fetchUsers(int page) async {\n  final response = await http.get(Uri.parse(&apos;/users?page=$page&apos;));\n  final body = jsonDecode(response.body);\n  final users = (body[&apos;data&apos;] as List).map((e) =&gt; User.fromJson(e)).toList();\n  return (users, body[&apos;total&apos;] as int);\n}</pre><h3>Package Management &amp; Tooling</h3><ul><li><strong>pub</strong> - pubspec.yaml, pub get/upgrade/publish, pub.dev</li><li><strong>dart CLI</strong> - dart run/compile/analyze/format/test/fix</li><li><strong>Flutter</strong> - UI framework: Widgets, Navigator, Provider</li><li><strong>Testing</strong>: test (core), flutter_test, mocktail</li><li><strong>Build targets</strong>: AOT (native), JIT (dev), dart2js/WASM</li></ul>"},{"category":"Programming Languages","title":"Go","tags":["compiled","concurrent","Google","goroutines","channels","simple","cloud"],"summary":"Go is a statically typed, compiled language designed for simplicity, fast compilation, and built-in concurrency via goroutines and channels.","content":"<h3>Core Types &amp; Data Structures</h3><table><tr><th>Type</th><th>Zero Value</th><th>Description</th></tr><tr><td>bool</td><td>false</td><td>Boolean</td></tr><tr><td>int, int8..int64</td><td>0</td><td>Signed integers</td></tr><tr><td>uint, uint8..uint64, uintptr</td><td>0</td><td>Unsigned integers</td></tr><tr><td>float32, float64</td><td>0.0</td><td>IEEE 754 floats</td></tr><tr><td>complex64, complex128</td><td>0+0i</td><td>Complex numbers</td></tr><tr><td>string</td><td>&quot;&quot;</td><td>Immutable UTF-8 sequence</td></tr><tr><td>[N]T</td><td>Zero values</td><td>Fixed-size array (value type)</td></tr><tr><td>[]T</td><td>nil</td><td>Dynamic slice (ptr, len, cap)</td></tr><tr><td>map[K]V</td><td>nil</td><td>Hash table (comparable keys)</td></tr><tr><td>struct</td><td>Zero fields</td><td>Named field collection</td></tr><tr><td>*T</td><td>nil</td><td>Pointer (no arithmetic)</td></tr><tr><td>interface{}</td><td>nil</td><td>Method set contract (any in 1.18+)</td></tr><tr><td>chan T</td><td>nil</td><td>Typed conduit</td></tr><tr><td>func</td><td>nil</td><td>First-class function</td></tr></table><h3>Built-in Functions / Standard Library</h3><h4>Built-in Functions</h4><table><tr><th>Function</th><th>Description</th></tr><tr><td>len()</td><td>Length of string, slice, map, array, channel</td></tr><tr><td>cap()</td><td>Capacity of slice, array, channel</td></tr><tr><td>append()</td><td>Append to slice, auto-grow</td></tr><tr><td>copy()</td><td>Copy slice elements</td></tr><tr><td>make()</td><td>Allocate slice, map, or channel</td></tr><tr><td>new()</td><td>Allocate zero value, return *T</td></tr><tr><td>delete()</td><td>Delete map key</td></tr><tr><td>close()</td><td>Close channel</td></tr><tr><td>panic() / recover()</td><td>Runtime panic and recovery</td></tr></table><h4>Key Packages</h4><ul><li><code>fmt</code> - Printf(), Sprintf(), Errorf(), Scanf()</li><li><code>strings</code> - Contains(), Split(), Join(), Replace(), Builder</li><li><code>strconv</code> - Atoi(), Itoa(), ParseInt(), FormatFloat()</li><li><code>os</code> - Open(), ReadFile(), WriteFile(), Getenv(), Args</li><li><code>net/http</code> - HandleFunc(), ListenAndServe(), Get(), Post()</li><li><code>encoding/json</code> - Marshal(), Unmarshal(), NewEncoder()</li><li><code>sync</code> - Mutex, RWMutex, WaitGroup, Once, Map</li><li><code>time</code> - Now(), Sleep(), After(), Parse(), Format()</li><li><code>context</code> - Background(), WithCancel(), WithTimeout()</li></ul><h3>Syntax Highlights</h3><ul><li><strong>Goroutines</strong>: go fn() - lightweight threads, M:N scheduler</li><li><strong>Channels</strong>: make(chan T), ch &lt;- val, val &lt;-ch</li><li><strong>Select</strong>: multiplex channels with timeout/default</li><li><strong>Defer</strong>: LIFO cleanup on function exit</li><li><strong>Multiple returns</strong>: func div(a, b int) (int, error)</li><li><strong>Error handling</strong>: if err != nil { return err } (no exceptions)</li><li><strong>:=</strong> short var declaration (type inference)</li><li><strong>Embedded structs</strong>: composition over inheritance</li><li><strong>Struct tags</strong>: used for serialization, validation</li><li><strong>iota</strong>: incrementing constant generator</li><li><strong>Generics (1.18+)</strong>: [T any] type parameters</li></ul><h3>Common API Patterns</h3><pre>// HTTP middleware\nfunc loggingMiddleware(next http.Handler) http.Handler {\n    return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {\n        log.Printf(&quot;%s %s&quot;, r.Method, r.URL.Path)\n        next.ServeHTTP(w, r)\n    })\n}\nmux := http.NewServeMux()\nmux.HandleFunc(&quot;/api/users&quot;, handleUsers)\nhttp.ListenAndServe(&quot;:8080&quot;, loggingMiddleware(mux))</pre><h3>Package Management &amp; Tooling</h3><ul><li><strong>go mod</strong> - go mod init/tidy/vendor, go.sum</li><li><strong>go build</strong> - Static binary, cross-compilation (GOOS, GOARCH)</li><li><strong>go test</strong> - Testing, benchmarks, fuzzing, coverage</li><li><strong>go fmt</strong> - Enforced formatter (gofmt)</li><li><strong>go vet</strong> - Static analysis</li><li><strong>gopls</strong> - LSP server for IDEs</li><li><strong>delve</strong> - Debugger</li></ul>"},{"category":"Programming Languages","title":"Haskell","tags":["compiled","functional","pure","lazy","type-safe","monads"],"summary":"Haskell is a purely functional, lazily evaluated language with a strong static type system, widely used in academia and finance.","content":"<h3>Core Types &amp; Data Structures</h3><table><tr><th>Type</th><th>Description</th><th>Key Operations</th></tr><tr><td>Int, Integer</td><td>Fixed/arbitrary precision integers</td><td>+, -, *, div, mod, quot, rem, abs, signum, fromInteger</td></tr><tr><td>Float, Double</td><td>IEEE 754 floating point</td><td>sin, cos, tan, sqrt, exp, log, (**), pi, isNaN, isInfinite</td></tr><tr><td>Bool</td><td>True / False</td><td>&amp;&amp;, ||, not, otherwise</td></tr><tr><td>Char</td><td>Unicode character</td><td>isDigit, isAlpha, isSpace, toUpper, toLower, ord, chr</td></tr><tr><td>String</td><td>[Char] (list of characters)</td><td>++ (concat), length, null, head, tail, take, drop, lines, unlines, words, unwords, show, read</td></tr><tr><td>Maybe a</td><td>Just a / Nothing</td><td>maybe, fromMaybe, isJust, isNothing, mapMaybe, catMaybes</td></tr><tr><td>Either a b</td><td>Left a / Right b</td><td>either, isLeft, isRight, fromLeft, fromRight, partitionEithers</td></tr><tr><td>[] (List)</td><td>Homogeneous list</td><td>: (cons), ++, concat, map, filter, foldl, foldr, scanl, scanr, zip, unzip, take, drop, splitAt, elem, notElem, lookup, group, sort, nub, reverse, replicate, cycle, iterate, repeat</td></tr><tr><td>Tuple</td><td>(a,b), (a,b,c), etc.</td><td>fst, snd, curry, uncurry, swap</td></tr><tr><td>Map k v</td><td>from containers</td><td>lookup, insert, delete, member, adjust, alter, keys, elems, toList, fromList, union, intersection, difference</td></tr><tr><td>Set a</td><td>from containers</td><td>member, insert, delete, null, size, union, intersection, difference, toList, fromList</td></tr></table><h3>Built-in Functions / Standard Library</h3><h4>Prelude (auto-imported)</h4><table><tr><th>Function</th><th>Signature</th><th>Description</th></tr><tr><td>map</td><td>(a -&gt; b) -&gt; [a] -&gt; [b]</td><td>Apply function to all elements</td></tr><tr><td>filter</td><td>(a -&gt; Bool) -&gt; [a] -&gt; [a]</td><td>Keep elements satisfying predicate</td></tr><tr><td>foldl / foldr</td><td>(b -&gt; a -&gt; b) -&gt; b -&gt; [a] -&gt; b</td><td>Left/right fold</td></tr><tr><td>zip</td><td>[a] -&gt; [b] -&gt; [(a,b)]</td><td>Pair elements from two lists</td></tr><tr><td>concat</td><td>[[a]] -&gt; [a]</td><td>Flatten list of lists</td></tr><tr><td>elem</td><td>a -&gt; [a] -&gt; Bool</td><td>Check membership</td></tr><tr><td>take / drop</td><td>Int -&gt; [a] -&gt; [a]</td><td>Take/drop N elements</td></tr><tr><td>id</td><td>a -&gt; a</td><td>Identity function</td></tr><tr><td>const</td><td>a -&gt; b -&gt; a</td><td>Constant function</td></tr><tr><td>.</td><td>(b -&gt; c) -&gt; (a -&gt; b) -&gt; a -&gt; c</td><td>Function composition</td></tr><tr><td>$</td><td>(a -&gt; b) -&gt; a -&gt; b</td><td>Function application</td></tr></table><h4>Key Type Classes</h4><ul><li><code>Functor</code> - fmap (mapped over structure)</li><li><code>Applicative</code> - pure, &lt;*&gt; (apply wrapped function)</li><li><code>Monad</code> - &gt;&gt;= (bind), return, join, &gt;&gt;</li><li><code>Foldable</code> - foldl, foldr, foldMap, toList</li><li><code>Traversable</code> - traverse, sequenceA, mapM</li><li><code>Num</code> - +, -, *, negate, abs, signum, fromInteger</li><li><code>Ord</code> - compare, &lt;, &gt;, &lt;=, &gt;=, min, max</li><li><code>Eq</code> - ==, /=</li><li><code>Show</code> - show, showsPrec, showList</li><li><code>Read</code> - read, readsPrec, readList</li></ul><h3>Syntax Highlights</h3><ul><li><strong>Pure functions</strong>: no side effects, referential transparency</li><li><strong>Lazy evaluation</strong>: infinite lists [1..], take 10 (cycle [1,2,3])</li><li><strong>Pattern matching</strong>: f (x:xs) = x + sum xs</li><li><strong>Guards</strong>: f x | x &gt; 0 = x | otherwise = 0</li><li><strong>Where clauses</strong>: where discriminant = b^2 - 4*a*c</li><li><strong>Let bindings</strong>: let x = 5 in x * x</li><li><strong>List comprehensions</strong>: [x^2 | x &lt;- [1..10], even x]</li><li><strong>do notation</strong>: do { x &lt;- action; return x }</li><li><strong>Point-free style</strong>: sum = foldr (+) 0</li><li><strong>GADTs</strong>: data Expr a where ...</li><li><strong>Type families</strong>: type family F a :: Type</li></ul><h3>Common API Patterns</h3><pre>-- Functor/Applicative/Monad pipeline\nimport Data.Maybe (catMaybes)\nprocess :: [Int] -&gt; [Int]\nprocess = map (*2) . filter (&gt; 0) . take 10\n-- do notation for IO\nmain :: IO ()\nmain = do\n    putStrLn &quot;Enter name:&quot;\n    name &lt;- getLine\n    putStrLn (&quot;Hello, &quot; ++ name ++ &quot;!&quot;)</pre><h3>Package Management &amp; Tooling</h3><ul><li><strong>GHC</strong> - Glasgow Haskell Compiler: ghc, ghci, runghc</li><li><strong>Cabal</strong> - Build tool: cabal init/build/test/run, .cabal file</li><li><strong>Stack</strong> - Build tool: stack.yaml, stack build/test, resolver</li><li><strong>Hackage</strong> - Package repository: hackage.haskell.org</li><li><strong>HLS</strong> - Haskell Language Server (IDE support)</li><li><strong>Testing</strong>: HUnit, QuickCheck, SmallCheck, HSpec, Tasty</li></ul>"},{"category":"Programming Languages","title":"Java","tags":["compiled","JVM","OOP","enterprise","Android","backend"],"summary":"Java is a class-based, object-oriented language designed for platform portability via the JVM, widely used in enterprise and Android.","content":"<h3>Core Types &amp; Data Structures</h3><table><tr><th>Category</th><th>Types</th><th>Key Methods</th></tr><tr><td>Primitives</td><td>byte, short, int, long, float, double, char, boolean</td><td>No methods (not objects)</td></tr><tr><td>Boxed</td><td>Byte, Short, Integer, Long, Float, Double, Character, Boolean</td><td>parseXxx(), valueOf(), xxxValue(), compareTo(), equals(), hashCode()</td></tr><tr><td>String</td><td>String, StringBuilder</td><td>length(), charAt(), substring(), indexOf(), replace(), split(), join(), format(), matches(), strip(), repeat(), lines()</td></tr><tr><td>List</td><td>ArrayList, LinkedList</td><td>add(), get(), set(), remove(), size(), contains(), sort(), subList(), stream()</td></tr><tr><td>Set</td><td>HashSet, TreeSet, LinkedHashSet</td><td>add(), remove(), contains(), size(), iterator()</td></tr><tr><td>Map</td><td>HashMap, TreeMap, LinkedHashMap</td><td>put(), get(), remove(), containsKey(), keySet(), values(), entrySet(), merge()</td></tr><tr><td>Queue</td><td>PriorityQueue, ArrayDeque</td><td>offer(), poll(), peek(), push(), pop()</td></tr></table><h3>Built-in Functions / Standard Library</h3><h4>java.lang</h4><ul><li><code>Object</code> - equals(), hashCode(), toString(), getClass(), clone(), notify(), wait()</li><li><code>System</code> - out.println(), currentTimeMillis(), arraycopy(), gc(), exit()</li><li><code>Math</code> - abs(), max(), min(), sqrt(), pow(), random(), floor(), ceil(), round(), sin(), cos()</li><li><code>Thread</code> - start(), run(), sleep(), join(), interrupt()</li></ul><h4>java.util</h4><ul><li><code>Collections</code> - sort(), binarySearch(), reverse(), shuffle(), unmodifiableList()</li><li><code>Arrays</code> - sort(), binarySearch(), asList(), fill(), copyOf(), stream()</li><li><code>Optional&lt;T&gt;</code> - of(), empty(), orElse(), map(), filter(), flatMap(), ifPresent()</li><li><code>Stream</code> - of(), filter(), map(), flatMap(), reduce(), collect(), forEach(), sorted(), distinct()</li><li><code>Collectors</code> - toList(), toSet(), toMap(), joining(), groupingBy()</li></ul><h4>java.time</h4><ul><li><code>LocalDate</code> / <code>LocalTime</code> / <code>LocalDateTime</code> - now(), of(), parse(), plus(), minus()</li><li><code>Instant</code> - now(), ofEpochMilli(), toEpochMilli()</li><li><code>Duration</code> / <code>Period</code> - ofDays(), between(), toDays()</li></ul><h4>I/O (java.nio.file)</h4><ul><li><code>Files</code> - readAllBytes(), readAllLines(), readString(), write(), copy(), move(), walk()</li><li><code>Path</code> - of(), resolve(), relativize(), normalize(), getFileName()</li></ul><h3>Syntax Highlights</h3><ul><li><strong>Lambda expressions (8+)</strong>: (x, y) -&gt; x + y</li><li><strong>Method references</strong>: String::length, System.out::println</li><li><strong>Records (16+)</strong>: record Point(int x, int y) {}</li><li><strong>Sealed classes (17+)</strong>: sealed interface Shape permits Circle {}</li><li><strong>Pattern matching (16+)</strong>: if (obj instanceof String s) { }</li><li><strong>Switch expressions (14+)</strong>: return switch (x) { case 1 -&gt; &quot;one&quot;; default -&gt; &quot;other&quot;; }</li><li><strong>Text blocks (15+)</strong>: &quot;&quot;&quot;multi-line text&quot;&quot;&quot;</li><li><strong>Virtual threads (21)</strong>: Thread.ofVirtual().start()</li></ul><h3>Common API Patterns</h3><pre>// Record + Stream pipeline\npublic record User(long id, String name, int age) {}\nList&lt;String&gt; names = users.stream()\n    .filter(u -&gt; u.age() &gt;= 18)\n    .sorted(Comparator.comparing(User::name))\n    .map(User::name)\n    .collect(Collectors.toList());\n// Try-with-resources\ntry (var reader = Files.newBufferedReader(path)) {\n    return reader.readLine();\n} catch (IOException e) {\n    throw new UncheckedIOException(e);\n}</pre><h3>Package Management &amp; Tooling</h3><ul><li><strong>Maven</strong> - pom.xml, mvn clean install, Maven Central</li><li><strong>Gradle</strong> - build.gradle(.kts), Gradle Wrapper</li><li><strong>JAR/WAR</strong> - Java archives for distribution</li><li><strong>JShell (9+)</strong> - Java REPL: /edit, /vars, /methods</li><li><strong>Testing</strong>: JUnit 5, Mockito, AssertJ, TestContainers</li><li><strong>Frameworks</strong>: Spring Boot, Jakarta EE, Micronaut, Quarkus</li><li><strong>Profiling</strong>: JMC, JFR, VisualVM, async-profiler</li></ul>"},{"category":"Programming Languages","title":"JavaScript","tags":["interpreted","event-driven","web","ECMAScript","JIT"],"summary":"JavaScript is a high-level, JIT-compiled language enabling interactive web pages and server-side apps via Node.js.","content":"<h3>Core Types &amp; Data Structures</h3><table><tr><th>Type</th><th>typeof</th><th>Key Methods</th></tr><tr><td>Number</td><td>number</td><td>toFixed(), toPrecision(), toExponential(), isNaN(), isInteger(), isSafeInteger(), parseFloat(), parseInt(), toString(radix)</td></tr><tr><td>BigInt</td><td>bigint</td><td>BigInt(), toString(), asIntN(), asUintN()</td></tr><tr><td>String</td><td>string</td><td>length, charAt(), concat(), includes(), indexOf(), match(), replace(), replaceAll(), search(), slice(), split(), startsWith(), endsWith(), substring(), toLowerCase(), toUpperCase(), trim(), trimStart(), trimEnd(), padStart(), padEnd(), repeat(), at()</td></tr><tr><td>Boolean</td><td>boolean</td><td>toString(), valueOf()</td></tr><tr><td>Symbol</td><td>symbol</td><td>Symbol(), Symbol.for(), Symbol.keyFor(), description</td></tr><tr><td>Object</td><td>object</td><td>keys(), values(), entries(), assign(), freeze(), seal(), hasOwn(), defineProperty(), fromEntries(), groupBy()</td></tr><tr><td>Array</td><td>object</td><td>length, at(), concat(), fill(), filter(), find(), flat(), flatMap(), forEach(), includes(), indexOf(), join(), keys(), map(), pop(), push(), reduce(), reverse(), shift(), slice(), some(), sort(), splice(), unshift(), with(), toReversed(), toSorted(), toSpliced()</td></tr><tr><td>Map</td><td>object</td><td>set(), get(), has(), delete(), clear(), keys(), values(), entries(), forEach(), size</td></tr><tr><td>Set</td><td>object</td><td>add(), delete(), has(), clear(), union(), intersection(), difference(), isSubsetOf(), isSupersetOf()</td></tr><tr><td>Date</td><td>object</td><td>now(), parse(), UTC(), getDate(), getDay(), getFullYear(), getHours(), getMinutes(), getMonth(), getSeconds(), getTime(), toISOString(), toJSON(), toString()</td></tr><tr><td>RegExp</td><td>object</td><td>exec(), test(), source, flags, global, ignoreCase, multiline, dotAll, sticky, unicode, lastIndex</td></tr></table><h3>Built-in Functions / Standard Library</h3><h4>Global Objects</h4><table><tr><th>API</th><th>Key Members</th></tr><tr><td>JSON</td><td>parse(), stringify()</td></tr><tr><td>Math</td><td>abs, acos, asin, atan, atan2, ceil, cos, exp, floor, log, log2, max, min, pow, random, round, sin, sqrt, tan, trunc, PI, E</td></tr><tr><td>Promise</td><td>resolve(), reject(), all(), allSettled(), any(), race(), then(), catch(), finally()</td></tr><tr><td>Proxy</td><td>get, set, has, deleteProperty, apply, construct traps</td></tr><tr><td>Reflect</td><td>get(), set(), has(), deleteProperty(), apply(), ownKeys()</td></tr></table><h4>Web/Browser APIs</h4><ul><li><code>document</code> - getElementById(), querySelector(), createElement(), addEventListener()</li><li><code>fetch()</code> - HTTP: fetch(url, init) -&gt; Promise&lt;Response&gt;</li><li><code>localStorage</code> / <code>sessionStorage</code> - getItem(), setItem(), removeItem()</li><li><code>WebSocket</code> - send(), close(), onopen, onmessage</li><li><code>IntersectionObserver</code> - observe(), unobserve()</li><li><code>Canvas API</code> - getContext(2d), fillRect(), arc(), drawImage()</li></ul><h4>Node.js Core Modules</h4><ul><li><code>fs</code> - readFile(), writeFile(), existsSync(), createReadStream()</li><li><code>path</code> - join(), resolve(), basename(), extname()</li><li><code>http</code> - createServer(), request(), get()</li><li><code>events</code> - EventEmitter: on(), emit(), once()</li><li><code>stream</code> - Readable, Writable, Transform, pipeline()</li><li><code>buffer</code> - Buffer.from(), Buffer.alloc(), buf.toString()</li><li><code>crypto</code> - randomBytes(), createHash(), createCipheriv()</li><li><code>child_process</code> - exec(), spawn(), fork()</li></ul><h3>Syntax Highlights</h3><ul><li><strong>First-class functions</strong>: const fn = () =&gt; {}</li><li><strong>Arrow functions</strong>: (a, b) =&gt; a + b, lexical this</li><li><strong>Destructuring</strong>: const { name } = obj; const [a, b] = arr</li><li><strong>Spread/Rest</strong>: [...arr, 4], { ...obj }, function(...args)</li><li><strong>Optional chaining</strong>: obj?.prop?.()</li><li><strong>Nullish coalescing</strong>: val ?? default</li><li><strong>Template literals</strong>: `Hello ${name}`</li><li><strong>Dynamic imports</strong>: import('./module.js')</li><li><strong>Generators</strong>: function* gen() { yield 1; }</li></ul><h3>Common API Patterns</h3><pre>// Async fetch with error handling\nasync function getUser(id) {\n  const res = await fetch(`/api/users/${id}`);\n  if (!res.ok) throw new Error(res.statusText);\n  return res.json();\n}\n// Array chaining\nconst result = data\n  .filter(x =&gt; x.active)\n  .map(x =&gt; ({ ...x, score: x.value * 2 }))\n  .sort((a, b) =&gt; b.score - a.score);\n// Concurrent requests\nconst [user, posts] = await Promise.all([\n  fetchUser(id), fetchPosts(userId)\n]);</pre><h3>Package Management &amp; Tooling</h3><ul><li><strong>npm</strong> - package.json, npm install, npm run, npm publish</li><li><strong>Yarn</strong> - yarn.lock, yarn workspaces</li><li><strong>pnpm</strong> - Fast, disk-efficient</li><li><strong>Bundlers</strong>: webpack, Vite, esbuild, Rollup, Parcel</li><li><strong>Transpilers</strong>: Babel, SWC, sucrase</li><li><strong>Testing</strong>: Vitest, Jest, Playwright, Cypress</li><li><strong>Linting</strong>: ESLint, Prettier, Biome</li><li><strong>Runtimes</strong>: Node.js, Deno, Bun</li></ul>"},{"category":"Programming Languages","title":"Julia","tags":["compiled","scientific","numerical","JIT","multiple-dispatch","data-science"],"summary":"Julia is a high-level, high-performance language for technical computing with a JIT compiler and multiple dispatch.","content":"<h3>Core Types &amp; Data Structures</h3><table><tr><th>Type</th><th>Description</th><th>Key Functions</th></tr><tr><td>Int8..Int128, UInt8..UInt128</td><td>Signed/unsigned integers</td><td>abs, count_ones, count_zeros, trailing_zeros, leading_zeros, isodd, iseven</td></tr><tr><td>Float16, Float32, Float64</td><td>IEEE 754 floats</td><td>abs, sqrt, sin, cos, tan, exp, log, ceil, floor, round, trunc, isfinite, isinf, isnan</td></tr><tr><td>Bool</td><td>true / false</td><td>!, &amp;&amp;, ||, xor</td></tr><tr><td>Char</td><td>Unicode character (32-bit)</td><td>isletter, isdigit, isspace, islowercase, isuppercase, lowercase, uppercase</td></tr><tr><td>String</td><td>UTF-8 encoded (immutable)</td><td>length, endswith, startswith, contains, replace, split, join, strip, uppercase, lowercase, occursin, chop, chomp</td></tr><tr><td>Array{T,N}</td><td>N-dimensional array (1-indexed)</td><td>size, length, ndims, eachindex, push!, pop!, append!, vcat, hcat, cat, transpose, permutedims, mapslices, broadcast, comprehension</td></tr><tr><td>Tuple</td><td>Heterogeneous immutable</td><td>length, first, last, tail, iters</td></tr><tr><td>NamedTuple</td><td>Key-value pairs (immutable)</td><td>keys, values, pairs, merge</td></tr><tr><td>Dict{K,V}</td><td>Hash table (mutable)</td><td>keys, values, pairs, haskey, get, get!, delete!, pop!, merge, merge!</td></tr><tr><td>Set{T}</td><td>Unique elements (mutable)</td><td>push!, pop!, in, union, intersect, setdiff, symdiff, issubset, issetequal</td></tr><tr><td>Symbol</td><td>Interned string identifier</td><td>Symbol(), string(), gensym, Meta.parse</td></tr></table><h3>Built-in Functions / Standard Library</h3><h4>Core Functions</h4><table><tr><th>Function</th><th>Signature</th><th>Description</th></tr><tr><td>println</td><td>println(io, xs...)</td><td>Print with newline</td></tr><tr><td>size</td><td>size(A, dim)</td><td>Dimensions of array</td></tr><tr><td>eltype</td><td>eltype(x)</td><td>Element type of collection</td></tr><tr><td>similar</td><td>similar(array, T)</td><td>Create uninitialized array with same shape</td></tr><tr><td>broadcast</td><td>f.(args...)</td><td>Element-wise operation with dot syntax</td></tr><tr><td>map</td><td>map(f, c...)</td><td>Apply function to all elements</td></tr><tr><td>filter</td><td>filter(f, c)</td><td>Keep elements satisfying predicate</td></tr><tr><td>reduce</td><td>reduce(op, c)</td><td>Reduce with binary operation</td></tr><tr><td>sum / prod</td><td>sum(A; dims)</td><td>Sum/product of elements</td></tr><tr><td>findall</td><td>findall(f, c)</td><td>Indices of matching elements</td></tr><tr><td>sort</td><td>sort(v; lt, by, rev)</td><td>Sort array</td></tr></table><h4>Key Modules</h4><ul><li><code>LinearAlgebra</code> - I, dot, cross, norm, normalize, eigvals, svd, lu, qr, cholesky, diagm, uniform scaling, mul!</li><li><code>Statistics</code> - mean, median, std, var, cor, cov, quantile</li><li><code>Random</code> - rand, randn, rand!, randsubseq, shuffle, seed!</li><li><code>Distributions</code> (external) - Normal, Poisson, Binomial, MvNormal</li></ul><h3>Syntax Highlights</h3><ul><li><strong>Multiple dispatch</strong>: functions specialized on all argument types</li><li><strong>Broadcasting dot syntax</strong>: f.(x) = broadcast(f, x)</li><li><strong>Array comprehensions</strong>: [f(x,y) for x in a, y in b]</li><li><strong>Generator expressions</strong>: (f(x) for x in xs)</li><li><strong>Macros</strong>: @time, @show, @assert, @printf, @view, @distributed</li><li><strong>Unicode support</strong>: variable names like x̂, α, β in source</li><li><strong>Multiple inheritance via parametric types</strong></li><li><strong>Do-block syntax</strong>: open(file) do io; read(io, String) end</li></ul><h3>Common API Patterns</h3><pre># Broadcasting and piping\nresult = 1:100 .|&gt; x -&gt; x^2 .|&gt; filter(iseven, _) .|&gt; sum\n# Multiple dispatch\nabstract type Animal end\nstruct Dog &lt;: Animal; name::String; end\nstruct Cat &lt;: Animal; name::String; end\nspeak(::Dog) = println(&quot;Woof!&quot;)\nspeak(::Cat) = println(&quot;Meow!&quot;)</pre><h3>Package Management &amp; Tooling</h3><ul><li><strong>Pkg</strong> - Built-in package manager: Pkg.add(), Pkg.rm(), Pkg.update(), Pkg.status(), Project.toml, Manifest.toml</li><li><strong>Julia REPL</strong> - ] for pkg mode, ? for help, ; for shell</li><li><strong>Jupyter/IJulia</strong> - Notebook integration</li><li><strong>Pluto.jl</strong> - Reactive notebooks</li><li><strong>Testing</strong>: Test.@test, @testset, @inferred, @test_throws</li><li><strong>Debugging</strong>: Infiltrator.jl, Julia VS Code debugger</li></ul>"},{"category":"Programming Languages","title":"Kotlin","tags":["compiled","JVM","Android","null-safe","coroutines","modern"],"summary":"Kotlin is a cross-platform, statically typed language fully interoperable with Java, preferred for Android development.","content":"<h3>Core Types &amp; Data Structures</h3><table><tr><th>Type</th><th>Key Methods</th></tr><tr><td>Byte, Short, Int, Long</td><td>toByte, toShort, toInt, toLong, toFloat, coerceIn, coerceAtLeast, coerceAtMost, rangeTo, downTo, step, countOneBits, rotateLeft</td></tr><tr><td>Float, Double</td><td>isNaN, isInfinite, isFinite, rangeTo, coerceIn, roundToInt</td></tr><tr><td>Boolean</td><td>not(), and(), or(), xor()</td></tr><tr><td>Char</td><td>isDigit, isLetter, isWhitespace, isUpperCase, toUpperCase, toLowerCase, digitToInt</td></tr><tr><td>String</td><td>length, isEmpty, isBlank, substring, drop, take, trim, padStart, replace, split, lines, filter, map, reversed, chunked, contains, startsWith, endsWith, indexOf</td></tr><tr><td>List&lt;T&gt;</td><td>size, get, contains, indexOf, subList, isEmpty</td></tr><tr><td>MutableList&lt;T&gt;</td><td>add, remove, removeAt, set, clear, sort, shuffle</td></tr><tr><td>Set&lt;T&gt;</td><td>size, contains, isEmpty</td></tr><tr><td>Map&lt;K,V&gt;</td><td>size, containsKey, getOrDefault, keys, values, entries</td></tr><tr><td>MutableMap&lt;K,V&gt;</td><td>put, remove, clear, getOrPut, getOrDefault</td></tr></table><h3>Built-in Functions / Standard Library</h3><h4>Scope Functions</h4><table><tr><th>Function</th><th>Receiver</th><th>Returns</th><th>Usage</th></tr><tr><td>let</td><td>it</td><td>Lambda result</td><td>Nullable transformation</td></tr><tr><td>run</td><td>this</td><td>Lambda result</td><td>Config + compute</td></tr><tr><td>with</td><td>this</td><td>Lambda result</td><td>Group calls</td></tr><tr><td>apply</td><td>this</td><td>Receiver itself</td><td>Object configuration</td></tr><tr><td>also</td><td>it</td><td>Receiver itself</td><td>Side effects</td></tr></table><h4>Collections API</h4><ul><li><code>filter</code>, <code>map</code>, <code>flatMap</code>, <code>flatten</code></li><li><code>reduce</code>, <code>fold</code>, <code>scan</code>, <code>runningFold</code></li><li><code>groupBy</code>, <code>partition</code>, <code>chunked</code>, <code>windowed</code></li><li><code>zip</code>, <code>unzip</code>, <code>associate</code>, <code>associateBy</code></li><li><code>take</code>, <code>drop</code>, <code>slice</code>, <code>distinct</code>, <code>distinctBy</code></li><li><code>first</code>, <code>last</code>, <code>single</code>, <code>find</code></li><li><code>any</code>, <code>all</code>, <code>none</code></li><li><code>sortedBy</code>, <code>sortedByDescending</code></li></ul><h4>Coroutines (kotlinx.coroutines)</h4><ul><li><code>launch</code> - Fire-and-forget coroutine</li><li><code>async</code> / <code>await</code> - Deferred result</li><li><code>withContext</code> - Switch dispatcher (IO, Default, Main)</li><li><code>Flow</code> - Cold stream: collect, map, filter, catch, combine</li><li><code>StateFlow</code> / <code>SharedFlow</code> - Hot state/event flows</li><li><code>Channel</code> - Inter-coroutine communication</li><li><code>delay</code> - Non-blocking sleep</li></ul><h3>Syntax Highlights</h3><ul><li><strong>Null safety</strong>: Non-nullable by default. T? for nullable. ?., ?:, !!</li><li><strong>Extension functions</strong>: fun String.isEmail(): Boolean</li><li><strong>Data classes</strong>: data class User(val name: String, val age: Int)</li><li><strong>Sealed classes</strong>: exhaustive when branches</li><li><strong>When expression</strong>: when { is String -&gt; }</li><li><strong>Destructuring</strong>: val (name, age) = user</li><li><strong>String templates</strong>: &quot;Hello ${user.name}&quot;</li><li><strong>Trailing lambda</strong>: thread { doWork() }</li><li><strong>Operator overloading</strong>: operator fun plus(other: Point)</li><li><strong>inline / reified</strong>: reified type parameters</li></ul><h3>Common API Patterns</h3><pre>// Sealed class + StateFlow\nsealed class UiState&lt;out T&gt; {\n    object Loading : UiState&lt;Nothing&gt;()\n    data class Success&lt;T&gt;(val data: T) : UiState&lt;T&gt;()\n    data class Error(val e: Throwable) : UiState&lt;Nothing&gt;()\n}\nclass ViewModel(private val repo: Repo) {\n    private val _state = MutableStateFlow&lt;UiState&lt;List&lt;User&gt;&gt;&gt;(UiState.Loading)\n    val state: StateFlow&lt;UiState&lt;List&lt;User&gt;&gt;&gt; = _state.asStateFlow()\n}</pre><h3>Package Management &amp; Tooling</h3><ul><li><strong>Gradle</strong> - build.gradle.kts, Kotlin DSL, Wrapper</li><li><strong>Maven</strong> - pom.xml, kotlin-maven-plugin</li><li><strong>KMP</strong> - expect/actual, multiplatform projects</li><li><strong>kotlinx</strong> - coroutines, serialization, datetime</li><li><strong>Testing</strong>: kotlin.test, MockK, Turbine (Flow)</li><li><strong>Doc</strong>: Dokka (KDoc)</li><li><strong>Linting</strong>: detekt, ktlint</li></ul>"},{"category":"Programming Languages","title":"Lua","tags":["interpreted","embedded","lightweight","scripting","game-dev"],"summary":"Lua is a lightweight, embeddable scripting language designed for configuration, game scripting, and extensibility.","content":"<h3>Core Types &amp; Data Structures</h3><table><tr><th>Type</th><th>Description</th><th>Key Operations</th></tr><tr><td>nil</td><td>Absence of value</td><td>Comparison, type() returns &quot;nil&quot;</td></tr><tr><td>boolean</td><td>true / false</td><td>not, and, or operators. Only false/nil are falsy</td></tr><tr><td>number</td><td>Double-precision IEEE 754</td><td>+, -, *, /, // (floor div), ^, %, math, bit32 (5.2)</td></tr><tr><td>string</td><td>Immutable byte sequence</td><td>.. (concat), # (length), string.upper, string.lower, string.sub, string.find, string.match, string.gsub, string.gmatch, string.reverse, string.format, string.byte, string.char, string.rep, string.dump</td></tr><tr><td>table</td><td>Associative array (sole DS)</td><td>[], #, table.insert, table.remove, table.sort, table.concat, table.pack, table.unpack, table.move, table.foreachi, pairs, ipairs, next</td></tr><tr><td>function</td><td>First-class function</td><td>Multiple returns, closures, upvalues, varargs (...), tail calls</td></tr><tr><td>userdata</td><td>C data (opaque)</td><td>Pass through, metatable __gc for finalization</td></tr><tr><td>thread</td><td>Coroutine</td><td>coroutine.create, coroutine.resume, coroutine.yield, coroutine.status, coroutine.wrap, coroutine.running</td></tr></table><h3>Built-in Functions / Standard Library</h3><h4>Basic Functions</h4><ul><li><code>print()</code> - Output to stdout</li><li><code>type()</code> - Return type name as string: &quot;nil&quot;, &quot;number&quot;, &quot;string&quot;, &quot;boolean&quot;, &quot;table&quot;, &quot;function&quot;, &quot;thread&quot;, &quot;userdata&quot;</li><li><code>ipairs(t)</code> - Iterator over array part (1..n)</li><li><code>pairs(t)</code> - Iterator over all key-value pairs</li><li><code>next(table, index)</code> - Next key-value pair</li><li><code>tonumber(s, base)</code> - Convert string to number</li><li><code>tostring(v)</code> - Convert value to string</li><li><code>error(msg, level)</code> - Throw error</li><li><code>pcall(f, ...)</code> / <code>xpcall(f, msgh)</code> - Protected call</li><li><code>assert(v, msg)</code> - Assertion</li><li><code>select(index, ...)</code> - Select vararg or count (#)</li><li><code>dofile(filename)</code> - Execute file</li><li><code>load(chunk, chunkname, mode, env)</code> - Load code chunk</li><li><code>rawequal, rawget, rawset, rawlen</code> - Raw table access (bypassing metatables)</li><li><code>setmetatable, getmetatable</code></li></ul><h4>String Library (string.*)</h4><ul><li>string.byte, string.char, string.dump, string.find, string.format, string.gmatch, string.gsub, string.len, string.lower, string.match, string.pack, string.packsize, string.rep, string.reverse, string.sub, string.unpack, string.upper</li></ul><h4>Table Library (table.*)</h4><ul><li>table.concat, table.insert, table.move, table.pack, table.remove, table.sort, table.unpack</li></ul><h4>Math Library (math.*)</h4><ul><li>math.abs, math.acos, math.asin, math.atan, math.atan2, math.ceil, math.cos, math.cosh, math.deg, math.exp, math.floor, math.fmod, math.huge, math.log, math.max, math.maxinteger, math.min, math.mininteger, math.modf, math.pi, math.pow, math.rad, math.random, math.randomseed, math.sin, math.sinh, math.sqrt, math.tan, math.tanh, math.tointeger, math.type, math.ult</li></ul><h4>I/O Library (io.*)</h4><ul><li>io.open, io.input, io.output, io.lines, io.read, io.write, io.flush, io.tmpfile, io.type, io.popen, io.stderr, io.stdin, io.stdout, file:read, file:write, file:lines, file:seek, file:setvbuf, file:flush, file:close, file:type</li></ul><h3>Syntax Highlights</h3><ul><li><strong>Tables as sole data structure</strong>: arrays, dicts, objects all use tables</li><li><strong>First-class functions</strong>: functions can be assigned, passed, returned</li><li><strong>Multiple returns</strong>: function foo() return 1, 2, 3 end</li><li><strong>Closures / upvalues</strong>: inner functions capture local variables</li><li><strong>Metatables</strong>: __index, __newindex, __gc, __add, __call, __tostring, __len, __pairs, __ipairs, __mode (weak refs)</li><li><strong>Coroutines</strong>: Stackful asymmetric coroutines: coroutine.create/resume/yield</li><li><strong>Varargs</strong>: function f(...) local args = table.pack(...) end</li><li><strong>Table constructors</strong>: {1, 2, 3} (array), {x=1, y=2} (record), {[&quot;key&quot;]=val}</li><li><strong>Colon syntax</strong>: obj:method(args) sugar for obj.method(obj, args)</li><li><strong>__gc metamethod</strong>: finalization via metatables (Lua 5.2+)</li></ul><h3>Common API Patterns</h3><pre>-- OOP via metatables\nAccount = { balance = 0 }\nfunction Account:new(o)\n    o = o or {}\n    setmetatable(o, self)\n    self.__index = self\n    return o\nend\nfunction Account:deposit(amount)\n    self.balance = self.balance + amount\nend\n-- Coroutine pipeline\nco = coroutine.create(function()\n    for i = 1, 10 do\n        coroutine.yield(i * i)\n    end\nend)\nfor i = 1, 10 do\n    print(coroutine.resume(co))\nend</pre><h3>Package Management &amp; Tooling</h3><ul><li><strong>Luarocks</strong> - Package manager: luarocks install/search/list/build/make/pack/upload</li><li><strong>LuaJIT</strong> - Just-In-Time compiler (FFI library, 10x speed)</li><li><strong>Interpreters</strong>: Lua 5.1, 5.2, 5.3, 5.4, LuaJIT, Luau (Roblox)</li><li><strong>Debugging</strong>: debug library (debug.debug, debug.getinfo, debug.traceback), ZeroBrane Studio, MobDebug</li><li><strong>Use cases</strong>: Game scripting (Love2D, Defold, Corona), Embedded (nginx, Redis, Wireshark), Neovim, AwesomeWM</li></ul>"},{"category":"Programming Languages","title":"PHP","tags":["interpreted","web","server-side","Laravel","WordPress","scripting"],"summary":"PHP is a popular scripting language for web development, powering WordPress, Facebook, and Wikipedia with modern features in PHP 8.x.","content":"<h3>Core Types &amp; Data Structures</h3><table><tr><th>Type</th><th>Key Functions/Methods</th></tr><tr><td>int</td><td>abs(), round(), ceil(), floor(), min(), max(), intdiv(), is_int()</td></tr><tr><td>float</td><td>abs(), round(), ceil(), floor(), is_nan(), is_infinite(), number_format()</td></tr><tr><td>string</td><td>strlen(), strpos(), substr(), str_replace(), preg_match(), preg_replace(), explode(), implode(), trim(), strtoupper(), strtolower(), htmlspecialchars(), json_encode(), json_decode(), strip_tags()</td></tr><tr><td>bool</td><td>(bool) cast, is_bool(), var_dump()</td></tr><tr><td>array</td><td>array_map(), array_filter(), array_reduce(), array_merge(), array_keys(), array_values(), in_array(), array_search(), array_unique(), array_diff(), sort(), push(), pop(), shift(), unset()</td></tr><tr><td>object</td><td>get_class(), method_exists(), property_exists(), instanceof</td></tr><tr><td>callable</td><td>call_user_func(), call_user_func_array(), is_callable()</td></tr></table><h3>Built-in Functions / Standard Library</h3><h4>String Functions</h4><ul><li><code>mb_*</code> - mb_strlen(), mb_strpos(), mb_substr(), mb_strtolower()</li><li>preg_match(), preg_match_all(), preg_replace(), preg_split()</li><li>urlencode(), urldecode(), parse_url(), http_build_query()</li></ul><h4>Array Functions</h4><ul><li>sort(), rsort(), asort(), ksort(), usort(), array_multisort()</li><li>array_map(), array_filter(), array_reduce(), array_walk()</li><li>array_chunk(), array_flip(), array_reverse()</li></ul><h4>File System</h4><ul><li>file_get_contents(), file_put_contents(), fopen(), fclose()</li><li>file_exists(), is_file(), is_dir(), filesize(), filemtime()</li><li>mkdir(), rmdir(), unlink(), copy(), rename(), glob()</li></ul><h4>PDO (Database)</h4><ul><li>PDO constructor, query(), exec(), prepare(), execute(), fetch(), fetchAll(), lastInsertId()</li></ul><h3>Syntax Highlights</h3><ul><li><strong>Named arguments (8.0)</strong>: function(name: &quot;John&quot;)</li><li><strong>Attributes (8.0)</strong>: #[Route(&quot;/api&quot;)]</li><li><strong>Constructor promotion (8.0)</strong>: __construct(private string $name)</li><li><strong>Union types (8.0)</strong>: function foo(): int | string</li><li><strong>Match expression (8.0)</strong>: match($x) { 1 =&gt; &quot;one&quot; }</li><li><strong>Enums (8.1)</strong>: enum Status: string { case Active = &apos;active&apos;; }</li><li><strong>Readonly (8.1)</strong>: readonly string $name</li><li><strong>Fibers (8.1)</strong>: Fiber cooperative multitasking</li><li><strong>Nullsafe (8.0)</strong>: $user?-&gt;getAddress()?-&gt;city</li></ul><h3>Common API Patterns</h3><pre>// PDO prepared statement\n$stmt = $pdo-&gt;prepare(&apos;SELECT * FROM users WHERE id = :id&apos;);\n$stmt-&gt;execute([&apos;id&apos; =&gt; $id]);\n$user = $stmt-&gt;fetch(PDO::FETCH_ASSOC);\n// Modern readonly DTO\nreadonly class UserDto {\n    public function __construct(\n        public string $name,\n        public int $age,\n    ) {}\n}</pre><h3>Package Management &amp; Tooling</h3><ul><li><strong>Composer</strong> - composer.json, composer.lock, Packagist</li><li><strong>PHP-FIG</strong> - PSR standards (PSR-4, PSR-7, PSR-15)</li><li><strong>Testing</strong>: PHPUnit, Pest, PHPStan, Psalm</li><li><strong>Frameworks</strong>: Laravel, Symfony, Yii2, CakePHP</li><li><strong>Linting</strong>: PHP_CodeSniffer, PHP-CS-Fixer, Rector</li></ul>"},{"category":"Programming Languages","title":"Python","tags":["interpreted","dynamically-typed","OOP","data-science","AI","scripting"],"summary":"Python is an interpreted, high-level language emphasizing readability. Dominant in data science, ML, and web development.","content":"<h3>Core Types &amp; Data Structures</h3><table><tr><th>Type</th><th>Mutable</th><th>Key Methods</th></tr><tr><td>int</td><td>No</td><td>bit_length(), to_bytes(), from_bytes(), as_integer_ratio(), is_integer()</td></tr><tr><td>float</td><td>No</td><td>is_integer(), hex(), fromhex(), as_integer_ratio()</td></tr><tr><td>complex</td><td>No</td><td>conjugate(), real, imag</td></tr><tr><td>bool</td><td>No</td><td>Subclass of int. Truthy/falsy evaluation</td></tr><tr><td>str</td><td>No</td><td>upper(), lower(), split(), join(), replace(), strip(), find(), index(), startswith(), endswith(), format(), encode(), count(), capitalize(), title()</td></tr><tr><td>list</td><td>Yes</td><td>append(), extend(), insert(), remove(), pop(), clear(), index(), count(), sort(), reverse(), copy()</td></tr><tr><td>tuple</td><td>No</td><td>count(), index()</td></tr><tr><td>dict</td><td>Yes</td><td>keys(), values(), items(), get(), pop(), popitem(), update(), setdefault(), clear(), copy()</td></tr><tr><td>set</td><td>Yes</td><td>add(), remove(), discard(), pop(), clear(), union(), intersection(), difference(), symmetric_difference()</td></tr><tr><td>bytes</td><td>No</td><td>decode(), fromhex(), hex(), translate()</td></tr></table><h3>Built-in Functions / Standard Library</h3><h4>Core Built-ins</h4><table><tr><th>Function</th><th>Signature</th><th>Description</th></tr><tr><td>len()</td><td>len(s) -&gt; int</td><td>Return length of sequence or collection</td></tr><tr><td>range()</td><td>range(start, stop, step) -&gt; iterator</td><td>Arithmetic progression of integers</td></tr><tr><td>enumerate()</td><td>enumerate(iterable, start=0) -&gt; iterator</td><td>Yields (index, value) tuples</td></tr><tr><td>zip()</td><td>zip(*iterables, strict=False) -&gt; iterator</td><td>Aggregate elements from multiple iterables</td></tr><tr><td>map()</td><td>map(func, *iterables) -&gt; iterator</td><td>Apply function to every item</td></tr><tr><td>filter()</td><td>filter(func, iterable) -&gt; iterator</td><td>Filter elements where function returns True</td></tr><tr><td>sorted()</td><td>sorted(iterable, key=None, reverse=False) -&gt; list</td><td>Return new sorted list</td></tr><tr><td>reversed()</td><td>reversed(seq) -&gt; iterator</td><td>Return reverse iterator</td></tr><tr><td>iter()</td><td>iter(object[, sentinel]) -&gt; iterator</td><td>Return iterator for object</td></tr><tr><td>next()</td><td>next(iterator[, default])</td><td>Retrieve next item from iterator</td></tr><tr><td>open()</td><td>open(file, mode, encoding=None) -&gt; file object</td><td>Open file and return file object</td></tr><tr><td>input()</td><td>input([prompt]) -&gt; str</td><td>Read string from stdin</td></tr><tr><td>eval()</td><td>eval(expression, globals, locals)</td><td>Evaluate Python expression string</td></tr><tr><td>type()</td><td>type(object) / type(name, bases, dict)</td><td>Return type or create new class</td></tr></table><h4>Key Standard Library Modules</h4><ul><li><code>os</code> - OS interface: getcwd(), listdir(), walk(), environ, path.join()</li><li><code>sys</code> - Interpreter: argv, exit(), stdout, stdin, stderr, path, modules</li><li><code>re</code> - Regex: search(), match(), findall(), finditer(), sub(), split()</li><li><code>json</code> - JSON: dumps(), loads(), dump(), load()</li><li><code>math</code> - Math: ceil(), floor(), factorial(), gcd(), sqrt(), sin(), cos(), pi, e</li><li><code>datetime</code> - datetime, date, time, timedelta, strftime(), strptime()</li><li><code>collections</code> - Counter, defaultdict, OrderedDict, deque, namedtuple</li><li><code>itertools</code> - chain, product, permutations, combinations, cycle, accumulate</li><li><code>functools</code> - reduce(), partial(), lru_cache(), cache, singledispatch</li><li><code>asyncio</code> - run(), create_task(), gather(), sleep(), Queue</li><li><code>pathlib</code> - Path(), PurePath, read_text(), write_text(), glob(), rglob()</li><li><code>typing</code> - List, Dict, Optional, Union, Any, TypeVar, Protocol, Literal</li></ul><h3>Syntax Highlights</h3><ul><li><strong>Indentation-based blocks</strong> - 4 spaces standard, replaces braces</li><li><strong>Comprehensions</strong>: [x**2 for x in range(10)] (list), {k: v for k, v in pairs} (dict)</li><li><strong>Generator expressions</strong>: (x**2 for x in range(10)) - lazy evaluation</li><li><strong>Decorators</strong>: @staticmethod, @classmethod, @property, @lru_cache</li><li><strong>Context managers</strong>: with open(file) as f: / async with session.get(url) as resp:</li><li><strong>Pattern matching (3.10+)</strong>: match value: case pattern if guard:</li><li><strong>Type hints</strong>: def func(x: int) -&gt; str:</li><li><strong>Walrus operator (3.8)</strong>: if (n := len(x)) &gt; 10:</li><li><strong>f-strings (3.6+)</strong>: f&quot;Hello {name}&quot; with = debug (3.8)</li><li><strong>Multiple assignment</strong>: a, b = b, a</li><li><strong>Unpacking</strong>: first, *rest, last = [1, 2, 3, 4, 5]</li></ul><h3>Common API Patterns</h3><pre># List comprehension with filtering\nsquares = [x**2 for x in range(20) if x % 2 == 0]\n# Dictionary merge\nmerged = {**dict1, **dict2}\n# Dataclass\nfrom dataclasses import dataclass\n@dataclass(frozen=True)\nclass Point:\n    x: float\n    y: float\n    def distance(self) -&gt; float:\n        return (self.x**2 + self.y**2)**0.5</pre><h3>Package Management &amp; Tooling</h3><ul><li><strong>pip</strong> - Official installer: pip install, requirements.txt, pyproject.toml</li><li><strong>Poetry</strong> - Modern: pyproject.toml, poetry.lock, poetry add/build/publish</li><li><strong>uv</strong> - Fast Rust-based package manager</li><li><strong>Virtual env</strong>: python -m venv .venv, virtualenv, pyenv</li><li><strong>Testing</strong>: pytest (fixtures, parametrize), unittest, doctest</li><li><strong>Linting</strong>: ruff (fast), black (formatter), mypy (type checker), pylint, isort</li><li><strong>Doc</strong>: Sphinx, MkDocs, pdoc</li></ul>"},{"category":"Programming Languages","title":"R","tags":["interpreted","statistics","data-science","visualization","CRAN"],"summary":"R is a language and environment for statistical computing and graphics, widely used in data analysis, research, and bioinformatics.","content":"<h3>Core Types &amp; Data Structures</h3><table><tr><th>Type</th><th>Description</th><th>Key Functions</th></tr><tr><td>numeric</td><td>Double-precision (default) or integer</td><td>+, -, *, /, ^, %%, %/%, abs, sqrt, exp, log, log10, log2, sin, cos, tan, round, ceiling, floor, trunc, signif</td></tr><tr><td>integer</td><td>32-bit integer (suffix L)</td><td>is.integer, as.integer, identical</td></tr><tr><td>character</td><td>String (length 1+)</td><td>nchar, substr, strsplit, paste, paste0, grep, grepl, sub, gsub, regexpr, gregexpr, str_extract, str_replace, toupper, tolower, trimws, sprintf, cat</td></tr><tr><td>logical</td><td>TRUE / FALSE / NA</td><td>&amp;&amp;, ||, !, isTRUE, isFALSE, any, all, xor, which</td></tr><tr><td>factor</td><td>Categorical variable (levels)</td><td>factor, levels, nlevels, is.factor, as.factor, droplevels, relevel, ordered</td></tr><tr><td>vector</td><td>Homogeneous sequence (atomic)</td><td>c(), length, names, sum, mean, median, min, max, range, var, sd, order, rank, sort, rev, table, unique, duplicated, which, %in%</td></tr><tr><td>matrix</td><td>2D homogeneous (nrow x ncol)</td><td>matrix, dim, nrow, ncol, rownames, colnames, t, %*%, diag, solve, eigen, svd, rowSums, colSums, rowMeans, colMeans, crossprod</td></tr><tr><td>array</td><td>N-dimensional homogeneous</td><td>array, dim, dimnames, aperm, apply, sweep</td></tr><tr><td>data.frame</td><td>Tabular data (list of vectors)</td><td>data.frame, nrow, ncol, names, row.names, head, tail, subset, transform, merge, rbind, cbind, split, aggregate, xtabs</td></tr><tr><td>list</td><td>Heterogeneous recursive</td><td>list, length, names, lapply, sapply, vapply, rapply, unlist, c</td></tr></table><h3>Built-in Functions / Standard Library</h3><h4>Base R Functions</h4><table><tr><th>Function</th><th>Description</th></tr><tr><td>c()</td><td>Combine into vector</td></tr><tr><td>seq()</td><td>Sequence generation: seq(from, to, by, length.out)</td></tr><tr><td>rep()</td><td>Replicate elements: rep(x, times, each, length.out)</td></tr><tr><td>length()</td><td>Length of vector/list</td></tr><tr><td>names()</td><td>Get/set names of object</td></tr><tr><td>dim()</td><td>Dimensions of array/matrix</td></tr><tr><td>summary()</td><td>Statistical summary (min, max, mean, quantiles)</td></tr><tr><td>str()</td><td>Structure of object (compact display)</td></tr><tr><td>head() / tail()</td><td>First/last n rows</td></tr><tr><td>unique()</td><td>Unique elements</td></tr><tr><td>table()</td><td>Frequency table</td></tr><tr><td>aggregate()</td><td>Group-wise summary statistics</td></tr><tr><td>apply()</td><td>Apply function over margins of array</td></tr><tr><td>lapply() / sapply()</td><td>Apply to each element of list/vector</td></tr><tr><td>tapply()</td><td>Apply over ragged array (by group)</td></tr><tr><td>mapply()</td><td>Multivariate apply</td></tr></table><h4>Statistical Functions</h4><ul><li><code>lm()</code> - Linear models: lm(y ~ x1 + x2, data)</li><li><code>glm()</code> - Generalized linear models: glm(y ~ x, family = binomial)</li><li><code>aov()</code> - ANOVA: aov(y ~ factor, data)</li><li><code>t.test()</code> - Student&apos;s t-test</li><li><code>cor()</code> / <code>cov()</code> - Correlation/covariance matrix</li><li><code>prcomp()</code> / <code>princomp()</code> - PCA</li></ul><h3>Syntax Highlights</h3><ul><li><strong>Vectorized operations</strong>: all operations work on vectors natively (no explicit loops)</li><li><strong>Formula interface</strong>: y ~ x1 + x2 used in models</li><li><strong>Recycling rules</strong>: shorter vectors recycled to match longer</li><li><strong>NA handling</strong>: na.rm = TRUE in most functions, is.na, na.omit, na.exclude</li><li><strong>S3/S4/R5 object systems</strong>: S3 generic + methods, S4 formal classes, R5 reference classes</li><li><strong>Pipe operator (4.1+)</strong>: |&gt; for function chaining</li><li><strong>Anonymous functions</strong>: function(x) x^2, \\(x) x^2 (4.1+)</li><li><strong>Scoping</strong>: Lexical scoping, <<- for assignment to parent</li><li><strong>Non-standard evaluation (NSE)</strong>: subset(df, x &gt; 0) where x is column</li></ul><h3>Common API Patterns</h3><pre># Base R pipe (4.1+)\nresult = iris |&gt;\n    subset(Species == &quot;setosa&quot;) |&gt;\n    aggregate(. ~ Species, data = _, FUN = mean)\n# Linear model workflow\nmodel &lt;- lm(mpg ~ wt + hp, data = mtcars)\nsummary(model)\npredict(model, newdata = data.frame(wt = 3, hp = 110))\n# Tidyverse equivalent\nlibrary(dplyr)\niris %&gt;%\n    filter(Species == &quot;setosa&quot;) %&gt;%\n    group_by(Species) %&gt;%\n    summarise(across(everything(), mean))</pre><h3>Package Management &amp; Tooling</h3><ul><li><strong>CRAN</strong> - Comprehensive R Archive Network (20,000+ packages)</li><li><strong>install.packages()</strong> / <strong>update.packages()</strong> / <strong>remove.packages()</strong></li><li><strong>library()</strong> / <strong>require()</strong> - Load packages</li><li><strong>RStudio</strong> - IDE: RStudio Server, R Markdown, Shiny apps</li><li><strong>Tidyverse</strong> - ggplot2, dplyr, tidyr, purrr, readr, stringr, forcats, lubridate, tibble</li><li><strong>Testing</strong>: testthat, tinytest, RUnit</li><li><strong>Package dev</strong>: devtools, usethis, roxygen2, pkgdown, R CMD check</li><li><strong>Shiny</strong> - Web apps: shinyServer, shinyUI, reactive, observeEvent</li></ul>"},{"category":"Programming Languages","title":"Ruby","tags":["interpreted","OOP","Rails","scripting","dynamically-typed","DSL"],"summary":"Ruby is an interpreted language emphasizing programmer productivity with elegant syntax, best known for Ruby on Rails.","content":"<h3>Core Types &amp; Data Structures</h3><table><tr><th>Type</th><th>Key Methods</th></tr><tr><td>Integer</td><td>times, upto, downto, step, even?, odd?, gcd, lcm, next, pred, chr, digits, bit_length, floor, ceil, round, abs</td></tr><tr><td>Float</td><td>round, ceil, floor, truncate, to_i, to_f, finite?, infinite?, nan?, abs, numerator, denominator</td></tr><tr><td>String</td><td>length, empty?, count, upcase, downcase, capitalize, reverse, split, lines, each_line, each_char, scan, gsub, sub, match, =~, index, include?, start_with?, end_with?, delete, tr, squeeze, strip, chomp, chop, next, ord, hex, oct, to_i, to_sym, unpack, ljust, center</td></tr><tr><td>Symbol</td><td>to_s, to_proc, ==, capitalize, downcase, upcase</td></tr><tr><td>Array</td><td>push, pop, shift, unshift, concat, flatten, compact, uniq, sort, sort_by, map, select, reject, reduce, each, each_with_index, any?, all?, none?, one?, include?, join, first, last, take, drop, combination, permutation, product, zip, transpose, sample, shuffle, slice, chunk, dig</td></tr><tr><td>Hash</td><td>[], []=, keys, values, key?, has_key?, fetch, store, merge, transform_keys, transform_values, select, reject, each, each_key, each_value, map, invert, dig, slice, except</td></tr><tr><td>Range</td><td>begin, end, exclude_end?, cover?, step, min, max, size, each</td></tr><tr><td>Time</td><td>now, at, parse, strftime, year, month, day, hour, min, sec, wday, yday, to_i, utc, local, iso8601</td></tr></table><h3>Built-in Functions / Standard Library</h3><h4>Kernel Methods</h4><ul><li><code>puts</code> / <code>print</code> / <code>p</code> / <code>pp</code> - Output</li><li><code>gets</code> - Input from stdin</li><li><code>require</code> / <code>load</code> - Load libraries</li><li><code>block_given?</code> / <code>yield</code> - Block handling</li><li><code>proc</code> / <code>lambda</code> - Create closures</li><li><code>raise</code> / <code>fail</code> / <code>catch</code> / <code>throw</code> - Exceptions</li><li><code>loop</code> - Infinite loop</li><li><code>rand</code> / <code>srand</code> - Random numbers</li><li><code>sleep</code> - Pause execution</li><li><code>eval</code> / <code>class_eval</code> - Dynamic code</li></ul><h4>Key Modules</h4><ul><li><code>Enumerable</code> - each, map, select, reject, reduce, group_by, sort_by, partition, all?, any?, grep, flat_map, chunk, lazy</li><li><code>Comparable</code> - &lt;, &lt;=, ==, &gt;=, &gt;, between?</li><li><code>JSON</code> - parse, generate, pretty_generate</li><li><code>File</code> - read, write, open, exist?, basename, dirname, extname, join, glob</li><li><code>Net::HTTP</code> - get, post, start, use_ssl</li><li><code>Date</code> / <code>DateTime</code> - new, today, parse, strftime, iso8601</li></ul><h3>Syntax Highlights</h3><ul><li><strong>Everything is an object</strong>: 42.methods returns array</li><li><strong>Open classes</strong>: redefine methods at runtime</li><li><strong>Blocks</strong>: .each { |x| puts x }, do/end syntax</li><li><strong>Yield</strong>: method defers to block</li><li><strong>Symbol to Proc</strong>: .map(&amp;:upcase)</li><li><strong>method_missing</strong>: dynamic dispatch for DSLs</li><li><strong>define_method</strong>: metaprogramming</li><li><strong>Splat</strong>: *args, first, *rest = array</li><li><strong>Postfix conditionals</strong>: puts &quot;yes&quot; if x &gt; 5</li><li><strong>Safe navigation (2.3+)</strong>: user&amp;.name</li><li><strong>Pattern matching (3.0+)</strong>: case val; in pattern then</li></ul><h3>Common API Patterns</h3><pre># Builder pattern with blocks\nclass QueryBuilder\n    def initialize(table)\n        @table = table; @conditions = []\n    end\n    def where(cond)\n        @conditions &lt;&lt; cond; self\n    end\nend\n# Enumerable chaining\nresult = (1..100)\n    .select(&amp;:even?)\n    .map { |x| x ** 2 }\n    .reduce(:+)</pre><h3>Package Management &amp; Tooling</h3><ul><li><strong>RubyGems</strong> - gem install, Gemfile, gemspec</li><li><strong>Bundler</strong> - bundle install/exec/update, Gemfile.lock</li><li><strong>RVM / rbenv / chruby</strong> - Version managers</li><li><strong>Testing</strong>: RSpec, Minitest, Capybara, FactoryBot</li><li><strong>Frameworks</strong>: Ruby on Rails, Sinatra, Hanami</li><li><strong>Jobs</strong>: Sidekiq, GoodJob, Delayed Job</li><li><strong>Linting</strong>: RuboCop, StandardRB</li></ul>"},{"category":"Programming Languages","title":"Rust","tags":["compiled","systems","memory-safe","concurrent","ownership","zero-cost"],"summary":"Rust enforces memory safety without a garbage collector through its ownership and borrow checking system.","content":"<h3>Core Types &amp; Data Structures</h3><table><tr><th>Type</th><th>Key Methods</th></tr><tr><td>i8-i128, u8-u128</td><td>abs(), checked_add(), overflowing_add(), wrapping_add(), saturating_add(), pow(), leading_zeros(), count_ones(), rotate_left(), swap_bytes(), reverse_bits()</td></tr><tr><td>f32, f64</td><td>sqrt(), abs(), ceil(), floor(), round(), sin(), cos(), powf(), exp(), ln(), is_nan(), is_infinite(), to_degrees()</td></tr><tr><td>bool</td><td>then(), then_some()</td></tr><tr><td>char</td><td>is_alphabetic(), is_digit(), is_whitespace(), to_uppercase(), to_lowercase()</td></tr><tr><td>Vec&lt;T&gt;</td><td>push(), pop(), insert(), remove(), retain(), dedup(), drain(), clear(), reserve(), shrink_to_fit(), capacity(), len()</td></tr><tr><td>String</td><td>push_str(), push(), pop(), truncate(), clear(), replace(), retain(), trim(), contains(), starts_with(), ends_with(), find()</td></tr><tr><td>HashMap&lt;K,V&gt;</td><td>insert(), entry(), or_insert(), and_modify(), get(), get_mut(), contains_key(), keys(), values()</td></tr><tr>

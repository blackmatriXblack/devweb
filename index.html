<td>HashSet&lt;T&gt;</td><td>insert(), remove(), contains(), union(), difference(), intersection(), is_subset()</td></tr><tr><td>Option&lt;T&gt;</td><td>unwrap(), unwrap_or(), map(), and_then(), ok_or(), is_some(), is_none(), take(), replace()</td></tr><tr><td>Result&lt;T,E&gt;</td><td>unwrap(), expect(), map(), map_err(), and_then(), or_else(), is_ok(), is_err()</td></tr></table><h3>Built-in Functions / Standard Library</h3><h4>Key Modules</h4><ul><li><code>std::io</code> - Read, Write traits, BufReader, BufWriter</li><li><code>std::fs</code> - read_to_string(), write(), read_dir(), File, OpenOptions</li><li><code>std::path</code> - Path, PathBuf, join(), exists(), is_file(), is_dir()</li><li><code>std::thread</code> - spawn(), sleep(), current(), JoinHandle</li><li><code>std::sync</code> - Mutex, RwLock, Arc, Barrier, mpsc channel</li><li><code>std::net</code> - TcpListener, TcpStream, UdpSocket</li><li><code>std::time</code> - Duration, Instant, SystemTime</li><li><code>std::process</code> - Command: new(), arg(), output(), spawn()</li></ul><h4>Iterator Methods</h4><ul><li><code>map</code>, <code>filter</code>, <code>fold</code>, <code>reduce</code>, <code>collect</code>, <code>for_each</code>, <code>enumerate</code>, <code>zip</code>, <code>chain</code>, <code>skip</code>, <code>take</code>, <code>flat_map</code>, <code>flatten</code>, <code>find</code>, <code>all</code>, <code>any</code>, <code>sum</code>, <code>product</code></li></ul><h3>Syntax Highlights</h3><ul><li><strong>Ownership</strong>: Each value has one owner. Moves on assignment</li><li><strong>Borrowing</strong>: &amp;T (shared), &amp;mut T (exclusive)</li><li><strong>Lifetimes</strong>: fn longest&lt;&apos;a&gt;(x: &amp;&apos;a str, y: &amp;&apos;a str) -&gt; &amp;&apos;a str</li><li><strong>Pattern matching</strong>: match x { 1 =&gt; &quot;one&quot;, _ =&gt; &quot;other&quot; }</li><li><strong>if let</strong>: if let Some(val) = opt { }</li><li><strong>Traits</strong>: Define shared behavior. Derive: #[derive(Debug, Clone)]</li><li><strong>Error with ?</strong>: let val = do_something()?;</li><li><strong>Unsafe</strong>: *const T, *mut T, FFI, asm!</li><li><strong>Macros</strong>: println!, vec!, format!, todo!, unreachable!</li></ul><h3>Common API Patterns</h3><pre>// Builder pattern\n#[derive(Default)]\nstruct Config { host: String, port: u16 }\nimpl Config {\n    fn host(mut self, host: &amp;str) -&gt; Self { self.host = host.into(); self }\n    fn build(self) -&gt; Result&lt;Self, &amp;&apos;static str&gt; { Ok(self) }\n}\n// Async with tokio\n#[tokio::main]\nasync fn main() -&gt; Result&lt;()&gt; {\n    let client = reqwest::Client::new();\n    let resp = client.get(&quot;https://api.example.com&quot;).send().await?;\n    println!(&quot;{}&quot;, resp.status());\n    Ok(())\n}</pre><h3>Package Management &amp; Tooling</h3><ul><li><strong>Cargo</strong> - Cargo.toml, cargo build/run/test/check/doc/fmt/clippy</li><li><strong>crates.io</strong> - Package registry with semver</li><li><strong>Rustup</strong> - Toolchain manager</li><li><strong>rustfmt</strong> - Code formatter</li><li><strong>Clippy</strong> - Linter (600+ rules)</li><li><strong>rust-analyzer</strong> - LSP server</li><li><strong>Testing</strong>: cargo test, #[test], criterion, proptest</li></ul>"},{"category":"Programming Languages","title":"Scala","tags":["compiled","JVM","functional","OOP","immutable","type-safe","Big Data"],"summary":"Scala blends object-oriented and functional programming on the JVM, known for its expressive type system and use in data engineering.","content":"<h3>Core Types &amp; Data Structures</h3><table><tr><th>Type</th><th>Key Methods</th></tr><tr><td>Byte, Short, Int, Long</td><td>toByte, toShort, toInt, toLong, toFloat, toDouble, abs, min, max, signum, until, to</td></tr><tr><td>Float, Double</td><td>isNaN, isInfinity, round, ceil, floor, abs, signum</td></tr><tr><td>Boolean</td><td>&amp;&amp;, ||, !, &amp; , |</td></tr><tr><td>String</td><td>length, substring, split, replace, toInt, toDouble, capitalize, format, stripMargin, *, cast</td></tr><tr><td>Option[T]</td><td>getOrElse, map, flatMap, filter, fold, orElse, isDefined, isEmpty, contains</td></tr><tr><td>Either[L,R]</td><td>map, flatMap, getOrElse, merge, swap, isLeft, isRight</td></tr><tr><td>Try[T]</td><td>map, flatMap, filter, recover, getOrElse, toOption, isSuccess, isFailure</td></tr></table><h4>Immutable Collections</h4><table><tr><th>Collection</th><th>Key Methods</th></tr><tr><td>List[T]</td><td>:: (cons), ::: (concat), head, tail, init, last, apply, length, map, flatMap, filter, partition, span, take, drop, foldLeft, foldRight, reduce, scan, zip, unzip, mkString, reverse, sorted, sortBy</td></tr><tr><td>Vector[T]</td><td>Same as List, O(1) apply/update</td></tr><tr><td>Set[T]</td><td>contains, incl, excl, union, intersect, diff, subsetOf</td></tr><tr><td>Map[K,V]</td><td>get, apply, contains, keys, values, updated, removed, mapValues, filterKeys, getOrElse</td></tr></table><h3>Built-in Functions / Standard Library</h3><h4>scala.collection</h4><ul><li><strong>immutable</strong>: List, Vector, Set, Map, Queue, Stream (LazyList in 2.13+)</li><li><strong>mutable</strong>: ArrayBuffer, ListBuffer, HashMap, HashSet, Stack, Queue</li><li><strong>concurrent</strong>: TrieMap, Future.sequence, ParVector, parallel collections</li></ul><h4>scala.concurrent</h4><ul><li><code>Future</code> - map, flatMap, recover, recoverWith, fallbackTo, zip, transform, onComplete, andThen</li><li><code>Promise</code> - success, failure, complete, trySuccess, tryFailure</li><li><code>Await</code> - result, ready (blocking)</li><li><code>ExecutionContext</code> - Implicit thread pool, global, fromExecutor</li></ul><h4>scala.io / scala.util</h4><ul><li><code>Source</code> - fromFile, fromURL, fromString, getLines, mkString, buffered</li><li><code>Using</code> - Automatic resource management (2.13+)</li><li><code>Random</code> - nextInt, nextDouble, shuffle, between</li><li><code>Try</code> / <code>Success</code> / <code>Failure</code> - Functional error handling</li></ul><h4>Key Type Classes</h4><ul><li><code>Ordering[T]</code> - Comparison traits: Ordering.by, Ordering.on</li><li><code>Numeric[T]</code> - Generic numeric operations</li><li><code>TypeTag</code> / <code>ClassTag</code> - Runtime type information</li></ul><h3>Syntax Highlights</h3><ul><li><strong>Immutability by default</strong>: val vs var</li><li><strong>Case classes</strong>: case class Person(name: String, age: Int)</li><li><strong>Pattern matching</strong>: exhaustive match with extractors</li><li><strong>For-comprehensions</strong>: syntactic sugar for flatMap/map</li><li><strong>Implicits (Scala 2)</strong> / Given/Using (Scala 3)</li><li><strong>Algebraic Data Types</strong>: sealed trait + case class/object</li><li><strong>Extension methods (Scala 3)</strong>: extension on String</li><li><strong>Union/Intersection types (Scala 3)</strong>: Int | String</li><li><strong>Opaque types (Scala 3)</strong>: opaque type Password = String</li></ul><h3>Common API Patterns</h3><pre>// For-comprehension with Futures\ndef getUser(id: Int): Future[User]\ndef getPosts(user: User): Future[List[Post]]\nval result: Future[List[Post]] = for {\n    user  &lt;- getUser(42)\n    posts &lt;- getPosts(user)\n} yield posts.filter(_.published)</pre><h3>Package Management &amp; Tooling</h3><ul><li><strong>sbt</strong> - Build tool: build.sbt, libraryDependencies</li><li><strong>Mill</strong> - Alternative build tool</li><li><strong>Scala 3</strong> - scalac compiler, -Xprint, -Xlint</li><li><strong>Frameworks</strong>: Akka, Play, Cats, ZIO, http4s</li><li><strong>Big Data</strong>: Apache Spark (Scala native)</li></ul>"},{"category":"Programming Languages","title":"Swift","tags":["compiled","Apple","iOS","macOS","type-safe","protocol-oriented","ARC"],"summary":"Swift is Apple's compiled language for Apple platforms with protocol-oriented programming and ARC memory management.","content":"<h3>Core Types &amp; Data Structures</h3><table><tr><th>Type</th><th>Key Methods/Properties</th></tr><tr><td>Int, Int8..Int64</td><td>isMultiple(of:), random(in:), distance(to:), advanced(by:), byteSwapped, leadingZeroBitCount, nonzeroBitCount, bigEndian, littleEndian</td></tr><tr><td>UInt, UInt8..UInt64</td><td>Same as Int (unsigned)</td></tr><tr><td>Float, Double</td><td>isNaN, isInfinite, isFinite, rounded(), squareRoot(), nextUp, nextDown, exponent, significand</td></tr><tr><td>Bool</td><td>toggle(), ! operator</td></tr><tr><td>String</td><td>count, isEmpty, append, insert, remove, split, prefix, suffix, trimmingCharacters, lowercased, uppercased, capitalized, hasPrefix, hasSuffix, contains, replacingOccurrences</td></tr><tr><td>Array&lt;T&gt;</td><td>append, insert(at:), remove(at:), sort, sorted, shuffle, shuffled, map, filter, reduce, forEach, first(where:), contains, allSatisfy</td></tr><tr><td>Set&lt;T&gt;</td><td>insert, remove, contains, union, intersection, symmetricDifference, subtracting, isSubset, isSuperset, isDisjoint</td></tr><tr><td>Dictionary&lt;K,V&gt;</td><td>updateValue, removeValue, keys, values, mapValues, compactMapValues, merge, grouping</td></tr><tr><td>Optional&lt;Wrapped&gt;</td><td>map, flatMap, ?? (nil-coalescing), if let, guard let, optional chaining ?.</td></tr></table><h3>Built-in Functions / Standard Library</h3><h4>Key Protocols</h4><ul><li><code>Equatable</code> - ==, != auto-generated</li><li><code>Comparable</code> - &lt;, &gt;, &lt;=, &gt;=, range operators</li><li><code>Hashable</code> - Set and Dictionary key support</li><li><code>Codable</code> - JSON/PropertyList encode/decode</li><li><code>Identifiable</code> - List diffing support</li><li><code>Sequence</code> - for-in, map, filter, reduce</li><li><code>Collection</code> - count, isEmpty, prefix, suffix, first</li></ul><h4>Foundation Types</h4><ul><li><code>Data</code> - count, append, base64EncodedString</li><li><code>UUID</code> - UUID(), uuidString</li><li><code>URL</code> - init?(string:), appendingPathComponent, queryItems</li><li><code>Date</code> - now, addingTimeInterval, timeIntervalSince</li><li><code>Calendar</code> / <code>DateComponents</code> - Calendar.current</li><li><code>Measurement</code> / <code>Unit</code> - UnitLength, UnitMass, UnitDuration</li></ul><h3>Syntax Highlights</h3><ul><li><strong>Optional chaining</strong>: person?.name?.uppercased()</li><li><strong>Nil coalescing</strong>: val ?? default</li><li><strong>Guard</strong>: guard let x = opt else { return }</li><li><strong>Pattern matching switch</strong>: switch val { case 0...9: }</li><li><strong>Value semantics</strong>: structs preferred over classes</li><li><strong>Property wrappers</strong>: @Published, @State, @Binding</li><li><strong>Result builders</strong>: @ViewBuilder, @SceneBuilder</li><li><strong>Key paths</strong>: \\\\Person.name</li><li><strong>Actors (5.5+)</strong>: actor MyActor { }</li><li><strong>Async/await (5.5+)</strong>: async func, try await</li></ul><h3>Common API Patterns</h3><pre>// Protocol-oriented networking\nprotocol Endpoint {\n    var path: String { get }\n    func request() -&gt; URLRequest\n}\nextension Endpoint {\n    func request() -&gt; URLRequest {\n        let url = URL(string: &quot;https://api.example.com&quot;)!.appendingPathComponent(path)\n        return URLRequest(url: url)\n    }\n}\n// SwiftUI View\nstruct ContentView: View {\n    @State private var count = 0\n    var body: some View {\n        Button(&quot;Count: \\(count)&quot;) { count += 1 }\n    }\n}</pre><h3>Package Management &amp; Tooling</h3><ul><li><strong>SPM</strong> - Package.swift, swift package init/build</li><li><strong>CocoaPods</strong> - Podfile, pod install (legacy)</li><li><strong>Carthage</strong> - Cartfile (legacy)</li><li><strong>Xcode</strong> - Schemes, Instruments, Previews</li><li><strong>swift-format</strong> / <strong>SwiftLint</strong></li><li><strong>DocC</strong> - Documentation compiler</li><li><strong>Testing</strong>: XCTest, swift-testing (6.0+)</li></ul>"},{"category":"Programming Languages","title":"TypeScript","tags":["compiled","statically-typed","superset","Microsoft","generics"],"summary":"TypeScript is a strict superset of JavaScript adding static typing, interfaces, generics, and advanced type features.","content":"<h3>Core Types &amp; Data Structures</h3><table><tr><th>Type</th><th>Syntax</th><th>Description</th></tr><tr><td>Primitives</td><td>string, number, boolean, null, undefined, void, never, any, unknown, bigint, symbol</td><td>Basic value types</td></tr><tr><td>Array</td><td>T[] or Array&lt;T&gt;</td><td>Homogeneous ordered list</td></tr><tr><td>Tuple</td><td>[string, number, ...boolean[]]</td><td>Fixed-length with variadic rest</td></tr><tr><td>Enum</td><td>enum E { A, B = 2 }</td><td>Named constants</td></tr><tr><td>Union</td><td>A | B</td><td>Value can be one of listed types</td></tr><tr><td>Intersection</td><td>A &amp; B</td><td>Value satisfies both types</td></tr><tr><td>Literal</td><td>&quot;hello&quot; | 42</td><td>Specific exact values</td></tr><tr><td>Mapped</td><td>{ [K in keyof T]: V }</td><td>Transform keys/values</td></tr><tr><td>Conditional</td><td>T extends U ? X : Y</td><td>Type-level conditional logic</td></tr></table><h3>Built-in Functions / Standard Library</h3><h4>Utility Types</h4><table><tr><th>Utility</th><th>Description</th></tr><tr><td>Partial&lt;T&gt;</td><td>All properties optional</td></tr><tr><td>Required&lt;T&gt;</td><td>All properties required</td></tr><tr><td>Readonly&lt;T&gt;</td><td>All properties readonly</td></tr><tr><td>Pick&lt;T, K&gt;</td><td>Select keys K from T</td></tr><tr><td>Omit&lt;T, K&gt;</td><td>Remove keys K from T</td></tr><tr><td>Record&lt;K, V&gt;</td><td>Object with keys K, values V</td></tr><tr><td>Exclude&lt;T, U&gt;</td><td>Exclude U from union T</td></tr><tr><td>Extract&lt;T, U&gt;</td><td>Extract assignable to U</td></tr><tr><td>ReturnType&lt;T&gt;</td><td>Return type of function T</td></tr><tr><td>Parameters&lt;T&gt;</td><td>Parameter tuple of function T</td></tr><tr><td>Awaited&lt;T&gt;</td><td>Unwraps Promise&lt;T&gt;</td></tr></table><h4>Key Type Operators</h4><ul><li><code>keyof T</code> - Union of all property keys</li><li><code>typeof x</code> - Type of runtime value x</li><li><code>infer</code> - Type inference in conditionals</li><li><code>as const</code> - Narrow literal inference</li><li><code>satisfies</code> - Validate without widening (4.9)</li><li><code>asserts</code> - Assertion function type</li></ul><h3>Syntax Highlights</h3><ul><li><strong>Interfaces vs Types</strong>: interface (extensible, merging) vs type (aliases, unions)</li><li><strong>Generics</strong>: function identity&lt;T&gt;(arg: T): T {}</li><li><strong>Type guards</strong>: typeof, instanceof, user-defined: x is Type</li><li><strong>Discriminated unions</strong>: kind field narrowing</li><li><strong>Template literal types</strong>: type Event = `on${string}`</li><li><strong>Mapped types</strong>: { [K in keyof T]: T[K] | null }</li><li><strong>Module augmentation</strong>: declare module &quot;express&quot; { }</li><li><strong>Declaration merging</strong>: multiple interfaces merge</li></ul><h3>Common API Patterns</h3><pre>// Generic API response type\ninterface ApiResponse&lt;T&gt; {\n  data: T;\n  status: number;\n  error?: string;\n}\n// Discriminated union pattern\ntype Result&lt;T&gt; =\n  | { success: true; value: T }\n  | { success: false; error: Error };</pre><h3>Package Management &amp; Tooling</h3><ul><li><strong>Compiler</strong>: tsc (tsconfig.json, strict: true)</li><li><strong>Alternatives</strong>: SWC, esbuild, sucrase</li><li><strong>Testing</strong>: vitest, ts-jest, bun:test</li><li><strong>Linting</strong>: typescript-eslint</li><li><strong>Runtime validation</strong>: zod, typebox, io-ts</li><li><strong>Declaration files</strong>: DefinitelyTyped (@types/*)</li><li><strong>Bundlers</strong>: tsup, rollup, Vite</li></ul>"},{"category":"Software Engineering","title":"CI/CD","tags":["devops","automation","pipeline","deployment","testing","integration","delivery"],"summary":"CI/CD (Continuous Integration/Continuous Delivery) automates build, test, and deployment pipelines for rapid software delivery.","content":"<h3>Core Concepts</h3><ul><li>Continuous Integration (CI): developers merge code to main branch multiple times daily. Automated build + test runs on each push. Catches integration errors early. Key practices: commit often (daily), build automation, fast feedback (<10 min), branch protection rules (required status checks, PR approvals), merge queue (linear history).</li><li>Continuous Delivery (CD): automated deployment pipeline after CI. Code always in deployable state. Deployment to staging is automatic. Production deployment may require manual approval (release button). Key practices: automated release process, versioned artifacts, environment parity (dev/staging/prod identical), immutable infrastructure, zero-downtime deployments.</li><li>Continuous Deployment: every commit that passes CI goes straight to production without manual intervention. Requires comprehensive testing (unit, integration, E2E, smoke), feature flags for dark launches, canary releases, observability (metrics, logs, traces), automated rollback.</li></ul><h3>Pipeline Stages and Configuration</h3><table><tr><th>Stage</th><th>Tools</th><th>Typical Commands</th></tr><tr><td>Checkout</td><td>Git</td><td><code>git clone repo</code>, <code>actions/checkout@v4</code></td></tr><tr><td>Code Quality</td><td>ESLint, Prettier, Pylint, Ruff, Checkstyle</td><td><code>npm run lint</code>, <code>ruff check .</code></td></tr><tr><td>Security Scan</td><td>SonarQube, Snyk, Trivy, Dependabot, CodeQL</td><td><code>snyk test</code>, <code>trivy fs .</code></td></tr><tr><td>Build</td><td>npm, Maven, Gradle, Webpack, Vite, Docker</td><td><code>npm run build</code>, <code>docker build -t image .</code></td></tr><tr><td>Unit Tests</td><td>Jest, Vitest, Pytest, JUnit, Go test</td><td><code>npm test -- --coverage</code></td></tr><tr><td>Integration Tests</td><td>Testcontainers, Supertest, Newman</td><td><code>docker compose up -d && npm run test:integration</code></td></tr><tr><td>Package</td><td>Docker, Helm, Artifactory, ECR, GHCR</td><td><code>docker push image</code></td></tr><tr><td>Deploy Staging</td><td>kubectl, Helm, Terraform, ArgoCD</td><td><code>kubectl apply -f k8s/ --namespace=staging</code></td></tr><tr><td>E2E / Smoke Tests</td><td>Cypress, Playwright, Selenium, k6</td><td><code>cypress run --config baseUrl=$STAGING_URL</code></td></tr><tr><td>Deploy Production</td><td>ArgoCD, Flux, Spinnaker, GitLab CI</td><td>manual approval gate, then <code>kubectl set image deploy/web app=image:v2</code></td></tr></table><h3>Common Patterns</h3><ul><li>Multi-branch Pipeline: CI runs on feature branches (lint + test). Merge to main triggers build + deploy to staging. Tagged release triggers deploy to production.</li><li>Deployment Strategies: Rolling Update (gradual pod replacement), Blue-Green (full new version next to old, switch traffic), Canary (route small % traffic to new version, monitor, then 100%), Feature Flags (deploy code hidden behind feature flag, enable per-user).</li><li>Artifact Versioning: semantic versioning (semver: MAJOR.MINOR.PATCH) or git SHA-based tags. Docker images: <code>myapp:1.2.3</code>, <code>myapp:sha-abc1234</code>.</li></ul><h3>Tool-Specific Configuration</h3><ul><li>GitHub Actions: .github/workflows/*.yml. GitLab CI: .gitlab-ci.yml. Jenkins: Jenkinsfile (declarative or scripted pipeline). CircleCI: .circleci/config.yml.</li><li>Self-hosted runners: GitHub Actions self-hosted (scale sets, auto-scaling via actions-runner-controller on K8s). GitLab runners (Docker, K8s, Shell, SSH executors). Jenkins agents (JNLP, SSH, Docker, K8s).</li><li>Secret Management: pipeline variables (masked in logs). Integrations: HashiCorp Vault (JWT/OIDC auth), AWS Secrets Manager, Azure Key Vault, GCP Secret Manager. OIDC: exchange cloud workload identity for short-lived credentials.</li></ul>"},{"category":"Software Engineering","title":"Docker","tags":["containers","devops","deployment","Dockerfile","runtime","image","compose"],"summary":"Docker packages applications in lightweight, portable containers with all dependencies for consistent environments.","content":"<h3>Core Concepts</h3><ul><li>Image: immutable read-only template built in layers (each Dockerfile instruction creates a layer). Base images: Alpine (~5MB), Ubuntu, Debian Slim, Distroless (no shell/package manager). Multi-stage builds: use different base for build and runtime (COPY --from=builder). Layers cached via buildkit, parallel building, inline caching.</li><li>Container: running instance of an image. Isolation via Linux namespaces: PID (process isolation), NET (network stack), MNT (mount points), UTS (hostname), IPC (inter-process communication), USER (user isolation). Resource limits via cgroups v2: CPU shares, memory limits (hard/soft), block IO, PID limits. Volumes: persistent data storage (docker volume create), managed by Docker. Bind mounts: map host directory into container. tmpfs: in-memory temporary storage.</li><li>Registry: distribution platform for images. Docker Hub (official images, automated builds, rate limited). Private registries: Amazon ECR (integrated with IAM), Google GCR/Artifact Registry, Azure ACR, GitHub GHCR, GitLab Container Registry. Self-hosted: Harbor, Nexus, Docker Registry v2.</li><li>Networking: bridge (default, internal NAT), host (shared host network), overlay (cross-host swarm), macvlan (assign MAC address), none (isolated). Docker Compose creates default bridge network per project.</li></ul><h3>Core CLI Commands</h3><table><tr><th>Command</th><th>Flags</th><th>Description</th></tr><tr><td><code>docker build -t name:tag .</code></td><td><code>-f</code> (Dockerfile path), <code>--target</code> (multi-stage), <code>--no-cache</code>, <code>--platform</code>, <code>--build-arg</code>, <code>--secret</code>, <code>--ssh</code>, <code>--cache-from</code></td><td>Build image</td></tr><tr><td><code>docker run -d --name c -p 8080:80 image</code></td><td><code>-it</code> (interactive), <code>--rm</code> (remove on exit), <code>-v</code> (volume), <code>--env/e</code>, <code>--network</code>, <code>--restart</code>, <code>--memory</code>, <code>--cpus</code>, <code>--health-cmd</code>, <code>-u</code> (user)</td><td>Create and start container</td></tr><tr><td><code>docker ps -a</code></td><td><code>-a</code> (all), <code>-q</code> (quiet), <code>--filter</code>, <code>--format</code></td><td>List containers</td></tr><tr><td><code>docker exec -it cont sh</code></td><td><code>-d</code> (detach), <code>-u</code> (user), <code>-w</code> (workdir)</td><td>Run command in container</td></tr><tr><td><code>docker logs -f cont</code></td><td><code>--tail</code>, <code>-t</code> (timestamps), <code>--since</code>, <code>--until</code></td><td>View container logs</td></tr><tr><td><code>docker images -a</code></td><td><code>--filter</code>, <code>--format</code>, <code>-q</code></td><td>List local images</td></tr><tr><td><code>docker push user/repo:tag</code></td><td><code>--all-tags</code></td><td>Push image to registry</td></tr><tr><td><code>docker pull image:tag</code></td><td><code>--platform</code>, <code>--all-tags</code></td><td>Pull image from registry</td></tr><tr><td><code>docker compose up -d</code></td><td><code>--build</code>, <code>--scale</code>, <code>--force-recreate</code>, <code>--no-deps</code>, <code>--wait</code></td><td>Start compose services</td></tr><tr><td><code>docker compose logs -f</code></td><td><code>--tail</code>, <code>--no-color</code></td><td>View compose logs</td></tr></table><h3>Configuration Reference</h3><ul><li>Dockerfile instructions: FROM base:tag AS stage, RUN command, COPY src dst, ADD src dst (supports URLs, tar auto-extract), CMD (default command), ENTRYPOINT (fixed command), EXPOSE port (metadata), ENV key=value, ARG name=default, WORKDIR /path, USER uid:gid, LABEL key=value, HEALTHCHECK, SHELL, VOLUME /data.</li><li>docker-compose.yml v3: top-level keys: version, services, networks, volumes, configs, secrets. Service keys: build, image, ports, volumes, environment, env_file, depends_on, healthcheck, deploy (swarm), restart, networks, secrets, configs, dns, tmpfs, entrypoint, command.</li></ul><h3>Integration APIs</h3><ul><li>Docker Engine API (REST): <code>GET /v1.45/containers/json</code>, <code>POST /v1.45/containers/create</code>, <code>POST /v1.45/containers/{id}/start</code>, <code>POST /v1.45/images/build?t=name</code>. Docker SDK for Python: <code>docker.from_env().containers.run(nginx, ports={80/tcp: 8080})</code>. Dockerode (Node.js).</li><li>Docker Compose API: docker compose up outputs JSON events via --format json. Docker Compose SDK (Python).</li><li>Container Runtimes: containerd (high-level runtime, manages containers via CRI), runc (OCI runtime spec), crun (C-based, faster than runc). Docker uses containerd internally since v1.11.</li></ul>"},{"category":"Software Engineering","title":"Git","tags":["VCS","version-control","distributed","branching","merge","GitHub","collaboration"],"summary":"Git is a distributed version control system for tracking code changes, designed for speed, data integrity, and non-linear workflows.","content":"<h3>Core Concepts</h3><ul><li>Data Model: content-addressable filesystem. Objects: Blob (file content, SHA-1 hash), Tree (directory listing mapping names to blobs/trees), Commit (snapshot: tree hash + parent hash(es) + author + committer + message), Tag (annotated: object hash + tagger + message, lightweight: just a ref). References: branches (mutable pointers to commits), HEAD (pointer to current branch or commit detached), tags (immutable).</li><li>Three States: Working Directory (modified files), Staging Area (index, tracked files ready for commit, stored in .git/index), Repository (.git directory, permanent commit history). Remote: copies on other machines/servers.</li><li>Merge Strategies: Fast-forward (linear, when target branch has no new commits), 3-way merge (creates merge commit with two parents), Recursive (default for multiple common ancestors), Octopus (merge more than 2 branches), Ours/Theirs (resolve conflicts by picking one side). Rebase: replay commits onto another base. Interactive rebase: squash, reorder, edit, drop commits. Cherry-pick: apply specific commit onto current HEAD.</li></ul><h3>Core Commands</h3><table><tr><th>Command</th><th>Flags</th><th>Description</th></tr><tr><td><code>git init</code></td><td><code>--bare</code>, <code>--template</code>, <code>--initial-branch</code></td><td>Initialize new repository</td></tr><tr><td><code>git clone url</code></td><td><code>--depth</code> (shallow), <code>--branch</code>, <code>--single-branch</code>, <code>--recurse-submodules</code></td><td>Clone remote repo</td></tr><tr><td><code>git add path</code></td><td><code>-A</code>, <code>-p</code> (patch), <code>-n</code> (dry-run), <code>--intent-to-add</code></td><td>Stage changes</td></tr><tr><td><code>git commit</code></td><td><code>-m</code> (message), <code>-a</code> (add all tracked), <code>--amend</code>, <code>--no-edit</code>, <code>-s</code> (sign-off), <code>-S</code> (GPG sign)</td><td>Create commit</td></tr><tr><td><code>git status</code></td><td><code>-s</code> (short), <code>-b</code> (branch info), <code>--ignored</code>, <code>--porcelain</code></td><td>Show working tree status</td></tr><tr><td><code>git log</code></td><td><code>--oneline</code>, <code>--graph</code>, <code>--all</code>, <code>--decorate</code>, <code>--author</code>, <code>--since</code>, <code>--grep</code>, <code>-p</code>, <code>--stat</code></td><td>Show commit history</td></tr><tr><td><code>git diff</code></td><td><code>--cached</code>, <code>--staged</code>, <code>--stat</code>, <code>--name-only</code>, <code>--word-diff</code></td><td>Show changes</td></tr><tr><td><code>git branch</code></td><td><code>-a</code> (all), <code>-r</code> (remote), <code>-d</code> (delete), <code>-D</code> (force delete), <code>-m</code> (rename), <code>--merged</code>, <code>--no-merged</code></td><td>Manage branches</td></tr><tr><td><code>git checkout</code></td><td><code>-b</code> (create + switch), <code>--track</code>, <code>--orphan</code>, <code>--detach</code></td><td>Switch branches/restore files</td></tr><tr><td><code>git merge branch</code></td><td><code>--ff-only</code>, <code>--no-ff</code>, <code>--squash</code>, <code>--abort</code>, <code>--continue</code></td><td>Merge branch into current</td></tr><tr><td><code>git rebase branch</code></td><td><code>-i</code> (interactive), <code>--onto</code>, <code>--continue</code>, <code>--skip</code>, <code>--abort</code>, <code>--autosquash</code></td><td>Rebase commits</td></tr><tr><td><code>git push</code></td><td><code>--force</code>, <code>--force-with-lease</code>, <code>--tags</code>, <code>--delete</code>, <code>--set-upstream</code></td><td>Push to remote</td></tr><tr><td><code>git pull</code></td><td><code>--rebase</code>, <code>--ff-only</code>, <code>--autostash</code></td><td>Fetch + merge from remote</td></tr><tr><td><code>git stash</code></td><td><code>push</code>, <code>pop</code>, <code>apply</code>, <code>list</code>, <code>drop</code>, <code>branch</code>, <code>-u</code> (include untracked)</td><td>Stash dirty changes</td></tr><tr><td><code>git reset</code></td><td><code>--soft</code>, <code>--mixed</code>, <code>--hard</code>, <code>--merge</code>, <code>--keep</code></td><td>Reset HEAD to specific state</td></tr><tr><td><code>git revert commit</code></td><td><code>--no-commit/-n</code>, <code>--no-edit</code></td><td>Revert commit with new commit</td></tr><tr><td><code>git cherry-pick commit</code></td><td><code>-x</code> (append source), <code>-n</code> (no commit), <code>-e</code> (edit)</td><td>Apply specific commit</td></tr></table><h3>Configuration and Hooks</h3><ul><li>Global config: ~/.gitconfig or ~/.config/git/config. Set via <code>git config --global user.name name</code>, <code>git config --global core.editor vim</code>. Repo config: .git/config. System config: /etc/gitconfig.</li><li>Git Hooks (in .git/hooks/): pre-commit (lint/stage checks), prepare-commit-msg, commit-msg (validate message), post-commit, pre-push (run tests), pre-receive, update, post-receive (deploy). Hook scripts in any language. Use husky for manageable hooks with npm.</li><li>Git Attributes (.gitattributes): <code>*.txt text</code>, <code>*.bin binary</code>, <code>*.png -diff</code>, <code>* text=auto</code>. Gitignore (.gitignore): patterns to ignore (node_modules, .env, build artifacts).</li></ul><h3>Integration APIs</h3><ul><li>GitHub API (REST v3 / GraphQL v4): <code>GET /repos/{owner}/{repo}/commits</code>, <code>POST /repos/{owner}/{repo}/git/refs</code> (create branch), <code>POST /repos/{owner}/{repo}/actions/workflows/{id}/dispatches</code> (trigger workflow). Octokit SDK.</li><li>GitLab API: <code>GET /api/v4/projects/{id}/repository/commits</code>, <code>POST /api/v4/projects/{id}/repository/branches</code>. Pre-receive push rules, custom hooks.</li><li>Libgit2: C library for programmatic Git operations (used by nodegit, pygit2, Rust git2). JGit: Java implementation.</li></ul>"},{"category":"Software Engineering","title":"GitHub Actions","tags":["CI/CD","GitHub","automation","workflow","pipeline","devops"],"summary":"GitHub Actions is a CI/CD and automation platform integrated with GitHub, using YAML workflows triggered by events.","content":"<h3>Core Concepts</h3><ul><li>Workflow: YAML file in .github/workflows/*.yml or .yaml. Contains jobs that run in parallel by default. Triggered by events (push, pull_request, schedule, workflow_dispatch, release, issues, etc.). Workflow keys: name, on (trigger events), env (env vars for all jobs), defaults (run shell, working-directory), concurrency (cancel-in-progress), permissions (id-token, contents, etc.).</li><li>Jobs: defined under jobs key. Run on runners (GitHub-hosted: ubuntu-latest, windows-latest, macos-latest; or self-hosted). Properties: runs-on, needs (dependency), if (conditional), strategy (matrix builds), container (run in container), services (sidecar containers), environment (deployment env with protection rules), timeout-minutes.</li><li>Steps: sequential commands or actions per job. name, uses (action reference), run (inline shell), if, env, working-directory, continue-on-error. Outputs via echo key=value >> $GITHUB_OUTPUT.</li><li>Actions: reusable units (JavaScript, Docker, or composite). Marketplace: actions/checkout@v4, actions/setup-node@v4, actions/cache@v4, actions/upload-artifact@v4, docker/login-action@v3.</li></ul><h3>Workflow YAML Reference</h3><table><tr><th>Key</th><th>Description</th><th>Example</th></tr><tr><td><code>on.push.branches</code></td><td>Trigger on push to matching branches</td><td><code>branches: [main, release/*]</code></td></tr><tr><td><code>on.pull_request.types</code></td><td>PR event types</td><td><code>[opened, synchronize, reopened]</code></td></tr><tr><td><code>on.schedule</code></td><td>POSIX cron schedule</td><td><code>- cron: 0 0 * * *</code></td></tr><tr><td><code>on.workflow_dispatch.inputs</code></td><td>Manual trigger inputs</td><td><code>inputs: { environment: { description: ..., required: true } }</code></td></tr><tr><td><code>jobs.&lt;id&gt;.strategy.matrix</code></td><td>Build matrix</td><td><code>matrix: { node: [18, 20], os: [ubuntu, windows] }</code></td></tr><tr><td><code>jobs.&lt;id&gt;.permissions</code></td><td>Minimum permissions</td><td><code>contents: read, id-token: write</code></td></tr></table><h3>Common Patterns</h3><ul><li>CI Pipeline: <code>on: [push, pull_request]</code>, checkout, setup-node, npm ci, npm run lint, npm test, codecov.</li><li>CD Pipeline: deploy job with <code>environment: production</code>, <code>needs: test</code>, <code>if: github.ref == refs/heads/main</code>. OIDC auth: <code>permissions: { id-token: write }</code>.</li><li>Matrix Build: <code>strategy: { matrix: { os: [ubuntu, windows], node: [18, 20] }, fail-fast: false }</code>.</li><li>Caching: actions/cache@v4 keyed by OS + lock hash: <code>key: ${{ runner.os }}-node-${{ hashFiles(**/package-lock.json) }}</code>.</li><li>Reusable Workflows: call via <code>jobs: { deploy: { uses: ./.github/workflows/deploy.yml@main, with: { env: prod }, secrets: inherit } }</code>.</li></ul><h3>Integration APIs</h3><ul><li>GitHub Actions API (REST): <code>GET /repos/{owner}/{repo}/actions/workflows</code>, <code>POST /repos/{owner}/{repo}/actions/workflows/{id}/dispatches</code>. Octokit: <code>const octokit = new Octokit({ auth: token }); await octokit.rest.actions.createWorkflowDispatch(...)</code>.</li><li>GitHub CLI: <code>gh workflow run .github/workflows/deploy.yml --ref main -f env=staging</code>, <code>gh run list --limit 10</code>, <code>gh run watch</code>.</li><li>Status Badges: <code>![CI](https://github.com/{owner}/{repo}/actions/workflows/ci.yml/badge.svg)</code>.</li></ul>"},{"category":"Software Engineering","title":"Kubernetes","tags":["containers","orchestration","K8s","cluster","microservices","Google","cloud-native"],"summary":"Kubernetes (K8s) automates deployment, scaling, and management of containerized applications. Originally designed by Google.","content":"<h3>Core Concepts</h3><ul><li>Control Plane: API Server (kube-apiserver, all communication via REST/gRPC aggregation layer), etcd (distributed key-value store, Raft consensus, stores all cluster state), Scheduler (kube-scheduler, assigns pods to nodes based on resource requests, affinity, taints/tolerations, scoring plugins), Controller Manager (kube-controller-manager, runs control loops: node controller, replication controller, endpoints controller, service account controller, namespace controller, etc.), Cloud Controller Manager (cloud-specific controllers: node/route/service).</li><li>Worker Nodes: kubelet (primary node agent, registers node, manages pods via CRI, reports status), kube-proxy (network proxy, maintains iptables/IPVS rules for Services, handles ClusterIP/NodePort), Container Runtime (containerd, CRI-O, Docker via cri-dockerd).</li><li>Networking: CNI plugins (Calico, Cilium, Flannel, Weave, Antrea). Each pod gets unique IP address (flat network). Service mesh: Istio (Envoy sidecars, mTLS, traffic management), Linkerd (Rust-based, lighter), Cilium (eBPF-based). Ingress controllers: NGINX Ingress, Traefik, HAProxy, Contour, AWS ALB Ingress, GKE Ingress.</li><li>Storage: CSI (Container Storage Interface) for pluggable storage providers. PVC (PersistentVolumeClaim) requests storage from PV (PersistentVolume). StorageClass defines provisioner, parameters (SSD vs HDD, replication). Access modes: ReadWriteOnce, ReadOnlyMany, ReadWriteMany, ReadWriteOncePod. Volume modes: Filesystem, Block.</li></ul><h3>Core CLI Commands (kubectl)</h3><table><tr><th>Command</th><th>Flags</th><th>Description</th></tr><tr><td><code>kubectl get pods -n namespace</code></td><td><code>-o wide/yaml/json</code>, <code>--watch/-w</code>, <code>--field-selector</code>, <code>--label-selector/-l</code>, <code>--show-labels</code></td><td>List pods</td></tr><tr><td><code>kubectl apply -f manifest.yaml</code></td><td><code>-R</code> (recursive), <code>--dry-run=server/client</code>, <code>--server-side</code>, <code>--force-conflicts</code></td><td>Apply configuration</td></tr><tr><td><code>kubectl delete pod my-pod</code></td><td><code>--force</code>, <code>--grace-period=0</code>, <code>-l</code> (label selector), <code>--all</code>, <code>--cascade=orphan</code></td><td>Delete resource</td></tr><tr><td><code>kubectl describe pod my-pod</code></td><td>(any resource type)</td><td>Detailed resource info</td></tr><tr><td><code>kubectl logs -f pod-name</code></td><td><code>-c</code> (container), <code>--tail</code>, <code>--since</code>, <code>--prefix</code></td><td>View pod logs</td></tr><tr><td><code>kubectl exec -it pod -- sh</code></td><td><code>-c</code> (container), <code>-t</code> (TTY), <code>-i</code> (stdin)</td><td>Execute command in pod</td></tr><tr><td><code>kubectl port-forward pod 8080:80</code></td><td><code>--address</code></td><td>Forward local port to pod</td></tr><tr><td><code>kubectl top pod -n ns</code></td><td><code>--sort-by</code>, <code>--containers</code></td><td>Show pod metrics</td></tr><tr><td><code>kubectl taint nodes node key=value:NoSchedule</code></td><td>effect: NoSchedule/PreferNoSchedule/NoExecute</td><td>Manage node taints</td></tr><tr><td><code>kubectl cordon/uncordon node</code></td><td></td><td>Mark node unschedulable</td></tr><tr><td><code>kubectl drain node --ignore-daemonsets</code></td><td><code>--delete-emptydir-data</code>, <code>--force</code>, <code>--grace-period</code></td><td>Evacuate node for maintenance</td></tr></table><h3>Configuration Reference (YAML Manifests)</h3><ul><li>Pod: apiVersion: v1, kind: Pod, metadata: { name, labels }, spec: { containers: [{ name, image, ports, resources: { requests, limits }, env, volumeMounts }], volumes, restartPolicy }.</li><li>Deployment: manages ReplicaSet, rolling updates (maxSurge/maxUnavailable), strategy (Recreate vs RollingUpdate). Fields: replicas, selector, template, strategy, revisionHistoryLimit, minReadySeconds.</li><li>Service: ClusterIP (internal), NodePort (static port on each node), LoadBalancer (external LB), ExternalName (CNAME). Fields: ports[], selector, type, clusterIP, externalTrafficPolicy, sessionAffinity.</li><li>ConfigMap / Secret: data (plaintext) vs binaryData (base64), stringData for secrets. Immutable flag. Secret types: Opaque, dockerconfigjson, basic-auth, ssh-auth, tls.</li><li>Ingress: host-based, path-based routing. TLS via referenced Secret. IngressClassName. Path types: Prefix, Exact, ImplementationSpecific.</li></ul><h3>Integration APIs</h3><ul><li>Kubernetes API (REST): <code>GET /api/v1/namespaces</code>, <code>GET /apis/apps/v1/namespaces/{ns}/deployments</code>, <code>POST /api/v1/namespaces/{ns}/pods</code>. Auth: X509 cert, Bearer token, OIDC, ServiceAccount. RBAC: Role/ClusterRole + RoleBinding/ClusterRoleBinding. Admission webhooks.</li><li>Client Libraries: client-go (Go, official), @kubernetes/client-node (Node.js/TypeScript, official), kubernetes (Python, <code>from kubernetes import client, config; config.load_kubeconfig(); v1 = client.CoreV1Api()</code>).</li><li>Operator SDK: Kubebuilder (Go), Operator SDK (Go, Ansible, Helm), Kopf (Python). CRDs extend K8s API.</li><li>Helm: helm create chart-name, helm install release-name chart, helm upgrade --install, helm rollback release-name revision. Chart: Chart.yaml, values.yaml, templates/.</li></ul>"},{"category":"Software Engineering","title":"Microservices","tags":["architecture","distributed","API","containers","scalability","decoupling","event-driven"],"summary":"Microservices is an architectural style where applications are composed of small, independent services communicating via APIs.","content":"<h3>Core Concepts</h3><ul><li>Single Responsibility: each service owns a specific business capability (e.g., user service, payment service, notification service). Bounded context from Domain-Driven Design. Service boundaries often align with organizational structure (Conway Law).</li><li>Decentralized Data: each service has its own database (database-per-service pattern). No direct database access across services. Polyglot persistence: each service chooses best database (Postgres for relational, Redis for caching, MongoDB for documents, Neo4j for graphs).</li><li>Communication: Synchronous via HTTP/REST (JSON over HTTP/1.1) or gRPC (Protocol Buffers over HTTP/2, streaming, bi-directional). Asynchronous via message brokers: Apache Kafka (log-based, durable, replayable), RabbitMQ (AMQP, broker-based), Amazon SQS/SNS (cloud-managed), Google Pub/Sub. Event-driven: services publish events, other services subscribe. Event sourcing: store state changes as event log.</li><li>Service Discovery: dynamic location of service instances. Client-side: service registry (Consul, Eureka, etcd) + client-side load balancing. Server-side: AWS ALB, GCP Load Balancer, Kubernetes Services.</li><li>API Gateway: single entry point for clients. Routes requests to appropriate services. Handles cross-cutting concerns: authN/authZ, rate limiting, request transformation, aggregation, caching, circuit breaking. Tools: Kong, APISIX, Tyk, AWS API Gateway, GCP Apigee, Kubernetes Gateway API.</li></ul><h3>Common Patterns</h3><ul><li>Saga Pattern: manage distributed transactions across services. Choreography: each service publishes events, next service reacts. Orchestration: orchestrator service tells each service what to do. Compensating actions for rollback (e.g., cancel order, refund payment).</li><li>Circuit Breaker: detect failures and prevent cascading. Three states: Closed (normal), Open (fail fast), Half-Open (test recovery). Libraries: Resilience4j (Java), Polly (.NET), Hystrix (Netflix, deprecated), go-resiliency (Go).</li><li>API Composition: gateway or composite service queries multiple services and aggregates results. CQRS: separate read models (queries) from write models (commands). Event-sourced read models are eventually consistent.</li><li>Strangler Fig: incrementally replace monolith by extracting microservices one at a time. Route traffic to new service gradually.</li><li>Health Check: each service exposes /health endpoint (readiness for traffic, liveness for restart). Combined with service discovery for routing only to healthy instances.</li></ul><h3>Configuration and API Patterns</h3><table><tr><th>Pattern</th><th>Code Example</th><th>Description</th></tr><tr><td>Service API</td><td><code>GET /api/v1/users/{id}</code> with <code>Accept: application/json</code>, <code>Authorization: Bearer {token}</code>, <code>?page=1&limit=20</code></td><td>RESTful resource with versioning, standard headers, pagination</td></tr><tr><td>gRPC Service</td><td><code>service UserService { rpc GetUser (GetUserRequest) returns (User) {}; rpc ListUsers (returns stream User) {} }</code></td><td>protobuf, HTTP/2 streaming, code generation</td></tr><tr><td>Event Message</td><td><code>{ eventType: UserCreated, eventId: uuid, timestamp: 2025-06-07T12:00:00Z, data: { userId: 123 } }</code></td><td>CloudEvents, idempotent processing, DLQ on failure</td></tr></table><h3>Observability and Resilience</h3><ul><li>Logging: structured JSON logs (timestamp, level, service, trace_id, message). Centralized: ELK/EFK, Loki + Grafana, Datadog, Splunk. Correlation ID via headers.</li><li>Metrics: RED (Rate, Errors, Duration). USE (Utilization, Saturation, Errors). Prometheus /metrics, Grafana dashboards. SLI vs SLO.</li><li>Distributed Tracing: W3C Trace Context or B3 headers. OpenTelemetry SDK + collector. Tools: Jaeger, Zipkin, Honeycomb, Datadog APM.</li><li>Testing: Unit tests, Integration tests (Testcontainers), Contract tests (Pact: consumer-driven), Component tests, E2E tests.</li><li>Deployment: per-service CI/CD pipelines. Blue-green, canary, rolling deployments. Service mesh (Istio, Linkerd) for traffic splitting, mTLS, observability without code changes.</li></ul>"},{"category":"Software Engineering","title":"Terraform","tags":["IaC","devops","cloud","infrastructure","declarative","HashiCorp"],"summary":"Terraform is an Infrastructure as Code (IaC) tool for building, changing, and versioning infrastructure declaratively.","content":"<h3>Core Concepts</h3><ul><li>Infrastructure as Code: define infrastructure in HCL (HashiCorp Configuration Language). Declarative: desired state vs procedural. Plan: compute diff between current state and desired state. Apply: execute changes. Destroy: tear down managed infra.</li><li>State: terraform.tfstate JSON file mapping resources to real-world objects. Backends: local (file), remote (S3 + DynamoDB lock, Azure Storage Blob + lease, GCS + object versioning, Terraform Cloud). State locking prevents concurrent modifications. Workspaces: <code>terraform workspace new prod</code> for separate state per environment.</li><li>Providers: plugins that interface with cloud APIs. Official: AWS, Azure, GCP, Kubernetes, GitHub, Datadog, Cloudflare. Provider versioning with required_providers block. Provider configuration: region, credentials (env vars, config file, chain).</li><li>Modules: reusable, composable configuration packages. Root module is current directory. Child modules called via module block. Module sources: local path, Terraform Registry, git URL, S3/GCS.</li></ul><h3>Core CLI Commands</h3><table><tr><th>Command</th><th>Flags / Usage</th><th>Description</th></tr><tr><td><code>terraform init</code></td><td><code>-backend-config=key=value</code>, <code>-reconfigure</code>, <code>-migrate-state</code>, <code>-upgrade</code></td><td>Initialize backend + providers + modules</td></tr><tr><td><code>terraform validate</code></td><td><code>-json</code></td><td>Validate config syntax</td></tr><tr><td><code>terraform fmt -recursive</code></td><td><code>-check</code>, <code>-diff</code></td><td>Format HCL code</td></tr><tr><td><code>terraform plan -out=tfplan</code></td><td><code>-var key=value</code>, <code>-var-file=prod.tfvars</code>, <code>-target=resource</code>, <code>-destroy</code>, <code>-refresh-only</code></td><td>Show execution plan</td></tr><tr><td><code>terraform apply tfplan</code></td><td><code>-auto-approve</code>, <code>-replace=resource</code></td><td>Execute changes</td></tr><tr><td><code>terraform destroy</code></td><td><code>-auto-approve</code>, <code>-target</code></td><td>Destroy managed infrastructure</td></tr><tr><td><code>terraform state list</code></td><td><code>-id=xxx</code></td><td>List resources in state</td></tr><tr><td><code>terraform state rm resource</code></td><td><code>-dry-run</code></td><td>Remove resource from state</td></tr><tr><td><code>terraform import address id</code></td><td></td><td>Import existing resource into state</td></tr><tr><td><code>terraform output name</code></td><td><code>-json</code>, <code>-raw</code></td><td>Show output values from state</td></tr></table><h3>Configuration Reference</h3><ul><li>Provider Block: <code>terraform { required_providers { aws = { source = hashicorp/aws, version = ~> 5.0 } } }</code>, <code>provider aws { region = var.region }</code>.</li><li>Resource Block: <code>resource aws_instance web { ami = ami-xxx; instance_type = t3.micro }</code>. Meta-arguments: depends_on, count, for_each, provider, lifecycle (create_before_destroy, prevent_destroy, ignore_changes).</li><li>Variables: <code>variable instance_type { type = string; default = t3.micro }</code>. Types: string, number, bool, list, map, set, object, tuple, any.</li><li>Data Sources: <code>data aws_ami ubuntu { most_recent = true }</code>. Outputs: <code>output instance_ip { value = aws_instance.web.public_ip }</code>.</li><li>Functions: concat, flatten, lookup, merge, file, templatefile, cidrsubnet, format, join, jsonencode, yamldecode.</li></ul><h3>Integration APIs and Ecosystem</h3><ul><li>Terraform Cloud: remote state, remote runs, Sentinel policy-as-code, cost estimation, private module registry. API: <code>POST /api/v2/runs</code>, <code>GET /api/v2/workspaces</code>.</li><li>CDKTF: generate provider code in TypeScript/Python/Java/C#/Go. <code>cdktf init --template=typescript</code>.</li><li>Terragrunt: DRY configurations via terragrunt.hcl, remote state config, dependency management.</li><li>tfsec, Checkov, Terrascan: static analysis security scanners for Terraform.</li></ul>"},{"category":"Web Development","title":"Angular","tags":["frontend","TypeScript","Google","SPA","component","RxJS","injection"],"summary":"Angular is a TypeScript-based web framework by Google for building scalable SPAs with a full-featured toolchain.","content":"<h3>Core Decorators</h3><table><tr><th>Decorator</th><th>Usage</th><th>Description</th></tr><tr><td>@Component</td><td>@Component({selector, template, styles, standalone, ...})</td><td>Declares component with selector, template, styles, and metadata</td></tr><tr><td>@Directive</td><td>@Directive({selector, host, inputs, outputs})</td><td>Declares structural or attribute directive with host bindings</td></tr><tr><td>@Pipe</td><td>@Pipe({name, pure, standalone})</td><td>Declares transform pipe; pure pipes re-evaluate on reference change</td></tr><tr><td>@Injectable</td><td>@Injectable({providedIn})</td><td>Marks class as injectable with tree-shakeable provider scope</td></tr><tr><td>@Input</td><td>@Input({required, alias, transform}) property</td><td>Declares input binding from parent with alias and transform support</td></tr><tr><td>@Output</td><td>@Output() eventName = new EventEmitter()</td><td>Declares custom event emitted to parent component</td></tr><tr><td>@ViewChild</td><td>@ViewChild(ref, {read, static}) property</td><td>Queries child component or DOM element from view</td></tr><tr><td>@ViewChildren</td><td>@ViewChildren(ref) property: QueryList</td><td>Queries multiple children from view as live QueryList</td></tr><tr><td>@ContentChild</td><td>@ContentChild(ref) property</td><td>Queries projected content child from ng-content</td></tr><tr><td>@ContentChildren</td><td>@ContentChildren(ref) property: QueryList</td><td>Queries multiple projected content children</td></tr><tr><td>@HostBinding</td><td>@HostBinding(&apos;class.active&apos;) isActive</td><td>Binds host element property to class member</td></tr><tr><td>@HostListener</td><td>@HostListener(&apos;click&apos;, [$event])</td><td>Listens to host element events</td></tr></table><h3>Lifecycle Hooks</h3><table><tr><th>Hook</th><th>Signature</th><th>Description</th></tr><tr><td>ngOnChanges</td><td>ngOnChanges(changes: SimpleChanges)</td><td>Called before ngOnInit when @Input properties change</td></tr><tr><td>ngOnInit</td><td>ngOnInit()</td><td>Called once after first ngOnChanges; initialization logic</td></tr><tr><td>ngDoCheck</td><td>ngDoCheck()</td><td>Called during every change detection run</td></tr><tr><td>ngAfterContentInit</td><td>ngAfterContentInit()</td><td>After projected content (ng-content) initialization</td></tr><tr><td>ngAfterContentChecked</td><td>ngAfterContentChecked()</td><td>After every projected content check</td></tr><tr><td>ngAfterViewInit</td><td>ngAfterViewInit()</td><td>After component view and child views init</td></tr><tr><td>ngAfterViewChecked</td><td>ngAfterViewChecked()</td><td>After every component view check</td></tr><tr><td>ngOnDestroy</td><td>ngOnDestroy()</td><td>Before destruction; cleanup subscriptions and listeners</td></tr></table><h3>Dependency Injection</h3><p>Angular DI is hierarchical: injectors form a tree matching the component tree. Providers at root (tree-shakeable singleton), component, or module level. @Injectable({providedIn: &apos;root&apos;}) for tree-shakeable services. Use InjectionToken for non-class dependencies. Multi-providers allow multiple values per token. Standalone components (14+) provide services via providers array directly, eliminating NgModules.</p><h3>Router API</h3><table><tr><th>API</th><th>Signature</th><th>Description</th></tr><tr><td>Router</td><td>router.navigate(commands, extras)</td><td>Navigates with relativeTo, queryParams, fragment, replaceUrl</td></tr><tr><td>ActivatedRoute</td><td>activatedRoute.params, .queryParams, .data</td><td>Current route info as observables</td></tr><tr><td>CanActivate</td><td>canActivate(route, state): boolean | UrlTree</td><td>Guard controlling route access; return UrlTree to redirect</td></tr><tr><td>CanDeactivate</td><td>canDeactivate(component, route, state)</td><td>Guard preventing navigation; confirm unsaved changes</td></tr><tr><td>Resolve</td><td>resolve(route, state): Observable | data</td><td>Pre-fetches data before activation</td></tr><tr><td>forRoot/forChild</td><td>RouterModule.forRoot(routes, config?)</td><td>Configures root or feature module routes</td></tr></table><h3>RxJS Integration</h3><p>Angular deeply integrates RxJS: HttpClient returns Observable, reactive forms expose valueChanges, router params are observables. Key operators: map, filter, switchMap (cancellation), debounceTime (search), catchError, combineLatest, forkJoin (parallel), takeUntil (unsubscribe). Use async pipe in templates for automatic subscribe/unsubscribe.</p><h3>Component Model</h3><p>Components are classes with @Component decorator containing template and styles. Data in via @Input(), events out via @Output() EventEmitter. Two-way binding with [(ngModel)]. Structural directives: *ngIf, *ngFor, *ngSwitch. Standalone components (14+) remove NgModule requirements. Change detection via Zone.js; OnPush strategy minimizes checks.</p>"},{"category":"Web Development","title":"GraphQL","tags":["API","query","type-system","Meta","client-specified","real-time"],"summary":"GraphQL is a query language for APIs with a type system that lets clients request exactly the data they need.","content":"<h3>Core Concepts</h3><p>GraphQL is a query language and runtime for APIs developed by Meta in 2012, open-sourced in 2015. Clients specify exact data requirements, eliminating over-fetching and under-fetching. A single /graphql endpoint handles all operations. The type system defines the schema via SDL. GraphQL is transport-agnostic but typically uses HTTP POST. Introspection enables powerful tooling like GraphiQL and automatic documentation generation.</p><h3>Type System</h3><table><tr><th>Type Kind</th><th>SDL Syntax</th><th>Description</th></tr><tr><td>Object Type</td><td>type User { id: ID! name: String! posts: [Post!]! }</td><td>Defines type with fields; exclamation = non-null; brackets = list</td></tr><tr><td>Query</td><td>type Query { users: [User!]! user(id: ID!): User }</td><td>Entry point for read operations; required root type</td></tr><tr><td>Mutation</td><td>type Mutation { createUser(input: UserInput!): User! }</td><td>Entry point for write operations; execute sequentially</td></tr><tr><td>Subscription</td><td>type Subscription { userAdded: User! }</td><td>Entry point for real-time events via WebSocket or SSE</td></tr><tr><td>Input Type</td><td>input UserInput { name: String! email: String! }</td><td>Complex input object for mutations; scalars only, no references</td></tr><tr><td>Enum</td><td>enum Role { ADMIN USER GUEST }</td><td>Restricted set of values; type-safe and introspectable</td></tr><tr><td>Union</td><td>union SearchResult = User | Post</td><td>Returns one of multiple types; needs __typename for discrimination</td></tr><tr><td>Interface</td><td>interface Node { id: ID! } type User implements Node { ... }</td><td>Abstract type with shared fields; uses inline fragments</td></tr><tr><td>Scalar</td><td>scalar DateTime</td><td>Primitive values; built-in: String, Int, Float, Boolean, ID; custom allowed</td></tr></table><h3>Operations</h3><h4>Queries (Read)</h4><pre>query GetUser($id: ID!) { user(id: $id) { name email posts { title } } }</pre><p>Variables passed as separate JSON object. Fragments: fragment UserFields on User { name email }. Directives: @include(if: Boolean), @skip(if: Boolean), @deprecated(reason: String). Aliases query same field with different args: users: users(role: ADMIN).</p><h4>Mutations (Write)</h4><pre>mutation CreatePost($input: PostInput!) { createPost(input: $input) { id title createdAt } }</pre><p>Mutations execute sequentially. Can return fields for immediate client update. Typically mirror CRUD operations.</p><h4>Subscriptions (Real-time)</h4><pre>subscription OnPostAdded { postAdded { id title author { name } } }</pre><p>WebSocket transport via graphql-ws. Server pushes events. Client maintains persistent connection.</p><h3>Resolvers</h3><p>Signature: fieldName(parent, args, context, info) =&gt; data. parent is the resolver result (for nesting). args contains field arguments. context is shared across resolvers (auth, DB, DataLoader). info contains query AST and execution state. Resolvers return Promises for async operations. <b>N+1 problem:</b> resolvers query DB once per parent item. <b>DataLoader</b> solves it by batching and caching per request.</p><h3>Schema Approaches</h3><p><b>SDL-first:</b> Write schema in .graphql files, implement resolvers matching field names. <b>Code-first:</b> Generate schema from code (TypeGraphQL, NestJS, Pothos). SDL-first is declarative. Code-first ensures TypeScript type safety.</p><pre>const { ApolloServer, gql } = require(&apos;apollo-server&apos;); const typeDefs = gql` type Query { hello: String } `; const resolvers = { Query: { hello: () =&gt; &apos;World&apos; } }; new ApolloServer({ typeDefs, resolvers }).listen(4000);</pre><h3>Tools and Implementations</h3><ul><li><b>Apollo Server/Client:</b> Production server with Studio; client with normalized cache, optimistic updates</li><li><b>Relay:</b> Meta client with colocated fragments, compiler optimization, connection pagination</li><li><b>GraphQL Yoga:</b> Cross-platform server (The Guild); Node.js, Deno, Bun, Cloudflare Workers</li><li><b>Hasura:</b> Instant real-time GraphQL from databases (PostgreSQL, MySQL, SQL Server)</li><li><b>GraphiQL:</b> In-browser IDE with schema explorer, documentation, query history</li><li><b>GraphQL Code Generator:</b> Generates TypeScript types, React hooks, operations from schema</li></ul>"},{"category":"Web Development","title":"HTML & CSS","tags":["frontend","markup","styling","responsive","flexbox","grid","accessibility"],"summary":"HTML structures web content with semantic elements; CSS controls presentation and layout. Foundation of the web.","content":"<h3>Core Concepts</h3><h4>Semantic HTML5</h4><p>HTML5 semantic elements describe content meaning: <code>header</code>, <code>nav</code>, <code>main</code>, <code>article</code>, <code>section</code>, <code>aside</code>, <code>footer</code>, <code>figure</code>, <code>figcaption</code>, <code>mark</code>, <code>time</code>, <code>details</code>, <code>summary</code>, <code>dialog</code>. <code>template</code> for client-side templates, <code>slot</code> for web component integration.</p><h4>HTML Forms &amp; Input Types</h4><p>Input types: <code>text</code>, <code>email</code>, <code>url</code>, <code>tel</code>, <code>number</code>, <code>range</code>, <code>date</code>, <code>datetime-local</code>, <code>month</code>, <code>week</code>, <code>time</code>, <code>color</code>, <code>file</code>, <code>search</code>, <code>password</code>, <code>checkbox</code>, <code>radio</code>, <code>submit</code>, <code>button</code>, <code>hidden</code>, <code>image</code>, <code>reset</code>. Form attributes: <code>action</code>, <code>method</code> (GET, POST), <code>enctype</code> (application/x-www-form-urlencoded, multipart/form-data, text/plain), <code>novalidate</code>, <code>autocomplete</code>. Validation API: <code>required</code>, <code>pattern</code>, <code>minlength</code>, <code>maxlength</code>, <code>min</code>, <code>max</code>, <code>step</code>, <code>validity</code> object, <code>reportValidity()</code>.</p><h4>CSS Layout &amp; Positioning API</h4><table><tr><th>Property</th><th>Values</th><th>Description</th></tr><tr><td>display</td><td>flex, grid, block, inline, inline-block, none, contents, flow-root, list-item</td><td>Element display behavior and inner/outer display types</td></tr><tr><td>position</td><td>static, relative, absolute, fixed, sticky</td><td>Positioning scheme and containing block establishment</td></tr><tr><td>top, right, bottom, left</td><td>length, percentage, auto, initial</td><td>Offset from positioned ancestor edges</td></tr><tr><td>z-index</td><td>integer, auto</td><td>Stacking order within positioned containing block</td></tr><tr><td>flex-direction</td><td>row, row-reverse, column, column-reverse</td><td>Flex main axis direction for flex items</td></tr><tr><td>flex-wrap</td><td>nowrap, wrap, wrap-reverse</td><td>Controls whether flex items wrap to multiple lines</td></tr><tr><td>justify-content</td><td>flex-start, flex-end, center, space-between, space-around, space-evenly</td><td>Main axis alignment distributing free space</td></tr><tr><td>align-items</td><td>stretch, flex-start, flex-end, center, baseline</td><td>Cross axis alignment within flex/grid container</td></tr><tr><td>gap</td><td>length, percentage</td><td>Gutter spacing between flex/grid items</td></tr><tr><td>grid-template-columns</td><td>track-list (fr, px, %, minmax(), repeat(), auto-fill, auto-fit)</td><td>Grid column track sizing and naming</td></tr><tr><td>grid-template-rows</td><td>track-list (fr, px, %, minmax(), repeat(), auto-fill, auto-fit)</td><td>Grid row track sizing and naming</td></tr><tr><td>grid-template-areas</td><td>string+</td><td>Named grid area template for visual placement</td></tr><tr><td>grid-column / grid-row</td><td>start / end (span N)</td><td>Grid item placement by line numbers or span</td></tr></table><h4>Modern CSS Features</h4><ul><li><b>Custom Properties:</b> <code>--name: value</code> declared on elements, accessed via <code>var(--name, fallback)</code> for dynamic theming with inherited cascade</li><li><b>@media Queries:</b> <code>@media (min-width: 768px) and (prefers-color-scheme: dark)</code> for responsive design and user preference adaptation</li><li><b>Container Queries:</b> <code>@container (min-width: 400px) { ... }</code> with <code>container-type: inline-size</code> for element-level responsive components</li><li><b>:has() Selector:</b> <code>parent:has(&gt; child)</code> selects parent elements containing specific descendants, solving the CSS parent selector problem</li><li><b>CSS Nesting:</b> Native nesting (Chrome 120+, Safari 17.2+) allows <code>.card { ... &amp; .title { ... } }</code> without preprocessors</li><li><b>Scroll-Driven Animations:</b> <code>animation-timeline: scroll()</code> links animations to scroll position for parallax and progress effects</li><li><b>View Transitions API:</b> <code>@view-transition { navigation: auto; }</code> enables seamless page transitions with shared element animations</li><li><b>Subgrid:</b> <code>grid-template-columns: subgrid</code> inherits parent track sizing for aligned nested grid layouts</li></ul><h3>Usage Patterns</h3><p><b>Responsive Design:</b> Mobile-first CSS with base styles for narrow viewports, <code>@media (min-width: breakpoint)</code> for larger screens. Fluid grids using <code>fr</code> units, <code>minmax()</code>, and <code>auto-fill</code>/<code>auto-fit</code>. Fluid typography with <code>clamp(min, preferred, max)</code> function.</p><p><b>Accessibility Best Practices:</b> Semantic HTML elements for screen reader structure, <code>aria-*</code> attributes for dynamic content roles and states, <code>alt</code> text on images, proper heading hierarchy (<code>h1</code> through <code>h6</code>), <code>tabindex</code> for keyboard navigation ordering, <code>role</code> attributes when semantic elements are insufficient, <code>aria-live</code> regions for dynamic content announcements, <code>prefers-reduced-motion</code> media query for accessibility preferences.</p>"},{"category":"Web Development","title":"Next.js","tags":["frontend","React","SSR","SSG","meta-framework","Vercel"],"summary":"Next.js is a React meta-framework providing SSR, SSG, file-based routing, and server components.","content":"<h3>Core APIs</h3><table><tr><th>API</th><th>Import</th><th>Description</th></tr><tr><td>useRouter</td><td>next/navigation</td><td>Client-side router: push, replace, back, forward, refresh, prefetch</td></tr><tr><td>useParams</td><td>next/navigation</td><td>Returns dynamic route params; supports async in Server Components</td></tr><tr><td>useSearchParams</td><td>next/navigation</td><td>Returns URL search params; client-side only; triggers Suspense</td></tr><tr><td>usePathname</td><td>next/navigation</td><td>Returns current URL pathname; client-side hook</td></tr><tr><td>redirect</td><td>next/navigation</td><td>Redirects to URL from Server Components; accepts status code</td></tr><tr><td>permanentRedirect</td><td>next/navigation</td><td>Permanent redirect (307/308) from Server Components</td></tr><tr><td>notFound</td><td>next/navigation</td><td>Triggers closest not-found boundary; throws NOT_FOUND error</td></tr><tr><td>cookies</td><td>next/headers</td><td>Read/write cookies in Server Components and route handlers</td></tr><tr><td>headers</td><td>next/headers</td><td>Read request headers in Server Components and route handlers</td></tr><tr><td>Image</td><td>next/image</td><td>Optimized Image: lazy loading, WebP/AVIF, responsive sizes</td></tr><tr><td>Link</td><td>next/link</td><td>Client navigation with automatic prefetching on viewport entry</td></tr><tr><td>Font</td><td>next/font</td><td>Automatic font optimization with CSS size-adjust and subsetting</td></tr><tr><td>NextRequest / NextResponse</td><td>next/server</td><td>Extended Request/Response for middleware with cookies, geolocation</td></tr></table><h3>App Router File Conventions</h3><table><tr><th>File</th><th>Export</th><th>Purpose</th></tr><tr><td>layout.tsx</td><td>default export</td><td>Shared layout wrapping children; supports nesting; persists across nav</td></tr><tr><td>page.tsx</td><td>default export</td><td>Page UI; receives params and searchParams as props</td></tr><tr><td>loading.tsx</td><td>default export</td><td>Loading UI shown during streaming or page load</td></tr><tr><td>error.tsx</td><td>default export</td><td>Error boundary; receives error and reset props</td></tr><tr><td>not-found.tsx</td><td>default export</td><td>404 UI for segment when notFound() is called</td></tr><tr><td>route.ts</td><td>export GET, POST, PUT, PATCH, DELETE</td><td>API route handler with Request/Response Web API</td></tr><tr><td>template.tsx</td><td>default export</td><td>Like layout but re-mounts on every navigation; resets state</td></tr><tr><td>default.tsx</td><td>default export</td><td>Fallback for parallel routes when page cannot be determined</td></tr></table><h3>Data Fetching and Server Actions</h3><p>Server Components await fetch() directly. Built-in caching: cache: &apos;force-cache&apos; (default), cache: &apos;no-store&apos; (dynamic), next: { revalidate: 60 } (ISR). Server Actions with &apos;use server&apos; handle mutations via form actions. revalidatePath(path) and revalidateTag(tag) from next/cache purge cached data. unstable_noStore() opts out of caching.</p><pre>async function Page({ params }: { params: Promise&lt;{ id: string }&gt; }) { const { id } = await params; const data = await fetch(`https://api.example.com/item/${id}`, { next: { revalidate: 60 } }); const json = await data.json(); return &lt;div&gt;{json.title}&lt;/div&gt;; }</pre><h3>Middleware</h3><p>Runs at edge before every request. Export from middleware.ts at root: function middleware(request: NextRequest) { return NextResponse.redirect(new URL(&apos;/home&apos;, request.url)) }. Use config.matcher to filter paths.</p><h3>Rendering Strategies</h3><ul><li><b>Static (SSG):</b> Default for pages without dynamic functions or uncached fetch; build-time generation</li><li><b>Dynamic (SSR):</b> Pages using cookies(), headers(), searchParams, or cache: &apos;no-store&apos;</li><li><b>ISR:</b> fetch(url, { next: { revalidate: seconds } }) background revalidation</li><li><b>Streaming:</b> Automatic with Suspense boundaries; loading.tsx provides fallback</li><li><b>Partial Prerendering (PPR):</b> Experimental: static shell with dynamic holes via Suspense</li></ul>"},{"category":"Web Development","title":"Node.js","tags":["backend","runtime","JavaScript","event-driven","npm","server"],"summary":"Node.js is a cross-platform JavaScript runtime built on Chrome V8 with event-driven, non-blocking I/O for scalable network apps.","content":"<h3>Core Concepts</h3><p>Node.js is built on Chrome V8 with libuv providing the event loop and thread pool. The event loop has six phases: timers (setTimeout/setInterval), pending callbacks (deferred I/O), idle/prepare (internal), poll (I/O events), check (setImmediate), close callbacks (socket.on close handlers). process.nextTick() runs between each phase. Microtasks (Promise.then) run after each callback. Thread pool (default 4 threads) handles blocking operations like fs and crypto.</p><h3>Core Module API Reference</h3><h4>File System (fs)</h4><table><tr><th>API</th><th>Signature</th><th>Description</th></tr><tr><td>readFile</td><td>readFile(path[, options], callback(err, data))</td><td>Async file read; options for encoding (utf8, base64)</td></tr><tr><td>readFileSync</td><td>readFileSync(path[, options])</td><td>Sync file read; blocks event loop</td></tr><tr><td>writeFile</td><td>writeFile(path, data[, options], callback)</td><td>Writes data to file, replacing contents</td></tr><tr><td>appendFile</td><td>appendFile(path, data[, options], callback)</td><td>Appends data to file; creates if missing</td></tr><tr><td>unlink</td><td>unlink(path, callback)</td><td>Deletes a file or symbolic link</td></tr><tr><td>mkdir</td><td>mkdir(path[, { recursive }], callback)</td><td>Creates directory; recursive for parent dirs</td></tr><tr><td>readdir</td><td>readdir(path[, { withFileTypes }], callback)</td><td>Reads directory contents; Dirent for metadata</td></tr><tr><td>stat</td><td>stat(path[, options], callback(err, stats))</td><td>File metadata: size, mode, mtime, isFile()</td></tr><tr><td>watch</td><td>watch(path[, options], listener(event, filename))</td><td>Watches file/dir for changes</td></tr><tr><td>promises</td><td>fs.promises.readFile() etc.</td><td>Promise-based async versions of all methods</td></tr></table><h4>HTTP (http/https)</h4><table><tr><th>API</th><th>Signature</th><th>Description</th></tr><tr><td>createServer</td><td>createServer(requestListener(req, res))</td><td>Creates HTTP server with request handler</td></tr><tr><td>server.listen</td><td>listen(port[, host, backlog], callback)</td><td>Starts listening on specified port and host</td></tr><tr><td>http.request</td><td>request(url[, options][, callback(res)])</td><td>Makes outbound HTTP request; returns ClientRequest</td></tr><tr><td>http.get</td><td>get(url[, options][, callback(res)])</td><td>GET request convenience wrapper</td></tr><tr><td>res.writeHead</td><td>writeHead(statusCode[, statusMessage][, headers])</td><td>Writes response status and headers</td></tr><tr><td>res.end</td><td>end([data[, encoding]][, callback])</td><td>Signals response complete; optional final data</td></tr></table><h4>Streams</h4><table><tr><th>API</th><th>Signature</th><th>Description</th></tr><tr><td>Readable</td><td>new Readable({ read(size), objectMode })</td><td>Readable stream; push data, implement _read()</td></tr><tr><td>Writable</td><td>new Writable({ write(chunk, enc, cb) })</td><td>Writable stream; implement _write()</td></tr><tr><td>Transform</td><td>new Transform({ transform(chunk, enc, cb) })</td><td>Duplex stream transforming input to output</td></tr><tr><td>pipeline</td><td>pipeline(...streams, callback(err))</td><td>Pipes streams with auto cleanup; prefer over .pipe()</td></tr><tr><td>finished</td><td>finished(stream, callback(err))</td><td>Detects stream completion or error</td></tr></table><h4>Other Key Modules</h4><table><tr><th>Module</th><th>Key APIs</th><th>Description</th></tr><tr><td>buffer</td><td>Buffer.from(), Buffer.alloc(), buf.toString()</td><td>Fixed-size binary data allocation and manipulation</td></tr><tr><td>path</td><td>join(), resolve(), basename(), dirname(), extname(), parse()</td><td>Cross-platform path manipulation</td></tr><tr><td>events</td><td>EventEmitter: on(), once(), emit(), removeListener()</td><td>Pub/sub event system; core building block</td></tr><tr><td>crypto</td><td>randomBytes(), createHash(), createHmac(), createCipheriv(), randomUUID()</td><td>Hashing, encryption, signatures, random values</td></tr><tr><td>child_process</td><td>spawn(), exec(), execFile(), fork()</td><td>Run child processes; fork for Node.js workers</td></tr><tr><td>os</td><td>platform(), arch(), cpus(), freemem(), totalmem(), hostname()</td><td>OS info: CPU, memory, network, user</td></tr><tr><td>worker_threads</td><td>Worker, parentPort, workerData, isMainThread</td><td>True parallelism with message passing</td></tr><tr><td>cluster</td><td>cluster.fork(), cluster.isPrimary, cluster.workers</td><td>Multi-process load balancing across CPU cores</td></tr><tr><td>url</td><td>URL, URLSearchParams, fileURLToPath()</td><td>WHATWG URL parsing and resolution</td></tr></table><h3>Module System</h3><p>Node.js supports CommonJS (require, module.exports) and ES modules (import, export). ESM is modern standard; enable via &quot;type&quot;: &quot;module&quot; in package.json or .mjs extension. The node: protocol (import fs from &apos;node:fs&apos;) explicitly imports core modules.</p>"},{"category":"Web Development","title":"REST APIs","tags":["API","HTTP","web","resource","stateless","JSON","CRUD","RESTful"],"summary":"REST is an architectural style for networked applications using HTTP methods on resources, typically returning JSON.","content":"<h3>Core Concepts</h3><p>REST (Representational State Transfer) is an architectural style defined by Roy Fielding (2000). RESTful APIs treat data as resources identified by URIs, manipulated via HTTP methods. Key constraints: statelessness (each request has all context), cacheability (responses declare cache policy), uniform interface (consistent methods and status codes), layered system (proxies, gateways, load balancers). Resources are nouns: /users not /getUsers.</p><h3>API Reference</h3><h4>HTTP Methods</h4><table><tr><th>Method</th><th>CRUD</th><th>Success Status</th><th>Idempotent</th><th>Safe</th><th>Description</th></tr><tr><td>GET</td><td>Read</td><td>200 OK</td><td>Yes</td><td>Yes</td><td>Retrieves resource; no side effects; cacheable</td></tr><tr><td>POST</td><td>Create</td><td>201 Created</td><td>No</td><td>No</td><td>Creates resource; Location header returns new URI</td></tr><tr><td>PUT</td><td>Replace</td><td>200 OK / 201 Created</td><td>Yes</td><td>No</td><td>Replaces entire resource at given URI</td></tr><tr><td>PATCH</td><td>Partial Update</td><td>200 OK</td><td>No</td><td>No</td><td>Partial modifications via JSON Patch or Merge Patch</td></tr><tr><td>DELETE</td><td>Delete</td><td>204 No Content</td><td>Yes</td><td>No</td><td>Removes resource; subsequent GET returns 404</td></tr><tr><td>HEAD</td><td>Metadata</td><td>200 OK</td><td>Yes</td><td>Yes</td><td>Headers only, no body; check existence and metadata</td></tr><tr><td>OPTIONS</td><td>Discover</td><td>204 No Content</td><td>Yes</td><td>Yes</td><td>Returns Allow header; CORS preflight</td></tr></table><h4>Status Codes</h4><table><tr><th>Code</th><th>Name</th><th>Usage</th></tr><tr><td>200</td><td>OK</td><td>Successful GET, PUT, PATCH with body</td></tr><tr><td>201</td><td>Created</td><td>POST success; include Location header</td></tr><tr><td>204</td><td>No Content</td><td>DELETE or PUT/PATCH with no body</td></tr><tr><td>301</td><td>Moved Permanently</td><td>Resource URI permanently changed</td></tr><tr><td>304</td><td>Not Modified</td><td>Conditional GET; cached resource valid</td></tr><tr><td>400</td><td>Bad Request</td><td>Malformed request body or parameters</td></tr><tr><td>401</td><td>Unauthorized</td><td>Missing or invalid authentication</td></tr><tr><td>403</td><td>Forbidden</td><td>Insufficient permissions</td></tr><tr><td>404</td><td>Not Found</td><td>Resource does not exist</td></tr><tr><td>405</td><td>Method Not Allowed</td><td>Method not supported; include Allow header</td></tr><tr><td>409</td><td>Conflict</td><td>Resource state conflict (e.g. duplicate)</td></tr><tr><td>422</td><td>Unprocessable</td><td>Semantic validation error</td></tr><tr><td>429</td><td>Too Many Requests</td><td>Rate limit exceeded; include Retry-After</td></tr><tr><td>500</td><td>Server Error</td><td>Unexpected server failure</td></tr><tr><td>502</td><td>Bad Gateway</td><td>Upstream server error</td></tr><tr><td>503</td><td>Unavailable</td><td>Overload or maintenance; include Retry-After</td></tr></table><h4>HTTP Headers</h4><table><tr><th>Header</th><th>Direction</th><th>Purpose</th></tr><tr><td>Content-Type</td><td>Both</td><td>Media type: application/json, multipart/form-data</td></tr><tr><td>Accept</td><td>Request</td><td>Expected response media type for negotiation</td></tr><tr><td>Authorization</td><td>Request</td><td>Credentials: Bearer JWT, Basic base64, API key</td></tr><tr><td>Cache-Control</td><td>Both</td><td>Cache policy: no-cache, max-age, private, no-store</td></tr><tr><td>ETag</td><td>Response</td><td>Resource version for conditional requests</td></tr><tr><td>If-None-Match</td><td>Request</td><td>Conditional GET with ETag; 304 if unchanged</td></tr><tr><td>If-Modified-Since</td><td>Request</td><td>Conditional GET with date; 304 if not modified</td></tr><tr><td>Location</td><td>Response</td><td>New resource URI (201) or redirect target</td></tr><tr><td>Retry-After</td><td>Response</td><td>Seconds or date before retry (429, 503)</td></tr><tr><td>Access-Control-Allow-Origin</td><td>Response</td><td>CORS: allowed origins (* or specific)</td></tr></table><h3>Usage Patterns</h3><h4>URL Design</h4><p>Plural nouns: /users, /users/{id}, /users/{id}/posts/{postId}. Filtering: ?status=active&sort=created_at:desc. Pagination: offset/limit (?offset=0&limit=20) or cursor-based (?cursor=abc&limit=20). HATEOAS for discoverability.</p><h4>Error Response</h4><pre>{ &quot;error&quot;: { &quot;code&quot;: &quot;VALIDATION_ERROR&quot;, &quot;message&quot;: &quot;Validation failed&quot;, &quot;details&quot;: [{ &quot;field&quot;: &quot;email&quot;, &quot;message&quot;: &quot;Invalid format&quot; }] } }</pre><h4>Versioning and Security</h4><p>Versioning: URI (/v1/users), header (Accept: version=2), or query (?version=2). Security: Bearer tokens (JWT), OAuth 2.0 (authorization code with PKCE), rate limiting (token bucket with Retry-After), input validation (JSON Schema, Zod), idempotency keys for POST safety (

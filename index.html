ice, $sort, $position. Bitwise: $bit. <h4>Aggregation Pipeline</h4> db.collection.aggregate([{ $match: { status: \"active\" } }, { $group: { _id: \"$category\", total: { $sum: \"$amount\" }, avg: { $avg: \"$amount\" }, count: { $sum: 1 } } }, { $sort: { total: -1 } }, { $limit: 10 }]). Pipeline stages: $match, $project, $group, $sort, $limit, $skip, $unwind, $lookup (left outer join across collections), $facet (multi-faceted), $bucket, $bucketAuto, $replaceRoot, $addFields, $count, $sample, $out, $merge, $set, $unset, $unionWith, $search (Atlas Search), $densify, $fill, $setWindowFields (window functions). <h3>Indexing &amp; Performance</h3> Index types: single field, compound (ESR rule: equality, sort, range), multikey (array fields), text (full-text with weights and language stemming), geospatial (2dsphere, 2d), hashed, clustered, TTL (time-based expiration). Index properties: unique, sparse, partialFilterExpression, hidden. Wildcard indexes ($**). Covered queries when all fields in index. Explain: .explain(\"executionStats\"). COLLSCAN (collection scan), IXSCAN (index scan), FETCH. Query optimizer uses plan cache. Aggregation pipeline optimization: $match and $sort early, $project to reduce fields. <h3>Configuration</h3> mongod.conf: storage.dbPath, storage.journal.enabled true, systemLog.destination file, systemLog.path /var/log/mongodb/mongod.log, net.port (27017), net.bindIp (127.0.0.1), replication.replSetName (rs0), sharding.clusterRole (configsvr/shard). WiredTiger: storage.wiredTiger.engineConfig.cacheSizeGB (50-80% of RAM minus 1GB). Security: security.authorization enabled, security.keyFile. Operation profiling: db.setProfilingLevel(1, {slowms: 100}). <h3>Client Libraries / Drivers</h3> <table><tr><th>Language</th><th>Driver</th><th>Notes</th></tr> <tr><td>JavaScript/TS</td><td>mongodb (official), mongoose, prisma</td><td>Native and ODM</td></tr> <tr><td>Python</td><td>pymongo, motor (async), beanie, mongoengine</td><td>Sync, async, ODM</td></tr> <tr><td>Java</td><td>mongodb-driver-sync, mongodb-driver-reactivestreams, spring-data-mongodb</td><td>Sync, reactive, Spring Data</td></tr> <tr><td>Go</td><td>mongo-go-driver (official)</td><td>Official driver</td></tr> <tr><td>Rust</td><td>mongodb (official), bson</td><td>Async, type-safe</td></tr> <tr><td>C#</td><td>MongoDB.Driver (official)</td><td>LINQ support</td></tr></table>"},{"category":"Databases","title":"MySQL","tags":["SQL","relational","open-source","LAMP","InnoDB","Oracle"],"summary":"MySQL is an open-source RDBMS known for reliability and ease of use. The M in LAMP stack, powering millions of web apps.","content":"<h3>Core Data Types</h3> <table><tr><th>Category</th><th>Types</th><th>Description</th></tr> <tr><td>Numeric</td><td>TINYINT, SMALLINT, MEDIUMINT, INT, BIGINT, DECIMAL(p,s), NUMERIC(p,s), FLOAT(p), DOUBLE(p), BIT(n), BOOLEAN (TINYINT(1)), SERIAL (BIGINT UNSIGNED AI UNIQUE)</td><td>Integer types (1/2/3/4/8 bytes), fixed/float, bit field, boolean alias, auto-increment alias</td></tr> <tr><td>String</td><td>CHAR(n), VARCHAR(n), BINARY(n), VARBINARY(n), TINYBLOB, BLOB, MEDIUMBLOB, LONGBLOB, TINYTEXT, TEXT, MEDIUMTEXT, LONGTEXT, ENUM('v1','v2'), SET('v1','v2')</td><td>Character and binary strings up to 4GB; ENUM single value; SET multi-value</td></tr> <tr><td>Date/Time</td><td>DATE, TIME(fsp), DATETIME(fsp), TIMESTAMP(fsp), YEAR</td><td>Temporal types; TIMESTAMP is timezone-aware; DATETIME is not; fractional seconds support</td></tr> <tr><td>JSON</td><td>JSON (native binary, validated, optimized for reads)</td><td>Binary JSON with path expressions: column->path, JSON_EXTRACT, JSON_UNQUOTE</td></tr> <tr><td>Spatial</td><td>GEOMETRY, POINT, LINESTRING, POLYGON, MULTIPOINT, MULTILINESTRING, MULTIPOLYGON, GEOMETRYCOLLECTION</td><td>OpenGIS spatial types with SRID support and spatial indexes</td></tr></table> <h3>Key Commands / Queries</h3> <h4>DDL</h4> <table><tr><th>Command</th><th>Signature</th><th>MySQL-specific Notes</th></tr> <tr><td>CREATE DATABASE</td><td>CREATE DATABASE [IF NOT EXISTS] db [CHARACTER SET charset] [COLLATE collation]</td><td>Default character set utf8mb4 recommended</td></tr> <tr><td>CREATE TABLE</td><td>CREATE TABLE [IF NOT EXISTS] t (col type [UNSIGNED] [ZEROFILL] [NOT NULL] [DEFAULT] [AUTO_INCREMENT] [UNIQUE] [PRIMARY KEY] [COMMENT], ...) [ENGINE=InnoDB] [AUTO_INCREMENT=n] [CHARACTER SET charset] [PARTITION BY ...]</td><td>Engine option critical; AUTO_INCREMENT only on indexed integer column</td></tr> <tr><td>ALTER TABLE</td><td>ALTER TABLE t ADD|DROP|MODIFY|CHANGE|RENAME COLUMN c [type] [FIRST|AFTER c]</td><td>CHANGE for rename+type; MODIFY for type-only; ALGORITHM=INPLACE|COPY for online DDL</td></tr> <tr><td>CREATE INDEX</td><td>CREATE [UNIQUE|FULLTEXT|SPATIAL] INDEX name ON t (col [(n)] [ASC|DESC]) [USING BTREE|HASH]</td><td>Prefix indexes on VARCHAR/CHAR; FULLTEXT only MyISAM/InnoDB</td></tr></table> <h4>DML</h4> <table><tr><th>Command</th><th>MySQL-specific Notes</th></tr> <tr><td>SELECT</td><td>LIMIT {offset, count | count OFFSET offset}, INTO OUTFILE for export, WITH ROLLUP for subtotal aggregation, LOCK IN SHARE MODE for shared locks, FOR UPDATE NOWAIT | SKIP LOCKED (8.0+). Window functions (8.0+): ROW_NUMBER, RANK, DENSE_RANK, LAG, LEAD. CTE (8.0+): WITH [RECURSIVE] cte AS (...). JSON_TABLE() to convert JSON to relational rows. Hash Join (8.0+) for non-indexed equi-joins.</td></tr> <tr><td>INSERT</td><td>INSERT ... ON DUPLICATE KEY UPDATE col = VALUES(col) | expr (upsert). INSERT IGNORE to skip errors on duplicate key. REPLACE INTO (DELETE + INSERT) for full replacement.</td></tr> <tr><td>UPDATE</td><td>Multi-table UPDATE with JOIN: UPDATE t1 JOIN t2 ON cond SET t1.col = val WHERE cond. LIMIT n supported.</td></tr> <tr><td>DELETE</td><td>Multi-table DELETE: DELETE t1, t2 FROM t1 JOIN t2 ON cond WHERE cond. LIMIT n supported.</td></tr></table> <h4>Storage Engines</h4> SHOW ENGINES. InnoDB: default since 5.5, ACID, row-level locking, MVCC, foreign keys, clustered indexes, crash recovery, compression, encrypted tablespace, FULLTEXT (5.6+). Buffer pool (innodb_buffer_pool_size), redo log, undo log, doublewrite buffer, change buffer. MyISAM: non-transactional, table-level locking, compressed tables, FULLTEXT, GEO. MEMORY: in-RAM, hash indexes, table-level locks, lost on restart. CSV, ARCHIVE, BLACKHOLE, NDB (MySQL Cluster) for specialized use cases. <h3>Indexing &amp; Performance</h3> Index types: B-Tree (default InnoDB/MyISAM), Hash (MEMORY only), FULLTEXT (MyISAM/InnoDB), SPATIAL (MyISAM/InnoDB). Clustered index: InnoDB PK stores row data directly; secondary indexes store PK value. Composite indexes: leftmost prefix rule matters. EXPLAIN output: type (ALL=full scan, range, ref, eq_ref, const), possible_keys, key, key_len, ref, rows, Extra (Using index = covering, Using where, Using filesort, Using temporary). Histograms (8.0+): ANALYZE TABLE t UPDATE HISTOGRAM ON col WITH n BUCKETS. Invisible indexes for testing without dropping. Descending indexes (8.0+). Performance schema, sys schema, slow query log. Optimizer hints: INDEX, NO_INDEX, JOIN_FIXED_ORDER, BKA, MRR. <h3>Configuration</h3> my.ini / my.cnf: port (3306), datadir. InnoDB: innodb_buffer_pool_size (70-80% RAM), innodb_log_file_size (25% of buffer pool), innodb_flush_log_at_trx_commit (1=ACID, 2=per second), innodb_flush_method (O_DIRECT on Linux). Thread: max_connections (151), thread_cache_size. Temp: tmp_table_size, max_heap_table_size. Sort: sort_buffer_size, join_buffer_size. Binary log: log_bin, binlog_format (ROW), binlog_row_image, expire_logs_days. Replication: server_id, gtid_mode, enforce_gtid_consistency. <h3>Client Libraries / Drivers</h3> <table><tr><th>Language</th><th>Library</th><th>Notes</th></tr> <tr><td>Python</td><td>mysql-connector-python, pymysql, aiomysql, sqlalchemy</td><td>Official and community</td></tr> <tr><td>JavaScript</td><td>mysql2, sequelize, prisma, knex, typeorm</td><td>Prepared statement cache</td></tr> <tr><td>Java</td><td>MySQL Connector/J, R2DBC MySQL, Hibernate</td><td>JDBC and reactive</td></tr> <tr><td>Go</td><td>go-sql-driver/mysql, sqlx, gorm, ent</td><td>database/sql compatible</td></tr> <tr><td>Rust</td><td>sqlx (mysql), diesel (mysql), mysql_async</td><td>Async and compile-time</td></tr> <tr><td>C#</td><td>MySqlConnector, MySQL.Data (Oracle), EF Core (Pomelo)</td><td>High-performance async</td></tr></table>"},{"category":"Databases","title":"Neo4j","tags":["NoSQL","graph","nodes","relationships","Cypher","connected-data"],"summary":"Neo4j is a leading graph database using nodes and relationships to efficiently store and query connected data.","content":"<h3>Core Data Types</h3> <h4>Property Types</h4> <table><tr><th>Type</th><th>Description</th><th>Examples</th></tr> <tr><td>Integer</td><td>64-bit signed integer</td><td>42, -100, 9223372036854775807</td></tr> <tr><td>Float</td><td>64-bit IEEE 754 double</td><td>3.14159, -0.5, 2.998e8</td></tr> <tr><td>String</td><td>UTF-8 string</td><td>'hello', \"Alice's house\"</td></tr> <tr><td>Boolean</td><td>true or false</td><td>true, false</td></tr> <tr><td>Date</td><td>Date without time</td><td>Date('2024-06-07')</td></tr> <tr><td>Time</td><td>Time with timezone</td><td>Time('14:30:00.000+01:00')</td></tr> <tr><td>LocalTime</td><td>Time without timezone</td><td>LocalTime('14:30:00')</td></tr> <tr><td>DateTime</td><td>Date, time, and timezone</td><td>DateTime('2024-06-07T14:30:00Z')</td></tr> <tr><td>LocalDateTime</td><td>Date and time without timezone</td><td>LocalDateTime('2024-06-07T14:30:00')</td></tr> <tr><td>Duration</td><td>ISO 8601 duration</td><td>Duration('P14DT16H')</td></tr> <tr><td>Point</td><td>Spatial coordinate (2D/3D, WGS84/Cartesian)</td><td>Point({latitude: 51.5, longitude: -0.12})</td></tr> <tr><td>List</td><td>Heterogeneous ordered list</td><td>[1, 'hello', true]</td></tr> <tr><td>Map</td><td>JSON-like property map</td><td>{name: 'Alice', age: 30}</td></tr> <tr><td>Node</td><td>Graph node reference</td><td>n (in query context)</td></tr> <tr><td>Relationship</td><td>Graph relationship reference</td><td>r (in query context)</td></tr> <tr><td>Path</td><td>Node-relationship sequence</td><td>p = (a)-[*]->(b)</td></tr></table> <h3>Key Commands / Queries</h3> <h4>Cypher Query Language</h4> <table><tr><th>Command</th><th>Syntax</th><th>Description</th></tr> <tr><td>MATCH</td><td>MATCH (n:Label {prop: val})-[r:REL]->(m:Label) WHERE condition RETURN n, r, m</td><td>Pattern matching; core Cypher operation</td></tr> <tr><td>OPTIONAL MATCH</td><td>OPTIONAL MATCH pattern (returns NULLs on non-matches, like LEFT JOIN)</td><td>Optional pattern matching</td></tr> <tr><td>RETURN</td><td>RETURN expr [AS alias], n.prop, count(*), collect(n), count(DISTINCT n)</td><td>Project and aggregate results</td></tr> <tr><td>WHERE</td><td>WHERE n.prop = val | IN [list] | CONTAINS str | STARTS WITH str | EXISTS(n.prop) | type(r) = 'REL'</td><td>Filtering with rich predicates</td></tr> <tr><td>CREATE</td><td>CREATE (n:Label {prop: val})-[r:REL {prop: val}]->(m:Label)</td><td>Create nodes and relationships with properties</td></tr> <tr><td>MERGE</td><td>MERGE (n:Label {prop: val}) ON CREATE SET n.created = timestamp() ON MATCH SET n.updated = timestamp()</td><td>Idempotent find-or-create with conditional actions</td></tr> <tr><td>SET</td><td>SET n.prop = val, n += {props}, n:NewLabel</td><td>Update properties and labels</td></tr> <tr><td>REMOVE</td><td>REMOVE n.prop, n:Label</td><td>Delete properties or labels</td></tr> <tr><td>DELETE</td><td>DELETE n, r | DETACH DELETE n</td><td>Remove nodes and relationships</td></tr> <tr><td>WITH</td><td>WITH n, count(*) AS cnt ORDER BY cnt DESC LIMIT 10</td><td>Pipeline between query parts</td></tr> <tr><td>UNWIND</td><td>UNWIND [1, 2, 3] AS x RETURN x * 2</td><td>Expand list into rows</td></tr> <tr><td>FOREACH</td><td>FOREACH (x IN list | CREATE (n:Item {id: x}))</td><td>Apply mutations per list element</td></tr> <tr><td>CALL</td><td>CALL db.labels() | CALL db.schema.visualization() | CALL db.index.fulltext.queryNodes('i', 'text') YIELD node, score</td><td>Call procedures and functions</td></tr> <tr><td>LOAD CSV</td><td>LOAD CSV WITH HEADERS FROM 'file:///data.csv' AS row CREATE (n:Node {id: row.id})</td><td>Bulk CSV import</td></tr> <tr><td>PROFILE / EXPLAIN</td><td>PROFILE MATCH ... | EXPLAIN MATCH ...</td><td>Query plan analysis</td></tr></table> <h4>Pattern Examples</h4> MATCH (a:Person {name: 'Alice'})-[:FRIENDS_WITH]->(friend) RETURN friend.name. MATCH (a:Person)-[:FRIENDS_WITH*1..3]->(p) RETURN DISTINCT p.name (variable-length path). MATCH p = shortestPath((a)-[:KNOWS*]-(b)) RETURN length(p) (shortest path). CALL gds.pageRank.stream('graph', {maxIterations: 20}) YIELD nodeId, score RETURN gds.util.asNode(nodeId).name AS name ORDER BY score DESC (graph algorithms via GDS plugin). CALL db.index.fulltext.queryNodes('personIndex', 'alice') YIELD node, score (full-text search). <h3>Indexing &amp; Performance</h3> Index types: B-Tree (standard, for property equality and range), Full-text (Apache Lucene, for scoring and fuzzy), Point (spatial distance queries), Token (labels and relationship types), Composite (multiple properties). Index hints: USING INDEX n:Label(prop). Schema indexes maintained automatically. USE PERIODIC COMMIT for bulk updates. Page cache: dbms.memory.pagecache.size (50-70% of RAM for graph store). Avoid CartesianProduct in patterns. Use directed relationships for specificity. PROFILE identifies node-by-id scans. Native graph processing: index-free adjacency (O(1) per relationship traversal). <h3>Configuration</h3> neo4j.conf: dbms.directories.data, dbms.directories.plugins (APOC, GDS, Bloom), dbms.memory.pagecache.size (50-70% RAM for graph store), dbms.memory.heap.initial_size, dbms.memory.heap.max_size (JVM, 8-16GB), dbms.security.auth_enabled (true for production), dbms.connector.bolt.listen_address (7687), dbms.connector.http.listen_address (7474), dbms.tx_log.rotation.retention_policy. Clustering: dbms.mode (CORE|READ_REPLICA), causal_clustering.expected_core_cluster_size. <h3>Client Libraries / Drivers</h3> <table><tr><th>Language</th><th>Driver</th><th>Notes</th></tr> <tr><td>Python</td><td>neo4j (official), py2neo, neomodel, Neo4j GraphQL</td><td>Official sync/async driver</td></tr> <tr><td>JavaScript</td><td>neo4j-driver (official), neo4j-graphql-js</td><td>Bolt protocol, reactive</td></tr> <tr><td>Java</td><td>neo4j-java-driver, Spring Data Neo4j</td><td>Imperative and reactive</td></tr> <tr><td>Go</td><td>neo4j-go-driver (official)</td><td>Bolt protocol for Go</td></tr> <tr><td>Rust</td><td>neo4rs, tinkerpop (gremlin)</td><td>Async Bolt driver</td></tr> <tr><td>C#</td><td>Neo4j.Driver (official)</td><td>Bolt protocol for .NET</td></tr> <tr><td>Ruby</td><td>neo4j-ruby-driver, neo4j gem</td><td>Rails integration</td></tr></table>"},{"category":"Databases","title":"PostgreSQL","tags":["SQL","relational","ACID","open-source","JSON","MVCC","extensions","advanced"],"summary":"PostgreSQL is a powerful open-source object-relational database with ACID compliance, MVCC, and extensive extensibility.","content":"<h3>Core Data Types</h3> <table><tr><th>Category</th><th>Types</th><th>Description</th></tr> <tr><td>Numeric</td><td>INTEGER, SMALLINT, BIGINT, NUMERIC(p,s), DECIMAL, REAL, DOUBLE PRECISION, MONEY, SERIAL, BIGSERIAL, SMALLSERIAL</td><td>Integer, floating-point, fixed-point, and auto-increment</td></tr> <tr><td>Character</td><td>CHAR(n), VARCHAR(n), TEXT</td><td>Fixed, variable, and unlimited text</td></tr> <tr><td>Binary</td><td>BYTEA</td><td>Variable-length binary string</td></tr> <tr><td>Date/Time</td><td>DATE, TIME(p), TIMESTAMP(p), TIMESTAMPTZ, INTERVAL</td><td>Date, time with or without zone, interval</td></tr> <tr><td>Boolean</td><td>BOOLEAN</td><td>TRUE, FALSE, NULL</td></tr> <tr><td>JSON</td><td>JSON, JSONB</td><td>Text and binary JSON with GIN indexing</td></tr> <tr><td>Array</td><td>INTEGER[], TEXT[], JSONB[], etc.</td><td>Multi-dimensional arrays</td></tr> <tr><td>Range</td><td>INT4RANGE, INT8RANGE, NUMRANGE, TSRANGE, TSTZRANGE, DATERANGE</td><td>Discrete and continuous ranges</td></tr> <tr><td>Full-Text</td><td>TSVECTOR, TSQUERY</td><td>Lexeme vector and query for full-text search</td></tr> <tr><td>Network</td><td>INET, CIDR, MACADDR</td><td>IPv4, IPv6, and MAC addresses</td></tr> <tr><td>UUID</td><td>UUID</td><td>Universally unique identifier</td></tr> <tr><td>Spatial</td><td>GEOMETRY, GEOGRAPHY (via PostGIS)</td><td>Points, lines, polygons, rasters</td></tr> <tr><td>Enum</td><td>Custom ENUM via CREATE TYPE name AS ENUM (...)</td><td>Fixed set of string values</td></tr> <tr><td>HSTORE</td><td>HSTORE</td><td>Key-value pairs in single column</td></tr> <tr><td>LTREE</td><td>LTREE</td><td>Hierarchical tree path labels</td></tr> <tr><td>Vector</td><td>VECTOR(n) (via pgvector extension)</td><td>Embedding vectors for similarity search</td></tr></table> <h3>Key Commands / Queries</h3> <h4>DDL</h4> <table><tr><th>Command</th><th>Signature</th><th>Description</th></tr> <tr><td>CREATE TABLE</td><td>CREATE TABLE [IF NOT EXISTS] name (col type [DEFAULT] [constraints], ...) [INHERITS (parent)] [PARTITION BY {RANGE | LIST | HASH} (col)] [TABLESPACE ts]</td><td>Create table with inheritance and partitioning</td></tr> <tr><td>CREATE INDEX</td><td>CREATE [UNIQUE] INDEX [CONCURRENTLY] name ON table [USING {btree | hash | gist | gin | spgist | brin | bloom}] (col [ASC|DESC], ...) [INCLUDE (cols)] [WHERE predicate]</td><td>Create index with method, covering, and partial where</td></tr> <tr><td>ALTER TABLE</td><td>ALTER TABLE name ADD col type | DROP col [CASCADE] | ALTER col TYPE newtype [USING expr] | SET | DROP DEFAULT | SET | DROP NOT NULL</td><td>Modify table with safe type casts</td></tr> <tr><td>CREATE EXTENSION</td><td>CREATE EXTENSION [IF NOT EXISTS] name [SCHEMA sch] [VERSION ver] [CASCADE]</td><td>Install extension (postgis, pgvector, etc.)</td></tr> <tr><td>VACUUM</td><td>VACUUM [FULL] [FREEZE] [VERBOSE] [ANALYZE] [table]</td><td>Reclaim storage and update visibility map</td></tr> <tr><td>ANALYZE</td><td>ANALYZE [VERBOSE] [table [(col, ...)]]</td><td>Update table statistics for query optimizer</td></tr></table> <h4>DML &amp; Advanced SQL</h4> INSERT ... ON CONFLICT (col) DO NOTHING | DO UPDATE SET col = EXCLUDED.col (upsert). SELECT ... FOR UPDATE | FOR NO KEY UPDATE | FOR SHARE | FOR KEY SHARE [NOWAIT | SKIP LOCKED]. DELETE ... USING other_table WHERE cond [RETURNING *]. UPDATE ... FROM other_table WHERE cond [RETURNING *]. WITH RECURSIVE for hierarchical queries. Window functions with ROWS, RANGE, GROUPS framing. Full-text search: to_tsvector, to_tsquery, ts_rank, ts_headline, websearch_to_tsquery. JSONB operators: -> (JSON field), ->> (text), @> (contains), ? (exists), #> (path), || (concatenate), - (delete). Table inheritance and partitioning (declarative RANGE, LIST, HASH). Foreign data wrappers (postgres_fdw, mysql_fdw, file_fdw). <h3>Indexing &amp; Performance</h3> Index types: B-Tree (default, all comparisons, sorting), Hash (equality only), GiST (geometry, full-text, custom types), GIN (JSONB, arrays, full-text lexemes), SP-GiST (space-partitioned: k-d trees, quad-trees), BRIN (block range for large time-series), bloom (Bloom filter for multi-column equality), pgvector (IVFFlat, HNSW for embeddings). Performance: EXPLAIN (ANALYZE, BUFFERS, FORMAT JSON), auto_explain, pg_stat_statements. Shared buffers hit ratio. work_mem tuning for sorts and hashes.</summary> <h3>Configuration</h3> postgresql.conf: listen_addresses, port (5432), max_connections (100), shared_buffers (25% of RAM), effective_cache_size (75% of RAM), work_mem (4-64MB), maintenance_work_mem (64MB-1GB), random_page_cost (1.1 SSD), wal_level (replica), max_wal_size (4GB), checkpoint_completion_target (0.9), synchronous_commit (on), wal_buffers (16MB), max_worker_processes (8), max_parallel_workers_per_gather (2), log_min_duration_statement (1000ms), statement_timeout (30000ms). <h3>Client Libraries / Drivers</h3> <table><tr><th>Language</th><th>Library</th><th>Notes</th></tr> <tr><td>Python</td><td>psycopg2, asyncpg, sqlalchemy</td><td>Sync, async, ORM</td></tr> <tr><td>JavaScript</td><td>node-postgres (pg), slonik, knex, prisma</td><td>Native and query builder</td></tr> <tr><td>Java</td><td>PostgreSQL JDBC, R2DBC, Hibernate, jOOQ</td><td>Reactive and JDBC</td></tr> <tr><td>Go</td><td>pgx, database/sql with lib/pq, sqlc, gorm</td><td>pgx is fastest</td></tr> <tr><td>Rust</td><td>sqlx, diesel, tokio-postgres</td><td>Compile-time checked</td></tr> <tr><td>C#</td><td>Npgsql, EF Core (Npgsql), Dapper</td><td>Full ADO.NET</td></tr> <tr><td>Ruby</td><td>pg gem, activerecord, sequel</td><td>Mature ecosystem</td></tr></table>"},{"category":"Databases","title":"Redis","tags":["cache","key-value","in-memory","NoSQL","pub-sub","data-structures"],"summary":"Redis is an in-memory data structure store used as database, cache, message broker, and streaming engine.","content":"<h3>Core Data Types</h3> <table><tr><th>Type</th><th>Key Commands</th><th>Description</th></tr> <tr><td>String</td><td>SET, GET, GETSET, MSET, MGET, STRLEN, APPEND, INCR, INCRBY, INCRBYFLOAT, DECR, DECRBY, GETRANGE, SETRANGE, SETEX, SETNX, GETDEL, GETEX</td><td>Binary-safe strings up to 512MB. Building block for caching, counters, distributed locks (SET NX EX), session storage</td></tr> <tr><td>List</td><td>LPUSH, RPUSH, LPOP, RPOP, LLEN, LRANGE, LINDEX, LSET, LTRIM, LINSERT, LREM, LPOS, LMOVE, BLMOVE, BLPOP, BRPOP</td><td>Linked list of strings. Fast head and tail operations. Used for message queues, timelines, work queues</td></tr> <tr><td>Set</td><td>SADD, SREM, SMEMBERS, SISMEMBER, SCARD, SPOP, SRANDMEMBER, SMOVE, SDIFF, SINTER, SUNION, SSCAN</td><td>Unordered unique strings. O(1) membership test. Used for tags, deduplication, friends sets</td></tr> <tr><td>Sorted Set</td><td>ZADD, ZREM, ZRANGE, ZREVRANGE, ZRANK, ZREVRANK, ZSCORE, ZINCRBY, ZCARD, ZCOUNT, ZRANGEBYSCORE, ZRANGEBYLEX, ZUNIONSTORE, ZINTERSTORE, ZPOPMIN, ZPOPMAX, BZPOPMIN, BZPOPMAX</td><td>Ordered by score for sorting. Used for leaderboards, rate limiting, priority queues, autocomplete</td></tr> <tr><td>Hash</td><td>HSET, HGET, HMSET, HMGET, HGETALL, HKEYS, HVALS, HEXISTS, HDEL, HLEN, HINCRBY, HINCRBYFLOAT, HSETNX, HSTRLEN, HRANDFIELD, HSCAN</td><td>Field-value pairs within a key. Used for object representation, session stores, profile data</td></tr> <tr><td>Stream</td><td>XADD, XREAD, XREADGROUP, XRANGE, XREVRANGE, XLEN, XDEL, XGROUP, XACK, XCLAIM, XPENDING, XINFO, XTRIM</td><td>Append-only log. Used for event sourcing, message queues, activity feeds, log aggregation</td></tr> <tr><td>Bitmap</td><td>SETBIT, GETBIT, BITCOUNT, BITPOS, BITOP, BITFIELD</td><td>String as bits. Used for real-time analytics, bloom filters, feature flags</td></tr> <tr><td>HyperLogLog</td><td>PFADD, PFCOUNT, PFMERGE</td><td>Probabilistic cardinality. ~0.81% error. Used for unique visitor counting, distinct elements</td></tr> <tr><td>Geospatial</td><td>GEOADD, GEODIST, GEOHASH, GEOPOS, GEORADIUS, GEORADIUSBYMEMBER, GEOSEARCH</td><td>Coordinate storage and radius queries. Used for location-based services, nearby places</td></tr> <tr><td>JSON</td><td>JSON.SET, JSON.GET, JSON.DEL, JSON.NUMINCRBY, JSON.STRAPPEND, JSON.ARRAYAPPEND, JSON.OBJKEYS (via RedisJSON module)</td><td>Document store with JSONPath queries</td></tr> <tr><td>Time Series</td><td>TS.CREATE, TS.ADD, TS.ALTER, TS.GET, TS.MGET, TS.RANGE, TS.INFO, TS.INCRBY (via RedisTimeSeries module)</td><td>Time-series with downsampling, retention, aggregation</td></tr></table> <h3>Key Commands / Queries</h3> <h4>Generic Key Management</h4> <table><tr><th>Command</th><th>Signature</th><th>Description</th></tr> <tr><td>DEL</td><td>DEL key [key ...]</td><td>Delete one or more keys</td></tr> <tr><td>EXISTS</td><td>EXISTS key [key ...]</td><td>Check if key exists</td></tr> <tr><td>EXPIRE</td><td>EXPIRE key seconds</td><td>Set time-to-live in seconds</td></tr> <tr><td>TTL</td><td>TTL key</td><td>Get remaining TTL in seconds</td></tr> <tr><td>SCAN</td><td>SCAN cursor [MATCH pattern] [COUNT n] [TYPE type]</td><td>Incremental key iteration (non-blocking)</td></tr> <tr><td>KEYS</td><td>KEYS pattern</td><td>Find keys by pattern (avoid in production)</td></tr> <tr><td>TYPE</td><td>TYPE key</td><td>Return the data type of a key</td></tr> <tr><td>RENAME</td><td>RENAME key newkey</td><td>Rename a key</td></tr> <tr><td>COPY</td><td>COPY source dest [DB db] [REPLACE]</td><td>Copy key to another database</td></tr> <tr><td>UNLINK</td><td>UNLINK key [key ...]</td><td>Non-blocking delete (lazy unlink)</td></tr></table> <h4>Transactions &amp; Lua Scripting</h4> Transactions: MULTI, EXEC, DISCARD. WATCH for optimistic locking (CAS pattern). Lua scripting: EVAL script numkeys key [key ...] arg [arg ...]. EVALSHA for cached scripts. SCRIPT LOAD, SCRIPT EXISTS, SCRIPT FLUSH. Scripts are atomic and replicate as single units. <h4>Pub/Sub</h4> PUBLISH channel message, SUBSCRIBE channel [channel ...], PSUBSCRIBE pattern [pattern ...], UNSUBSCRIBE, PUNSUBSCRIBE. Fire-and-forget messaging. No message persistence. For reliable messaging use Streams or Redis Stack. <h3>Indexing &amp; Performance</h3> Redis is in-memory, so indexing is not disk-based. Performance strategies: pipelining (batch commands for latency reduction), SCAN over KEYS, UNLINK over DEL, Hash encoding for small objects (ziplist), maxmemory-policy (allkeys-lru, volatile-lru, allkeys-lfu, volatile-ttl), avoid big keys (use MEMORY USAGE key), read replicas for read scaling, Redis Cluster (16384 hash slots, CRC16 hashing) for horizontal scaling. Avoid cross-slot operations in cluster mode. <h3>Configuration</h3> redis.conf: port 6379, bind 127.0.0.1, requirepass, maxmemory (80% of RAM), maxmemory-policy allkeys-lru, save 900 1 (RDB), appendonly yes, appendfsync everysec, replica-serve-stale-data yes, replica-read-only yes, repl-backlog-size 64mb, lazyfree-lazy-eviction yes, latency-monitor-threshold 100, slowlog-log-slower-than 10000, slowlog-max-len 128. <h3>Client Libraries / Drivers</h3> <table><tr><th>Language</th><th>Library</th><th>Notes</th></tr> <tr><td>Python</td><td>redis-py (4.x+ includes async), redis-py-cluster</td><td>Official client</td></tr> <tr><td>JavaScript</td><td>ioredis, node-redis, redis-om</td><td>Cluster, Sentinel, Lua</td></tr> <tr><td>Java</td><td>Lettuce (async/reactive), Jedis, Redisson</td><td>Lettuce uses Netty</td></tr> <tr><td>Go</td><td>go-redis/redis, redigo, rueidis</td><td>Cluster and Sentinel support</td></tr> <tr><td>Rust</td><td>redis-rs, fred</td><td>Async support</td></tr> <tr><td>C#</td><td>StackExchange.Redis, ServiceStack.Redis</td><td>Multiplexer-based</td></tr> <tr><td>Ruby</td><td>redis-rb, redis-objects, hiredis</td><td>Well-established</td></tr></table>"},{"category":"Databases","title":"SQL","tags":["database","query","relational","DDL","DML","transactions","joins","ACID"],"summary":"SQL is the standard language for managing relational databases, covering DDL, DML, querying, and transactions.","content":"<h3>Core Data Types</h3> <table><tr><th>Category</th><th>Types</th><th>Description</th></tr> <tr><td>Numeric</td><td>INTEGER, SMALLINT, BIGINT, NUMERIC(p,s), DECIMAL, REAL, DOUBLE PRECISION, FLOAT, SERIAL, BIGSERIAL, MONEY</td><td>Exact and approximate numeric types; SERIAL auto-increments</td></tr> <tr><td>Character</td><td>CHAR(n), VARCHAR(n), TEXT, CLOB, NCHAR(n), NVARCHAR(n), NTEXT</td><td>Fixed-length, variable-length, and large text</td></tr> <tr><td>Binary</td><td>BLOB, BINARY(n), VARBINARY(n), BIT(n), BIT VARYING</td><td>Binary data and bit fields</td></tr> <tr><td>Date/Time</td><td>DATE, TIME(p), TIMESTAMP(p), TIMESTAMP WITH TIME ZONE, TIMESTAMP WITHOUT TIME ZONE, INTERVAL</td><td>Temporal types for date, time, timezone, and duration</td></tr> <tr><td>Boolean</td><td>BOOLEAN</td><td>TRUE, FALSE, or NULL</td></tr> <tr><td>Spatial</td><td>GEOMETRY, POINT, LINESTRING, POLYGON, MULTIPOLYGON, GEOGRAPHY</td><td>Geospatial objects and coordinates</td></tr> <tr><td>JSON</td><td>JSON, JSONB</td><td>Lightweight text and binary JSON storage</td></tr> <tr><td>Other</td><td>UUID, ARRAY, ENUM, XML, HSTORE, INET, CIDR, MACADDR, TSVECTOR, TSQUERY, LTREE, INT4RANGE, TSRANGE, DATERANGE</td><td>Network, full-text, range, and extension types</td></tr></table> <h3>Key Commands / Queries</h3> <h4>DDL (Data Definition Language)</h4> <table><tr><th>Command</th><th>Signature</th><th>Description</th></tr> <tr><td>CREATE TABLE</td><td>CREATE TABLE [IF NOT EXISTS] name (col type [DEFAULT expr] [constraints], ...) [TABLESPACE ts]</td><td>Create a new table with columns, defaults, and constraints</td></tr> <tr><td>ALTER TABLE</td><td>ALTER TABLE name ADD [COLUMN] col type | DROP [COLUMN] col [CASCADE] | ALTER [COLUMN] col [SET DEFAULT | DROP DEFAULT | SET NOT NULL | DROP NOT NULL | TYPE newtype [USING expr]] | RENAME [COLUMN] col TO newcol</td><td>Modify table structure</td></tr> <tr><td>DROP TABLE</td><td>DROP TABLE [IF EXISTS] name [CASCADE | RESTRICT]</td><td>Remove table and its data</td></tr> <tr><td>TRUNCATE</td><td>TRUNCATE [TABLE] name [, ...] [RESTART IDENTITY | CONTINUE IDENTITY] [CASCADE]</td><td>Fast removal of all rows</td></tr> <tr><td>CREATE INDEX</td><td>CREATE [UNIQUE] INDEX [CONCURRENTLY] name ON table [USING method] (col [ASC|DESC] [NULLS FIRST|LAST], ...) [INCLUDE (cols)] [WHERE predicate]</td><td>Create index with method selection and covering columns</td></tr> <tr><td>CREATE VIEW</td><td>CREATE [OR REPLACE] [MATERIALIZED] VIEW name [(cols)] AS query [WITH [NO] DATA]</td><td>Create virtual or materialized view</td></tr></table> <h4>DML (Data Manipulation Language)</h4> <table><tr><th>Command</th><th>Signature</th><th>Description</th></tr> <tr><td>SELECT</td><td>SELECT [DISTINCT | ALL] cols | * FROM source [JOIN ...] [WHERE cond] [GROUP BY cols] [HAVING cond] [WINDOW win AS (...)] [ORDER BY cols [ASC|DESC]] [LIMIT n [OFFSET m]] [FOR UPDATE | NO KEY UPDATE | SHARE | KEY SHARE] [NOWAIT | SKIP LOCKED]</td><td>Retrieve rows with full query capabilities</td></tr> <tr><td>INSERT</td><td>INSERT INTO table [(cols)] VALUES (vals) [, ...] | SELECT ... | DEFAULT VALUES [RETURNING *] [ON CONFLICT DO ...]</td><td>Insert one or more rows, optionally returning values</td></tr> <tr><td>UPDATE</td><td>UPDATE [ONLY] table AS alias SET col = val [, ...] [FROM source] WHERE cond [RETURNING *]</td><td>Modify rows matching condition</td></tr> <tr><td>DELETE</td><td>DELETE FROM [ONLY] table [AS alias] [USING source] WHERE cond [RETURNING *]</td><td>Remove rows matching condition</td></tr> <tr><td>MERGE / UPSERT</td><td>MERGE INTO target USING source ON cond WHEN MATCHED THEN UPDATE SET ... | DELETE WHEN NOT MATCHED THEN INSERT [(cols)] VALUES (vals)</td><td>Conditional insert, update, or delete</td></tr> <tr><td>WITH / CTE</td><td>WITH [RECURSIVE] cte [(cols)] AS (query) [, ...] SELECT ... FROM cte</td><td>Common table expressions for recursive or modular queries</td></tr></table> <h4>Join Types</h4> <table><tr><th>Type</th><th>Syntax</th><th>Description</th></tr> <tr><td>INNER JOIN</td><td>SELECT ... FROM a [INNER] JOIN b ON condition</td><td>Rows with matching values in both tables</td></tr> <tr><td>LEFT JOIN</td><td>SELECT ... FROM a LEFT [OUTER] JOIN b ON condition</td><td>All rows from a; NULLs for non-matching b</td></tr> <tr><td>RIGHT JOIN</td><td>SELECT ... FROM a RIGHT [OUTER] JOIN b ON condition</td><td>All rows from b; NULLs for non-matching a</td></tr> <tr><td>FULL JOIN</td><td>SELECT ... FROM a FULL [OUTER] JOIN b ON condition</td><td>All rows from both; NULLs where no match</td></tr> <tr><td>CROSS JOIN</td><td>SELECT ... FROM a CROSS JOIN b</td><td>Cartesian product</td></tr> <tr><td>SELF JOIN</td><td>SELECT ... FROM a AS x JOIN a AS y ON x.col = y.col</td><td>Table joined with itself</td></tr> <tr><td>NATURAL JOIN</td><td>SELECT ... FROM a NATURAL JOIN b</td><td>Join on columns with same names</td></tr> <tr><td>LATERAL JOIN</td><td>SELECT ... FROM a, LATERAL (SELECT ... WHERE a.id = b.id) AS sub</td><td>Subquery referencing outer columns</td></tr></table> <h4>Window Functions</h4> ROW_NUMBER() OVER (PARTITION BY col ORDER BY col), RANK(), DENSE_RANK(), NTILE(n), LAG(col, offset, default), LEAD(col, offset, default), FIRST_VALUE(col), LAST_VALUE(col), NTH_VALUE(col, n), SUM(col) OVER (ORDER BY col ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW), AVG(col) OVER (PARTITION BY col ORDER BY col RANGE BETWEEN INTERVAL '1 day' PRECEDING AND CURRENT ROW). <h4>Transactions &amp; Isolation</h4> Transaction commands: BEGIN [ISOLATION LEVEL options] [READ WRITE | READ ONLY], COMMIT, ROLLBACK [TO SAVEPOINT], SAVEPOINT, RELEASE SAVEPOINT. ACID: Atomicity, Consistency, Isolation, Durability. Isolation levels: READ UNCOMMITTED, READ COMMITTED, REPEATABLE READ, SERIALIZABLE. <h3>Indexing &amp; Performance</h3> Index types: B-Tree (default, supports all comparisons and sorting), Hash (equality only), GiST (generalized search tree), GIN (inverted index for JSONB and arrays), SP-GiST (space-partitioned), BRIN (block range for large tables). Composite indexes follow leftmost prefix rule. EXPLAIN ANALYZE for query plans. Index-only scans, covering indexes with INCLUDE. Partial indexes (WHERE predicate), expression indexes on functions. Autovacuum for MVCC tuple management. <h3>Configuration</h3> Key parameters: max_connections, shared_buffers (25% RAM), effective_cache_size (75% RAM), work_mem, maintenance_work_mem, random_page_cost (1.1 SSD, 4.0 HDD), wal_buffers, statement_timeout, log_min_duration_statement, synchronous_commit. <h3>Client Libraries / Drivers</h3> <table><tr><th>Language</th><th>Library</th><th>Notes</th></tr> <tr><td>Python</td><td>psycopg2, asyncpg, sqlalchemy, aiosqlite, mysql-connector-python</td><td>Sync/async, raw and ORM</td></tr> <tr><td>JavaScript</td><td>pg, mysql2, better-sqlite3, knex, prisma, sequelize</td><td>Node.js drivers and ORMs</td></tr> <tr><td>Java</td><td>JDBC, Hibernate ORM, R2DBC, jOOQ, MyBatis</td><td>Standard and reactive DB access</td></tr> <tr><td>Go</td><td>database/sql, pgx, go-sql-driver/mysql, sqlc, gorm, ent</td><td>Standard interface and code-gen ORMs</td></tr> <tr><td>Rust</td><td>sqlx, diesel, tokio-postgres, rusqlite, sea-orm</td><td>Compile-time checked queries</td></tr> <tr><td>C#</td><td>ADO.NET, Entity Framework Core, Dapper, Npgsql</td><td>Full ORM and micro-ORM</td></tr> <tr><td>Ruby</td><td>pg, mysql2, activerecord, sequel</td><td>Rails ORM and standalone</td></tr></table>"},{"category":"Databases","title":"SQLite","tags":["SQL","embedded","serverless","zero-config","lightweight","public-domain"],"summary":"SQLite is a C library implementing a small, fast, self-contained SQL database engine. The most widely deployed database engine.","content":"<h3>Core Data Types</h3> SQLite uses manifest typing (type affinity) rather than strict type enforcement. Each column has a type affinity that influences how data is stored. <h4>Storage Classes (5 basic types)</h4> <table><tr><th>Type</th><th>Description</th><th>Notes</th></tr> <tr><td>NULL</td><td>NULL value</td><td>Absence of value</td></tr> <tr><td>INTEGER</td><td>Signed integer, 1-8 bytes depending on magnitude</td><td>Variable-length varint encoding; range -2^63 to 2^63-1</td></tr> <tr><td>REAL</td><td>64-bit IEEE 754 floating point</td><td>Double precision</td></tr> <tr><td>TEXT</td><td>UTF-8, UTF-16BE, or UTF-16LE string</td><td>Encoding determined by database setting</td></tr> <tr><td>BLOB</td><td>Binary data stored exactly as input</td><td>No encoding; byte-for-byte storage</td></tr></table> <h4>Type Affinities</h4> <table><tr><th>Declared Column Type</th><th>Resulting Affinity</th></tr> <tr><td>INT, INTEGER, TINYINT, SMALLINT, MEDIUMINT, BIGINT, BOOLEAN</td><td>INTEGER</td></tr> <tr><td>CHAR(n), VARCHAR(n), TEXT, CLOB, NVARCHAR(n)</td><td>TEXT</td></tr> <tr><td>BLOB, no type specified</td><td>BLOB</td></tr> <tr><td>REAL, FLOAT, DOUBLE, DOUBLE PRECISION</td><td>REAL</td></tr> <tr><td>NUMERIC, DECIMAL, DATE, DATETIME</td><td>NUMERIC</td></tr></table> <h3>Key Commands / Queries</h3> <h4>DDL</h4> <table><tr><th>Command</th><th>Signature</th><th>SQLite-Specific Notes</th></tr> <tr><td>CREATE TABLE</td><td>CREATE TABLE [IF NOT EXISTS] name (col type [PRIMARY KEY] [AUTOINCREMENT] [NOT NULL] [DEFAULT val] [UNIQUE] [CHECK(expr)], ..., constraints) [WITHOUT ROWID] [STRICT]</td><td>WITHOUT ROWID requires explicit PK. STRICT (3.37+) enforces type affinity. AUTOINCREMENT only on INTEGER PK</td></tr> <tr><td>ALTER TABLE</td><td>ALTER TABLE name RENAME TO new | ADD [COLUMN] col type | RENAME COLUMN old TO new | DROP COLUMN col (3.35+)</td><td>No ALTER COLUMN type. Workaround: CREATE new, INSERT SELECT, DROP old, RENAME</td></tr> <tr><td>CREATE INDEX</td><td>CREATE [UNIQUE] INDEX [IF NOT EXISTS] name ON table (col [ASC|DESC]) [WHERE expr]</td><td>Partial indexes via WHERE clause</td></tr> <tr><td>CREATE TRIGGER</td><td>CREATE [TEMP] TRIGGER name [BEFORE|AFTER] [INSERT|DELETE|UPDATE] ON table [FOR EACH ROW] BEGIN stmts; END</td><td>Row-level only; OLD and NEW references</td></tr> <tr><td>Virtual Table</td><td>CREATE VIRTUAL TABLE t USING fts5(content, tokenize='porter unicode61')</td><td>FTS5, rtree, json_each, generate_series</td></tr></table> <h4>DML &amp; SQL Support</h4> Full SQL: JOIN (INNER, LEFT, CROSS, NATURAL), subqueries, GROUP BY with HAVING, ORDER BY, LIMIT/OFFSET. Window functions (3.25+): ROW_NUMBER, RANK, DENSE_RANK, LAG, LEAD. CTE: WITH [RECURSIVE] cte AS (...). UPSERT: INSERT ... ON CONFLICT(col) DO UPDATE SET col = excluded.col | DO NOTHING. RETURNING clause (3.35+): INSERT | UPDATE | DELETE ... RETURNING col,. Dynamic typing: any value can be stored in any column regardless of declared type (use STRICT tables to enforce). <h4>CLI Dot-Commands</h4> .tables, .schema [table], .dump, .import file table, .mode json|column|markdown|box|csv, .indexes, .databases, .backup, .open, .headers on, .timer on. <h3>Indexing &amp; Performance</h3> B-Tree for default rowid tables; PRIMARY KEY index for WITHOUT ROWID. One index used per query. Query planner: EXPLAIN QUERY PLAN SELECT ... . ANALYZE for statistics collection. PRAGMA for tuning: cache_size (-64000 = 64MB), page_size (4096), mmap_size (256MB memory-mapped), journal_mode (WAL recommended), synchronous (NORMAL|FULL), temp_store (MEMORY). WAL mode allows concurrent reads during writes. Auto-vacuum: PRAGMA auto_vacuum (none/full/incremental). VACUUM for space reclamation (rewrites database file). <h3>Configuration</h3> Key PRAGMA settings: journal_mode = WAL (best concurrent read/write), synchronous = NORMAL (balance safety/speed), cache_size = -64000 (64MB cache), busy_timeout = 5000 (wait before SQLITE_BUSY), foreign_keys = ON (disabled by default), temp_store = MEMORY, mmap_size = 268435456 (256MB), page_size = 4096, auto_vacuum = INCREMENTAL, recursive_triggers = ON. <h3>Client Libraries / Drivers</h3> <table><tr><th>Language</th><th>Library</th><th>Notes</th></tr> <tr><td>Python</td><td>sqlite3 (stdlib), aiosqlite, sqlalchemy</td><td>Built-in; no dependencies</td></tr> <tr><td>JavaScript</td><td>better-sqlite3 (sync, fastest), sql.js (WASM)</td><td>better-sqlite3 is 5-10x faster</td></tr> <tr><td>Java</td><td>SQLite JDBC (org.xerial)</td><td>Small footprint</td></tr> <tr><td>Go</td><td>go-sqlite3 (mattn), modernc.org/sqlite (pure Go, CGo-free)</td><td>No C compiler needed for modernc</td></tr> <tr><td>Rust</td><td>rusqlite, sqlx (sqlite feature)</td><td>Type-safe, async optional</td></tr> <tr><td>C#</td><td>Microsoft.Data.Sqlite, System.Data.SQLite</td><td>Cross-platform lightweight</td></tr> <tr><td>C/C++</td><td>sqlite3.c amalgamation, sqlite3.h</td><td>Single-file library; compile in</td></tr></table>"},{"category":"Mathematics","title":"Calculus","tags":["math","limits","derivatives","integrals","series","multivariable","vector"],"summary":"Calculus studies change and accumulation through derivatives and integrals, fundamental to physics, engineering, and ML.","content":"<h3>Core Definitions &amp; Notation</h3><p>The <b>limit</b> of f at a: lim_{x -&gt; a} f(x) = L means for every epsilon &gt; 0 there exists delta &gt; 0 such that 0 &lt; |x - a| &lt; delta implies |f(x) - L| &lt; epsilon. The <b>derivative</b> f&apos;(x) = d/dx f(x) = lim_{h -&gt; 0} (f(x+h) - f(x)) / h. The <b>partial derivative</b> of f(x,y) wrt x is f_x = partial f / partial x = lim_{h -&gt; 0} (f(x+h,y) - f(x,y)) / h. The <b>gradient</b> nabla f = (partial f / partial x_1, ..., partial f / partial x_n) points in the direction of steepest ascent. The <b>Hessian</b> H_ij = partial^2 f / partial x_i partial x_j is the n x n matrix of second partial derivatives. The <b>Jacobian</b> J is the m x n matrix of first partial derivatives of a vector-valued function f: R^n -&gt; R^m. The <b>directional derivative</b> D_u f = nabla f . u (unit vector u). The <b>divergence</b> of vector field F = (P, Q, R) is div F = nabla . F = partial P/partial x + partial Q/partial y + partial R/partial z. The <b>curl</b> of F in R^3 is curl F = nabla x F = (partial R/partial y - partial Q/partial z, partial P/partial z - partial R/partial x, partial Q/partial x - partial P/partial y).</p><h3>Key Theorems / Formulas</h3><ul><li><b>Fundamental Theorem of Calculus (FTC):</b> If F&apos; = f, then integral_a^b f(x) dx = F(b) - F(a), and d/dx integral_a^x f(t) dt = f(x).</li><li><b>Mean Value Theorem:</b> If f continuous on [a,b] and differentiable on (a,b), then exists c in (a,b) with f&apos;(c) = (f(b)-f(a))/(b-a).</li><li><b>Taylor Series:</b> f(x) = sum_{n=0}^{infinity} f^{(n)}(a) (x-a)^n / n!; Maclaurin when a=0. The Lagrange remainder R_n(x) = f^{(n+1)}(c)(x-a)^{(n+1)}/(n+1)! for some c between a and x.</li><li><b>Chain Rule (multivariable):</b> If z = f(g(t), h(t)), then dz/dt = partial f/partial g * dg/dt + partial f/partial h * dh/dt = nabla f . g&apos;(t).</li><li><b>Lagrange Multipliers:</b> To maximize f(x,y) subject to g(x,y) = 0, solve nabla f = lambda nabla g where lambda is the Lagrange multiplier.</li><li><b>Green&apos;s Theorem:</b> For positively oriented, piecewise-smooth simple closed curve C and region D: integral_C (L dx + M dy) = double integral_D (partial M/partial x - partial L/partial y) dA.</li><li><b>Stokes&apos; Theorem:</b> integral_S (curl F . n) dS = integral_C F . dr, relating surface integral of curl to line integral of F around boundary.</li><li><b>Divergence Theorem:</b> triple integral_V (div F) dV = double integral_S (F . n) dS, relating flux through closed surface to volume integral of divergence.</li></ul><h3>Common Algorithms</h3><table><tr><th>Algorithm</th><th>Category</th><th>Description</th></tr><tr><td>Gradient Descent</td><td>Optimization</td><td>theta_{t+1} = theta_t - eta * nabla L(theta_t); variants: SGD, Adam, RMSprop, AdaGrad</td></tr><tr><td>Newton-Raphson (1D root-finding)</td><td>Numerical methods</td><td>x_{n+1} = x_n - f(x_n)/f&apos;(x_n). Newton&apos;s method in n-dim: x_{k+1} = x_k - H_f(x_k)^{-1} nabla f(x_k)</td></tr><tr><td>Simpson&apos;s Rule (numerical integration)</td><td>Integration</td><td>integral_a^b f(x) dx approx (h/3)[f(x_0) + 4f(x_1) + 2f(x_2) + 4f(x_3) + ... + f(x_n)], error O(h^4)</td></tr><tr><td>Runge-Kutta (RK4) for ODEs</td><td>Differential equations</td><td>y_{n+1} = y_n + (h/6)(k_1 + 2k_2 + 2k_3 + k_4) where k_1 = f(t_n, y_n), k_2 = f(t_n+h/2, y_n+hk_1/2), etc.</td></tr><tr><td>Backpropagation (multivariable chain rule)</td><td>Deep learning</td><td>Compute partial derivatives of loss wrt all weights via reverse-mode automatic differentiation</td></tr></table><h3>Popular Libraries</h3><table><tr><th>Library</th><th>Key Functions</th><th>Description</th></tr><tr><td>SymPy</td><td><code>sympy.diff(expr, x, 2)</code></td><td>Symbolic differentiation, including partial and higher-order derivatives</td></tr><tr><td>SymPy</td><td><code>sympy.integrate(expr, (x, a, b))</code></td><td>Symbolic definite integration via Risch algorithm and heuristic methods</td></tr><tr><td>SciPy optimize</td><td><code>scipy.optimize.minimize(fun, x0, method=&apos;BFGS&apos;)</code></td><td>Multivariate optimization via quasi-Newton (BFGS, L-BFGS-B), Nelder-Mead, conjugate gradient</td></tr><tr><td>SciPy integrate</td><td><code>scipy.integrate.quad(f, a, b)</code></td><td>Adaptive quadrature using QUADPACK; returns integral and error estimate</td></tr><tr><td>SciPy integrate</td><td><code>scipy.integrate.solve_ivp(fun, t_span, y0, method=&apos;RK45&apos;)</code></td><td>Solve initial value ODEs with adaptive Runge-Kutta, Radau, BDF methods</td></tr><tr><td>JAX</td><td><code>jax.grad(fun)(x)</code></td><td>Automatic differentiation via JIT-compiled forward and reverse-mode differentiation</td></tr><tr><td>PyTorch autograd</td><td><code>torch.autograd.grad(loss, params)</code></td><td>Reverse-mode automatic differentiation for tensor computation graphs; enables backpropagation</td></tr><tr><td>NumPy</td><td><code>numpy.gradient(f)</code></td><td>Finite-difference approximation of gradient on uniform grids (2nd order central differences)</td></tr></table>"},{"category":"Mathematics","title":"Graph Theory","tags":["math","graphs","networks","combinatorics","algorithms","discrete"],"summary":"Graph theory studies networks of vertices connected by edges, with applications in CS, social networks, and biology.","content":"<h3>Core Definitions &amp; Notation</h3><p>A <b>graph</b> G = (V, E) consists of a set V of <b>vertices</b> and a set E of <b>edges</b>, each edge connecting a pair of vertices. In an <b>undirected graph</b>, edges are unordered pairs {u, v}; in a <b>directed graph (digraph)</b>, edges are ordered pairs (u, v). A <b>weighted graph</b> assigns a real number w(e) to each edge. The <b>degree</b> deg(v) is the number of edges incident to v; for directed graphs, indegree deg^-(v) and outdegree deg^+(v). A <b>path</b> is a sequence of vertices where each consecutive pair is connected by an edge; a <b>simple path</b> has no repeated vertices. A <b>cycle</b> is a closed path. The <b>adjacency matrix</b> A is an n x n matrix with A_ij = 1 if (i,j) in E (or weighted value). The <b>incidence matrix</b> B is an n x m matrix with B_ij = 1 if vertex i is incident to edge j. The <b>Laplacian matrix</b> L = D - A where D is the diagonal degree matrix. The <b>graph Laplacian</b> is positive semidefinite with eigenvalues 0 = lambda_1 &lt;= lambda_2 &lt;= ... &lt;= lambda_n; the second eigenvalue lambda_2 (algebraic connectivity) measures graph connectedness.</p><h3>Key Theorems / Formulas</h3><ul><li><b>Handshaking Lemma:</b> Sum_{v in V} deg(v) = 2|E|. For directed graphs, sum indeg = sum outdeg = |E|.</li><li><b>Euler&apos;s Formula for Planar Graphs:</b> For a connected planar graph, V - E + F = 2, where F is the number of faces.</li><li><b>Kuratowski&apos;s Theorem:</b> A graph is planar if and only if it does not contain a subgraph homeomorphic to K_5 (complete graph on 5 vertices) or K_{3,3} (complete bipartite 3+3).</li><li><b>Four Color Theorem:</b> The vertices of any planar graph can be colored with at most 4 colors such that adjacent vertices have different colors (Appel-Haken 1976, formal proof by Gonthier 2005).</li><li><b>Menger&apos;s Theorem:</b> The size of the minimum vertex cut separating two non-adjacent vertices equals the maximum number of internally vertex-disjoint paths between them.</li><li><b>Max-Flow Min-Cut Theorem:</b> In a flow network, the maximum value of an s-t flow equals the capacity of a minimum s-t cut (Ford-Fulkerson 1956).</li><li><b>Brooks&apos; Theorem:</b> For a connected graph with maximum degree Delta (not complete nor odd cycle), the chromatic number chi(G) &lt;= Delta.</li><li><b>Matrix-Tree Theorem:</b> The number of spanning trees of a graph equals any cofactor of the Laplacian matrix L.</li></ul><h3>Common Algorithms</h3><table><tr><th>Algorithm</th><th>Complexity</th><th>Application</th></tr><tr><td>Breadth-First Search (BFS)</td><td>O(V + E)</td><td>Shortest path in unweighted graphs, connected components, bipartite checking</td></tr><tr><td>Depth-First Search (DFS)</td><td>O(V + E)</td><td>Topological sorting, cycle detection, strongly connected components (Kosaraju/Tarjan), articulation points, bridges</td></tr><tr><td>Dijkstra (non-negative weights)</td><td>O((V+E) log V) using Fibonacci heap</td><td>Single-source shortest paths; fails with negative edge weights</td></tr><tr><td>Bellman-Ford</td><td>O(VE)</td><td>Single-source shortest paths with negative weights; detects negative cycles</td></tr><tr><td>Floyd-Warshall (all-pairs)</td><td>O(V^3)</td><td>All-pairs shortest paths, transitive closure of directed graph</td></tr><tr><td>Prim / Kruskal (MST)</td><td>O(E log V) Prim, O(E log E) Kruskal</td><td>Minimum Spanning Tree for weighted undirected graphs</td></tr><tr><td>Ford-Fulkerson / Edmonds-Karp</td><td>O(E * maxflow) / O(VE^2)</td><td>Maximum flow in flow networks; Edmonds-Karp uses BFS for augmenting paths</td></tr><tr><td>Hungarian Algorithm</td><td>O(n^3)</td><td>Assignment problem: minimum cost perfect matching in bipartite graph</td></tr></table><h3>Popular Libraries</h3><table><tr><th>Library</th><th>Key Functions</th><th>Description</th></tr><tr><td>NetworkX</td><td><code>nx.Graph() / nx.DiGraph()</code></td><td>Create undirected/directed graphs with node and edge attributes</td></tr><tr><td>NetworkX</td><td><code>nx.shortest_path(G, source, target, weight=&apos;weight&apos;)</code></td><td>Compute shortest path using Dijkstra or Bellman-Ford depending on edge weights</td></tr><tr><td>NetworkX</td><td><code>nx.max_weight_matching(G, maxcardinality=True)</code></td><td>Maximum weight matching in general graphs (Blossom algorithm)</td></tr><tr><td>NetworkX</td><td><code>nx.pagerank(G, alpha=0.85, max_iter=100)</code></td><td>PageRank centrality via power iteration; returns dict of node-&gt;rank</td></tr><tr><td>igraph</td><td><code>igraph.Graph.Erdos_Renyi(n=100, p=0.05)</code></td><td>Generate Erdos-Renyi random graph G(n,p) with faster C implementation</td></tr><tr><td>igraph</td><td><code>g.community_walktrap(weights=&apos;weight&apos;)</code></td><td>Community detection via random walks; returns VertexDendrogram clustering</td></tr><tr><td>graph-tool</td><td><code>gt.Graph(directed=False)</code></td><td>High-performance Python graph library with C++ backend, OpenMP parallelism</td></tr><tr><td>Graphviz</td><td><code>graphviz.Source(digraph.dot).render(format=&apos;png&apos;)</code></td><td>Graph visualization and layout using DOT language (neato, dot, fdp, sfdp engines)</td></tr></table>"},{"category":"Mathematics","title":"Linear Algebra","tags":["math","vectors","matrices","eigenvalues","SVD","PCA","tensor"],"summary":"Linear algebra studies vector spaces and linear mappings. Foundation for ML, computer graphics, and scientific computing.","content":"<h3>Core Definitions &amp; Notation</h3><p>A <b>vector space</b> V over a field F is a set closed under vector addition and scalar multiplication, satisfying eight axioms (associativity, commutativity, distributivity, existence of zero vector and additive inverses). A <b>linear transformation</b> T: V -&gt; W preserves addition and scalar multiplication: T(u + v) = T(u) + T(v), T(cv) = cT(v). Matrices A in F^(m x n) represent linear transformations relative to ordered bases. The <b>kernel (null space)</b> is {v in V: T(v) = 0}; the <b>image (column space)</b> is {T(v): v in V}. The rank-nullity theorem states dim(ker T) + dim(im T) = dim V. A <b>tensor</b> is a multilinear map over vector spaces, represented as multidimensional arrays with contravariant (upper) and covariant (lower) indices.</p><h3>Key Theorems / Formulas</h3><ul><li><b>Cayley-Hamilton Theorem:</b> Every square matrix satisfies its own characteristic polynomial: p(A) = 0 where p(lambda) = det(A - lambda I).</li><li><b>Spectral Theorem:</b> A real symmetric matrix A = A^T is orthogonally diagonalizable A = Q Lambda Q^T with Q orthogonal and Lambda diagonal of eigenvalues.</li><li><b>Singular Value Decomposition (SVD):</b> For any A in R^(m x n), A = U Sigma V^T where U in R^(m x m) and V in R^(n x n) are orthogonal, Sigma is diagonal with singular values sigma_1 &gt;= sigma_2 &gt;= ... &gt;= sigma_r &gt; 0.</li><li><b>QR Decomposition:</b> A = QR where Q is orthogonal and R is upper triangular. Used in least-squares solution: min ||Ax - b||_2, solved via x = R^(-1) Q^T b.</li><li><b>Eigendecomposition:</b> A = V Lambda V^(-1) for diagonalizable A. Lambda contains eigenvalues lambda_i; V columns are eigenvectors Av_i = lambda_i v_i.</li></ul><h3>Common Algorithms</h3><table><tr><th>Algorithm</th><th>Complexity</th><th>Application</th></tr><tr><td>Gaussian Elimination (LU)</td><td>O(n^3)</td><td>Solving linear systems Ax = b via forward/back substitution</td></tr><tr><td>Gram-Schmidt (QR)</td><td>O(m n^2)</td><td>Orthogonalization, least-squares fitting</td></tr><tr><td>Power Iteration</td><td>O(n^2) per iteration</td><td>Dominant eigenvalue/eigenvector (PageRank)</td></tr><tr><td>Jacobi SVD</td><td>O(n^3)</td><td>Full SVD for dense matrices</td></tr><tr><td>Conjugate Gradient (CG)</td><td>O(n sqrt(kappa)) iterations</td><td>Large sparse SPD systems Ax = b, where kappa = condition number</td></tr><tr><td>Arnoldi / Lanczos (Krylov)</td><td>O(n^2) per iteration</td><td>Sparse eigenvalue approximation for large matrices</td></tr></table><h3>Popular Libraries</h3><table><tr><th>Library</th><th>Key Functions</th><th>Description</th></tr><tr><td>NumPy</td><td><code>numpy.linalg.svd(A, full_matrices=True)</code></td><td>Returns U, s, Vh arrays for SVD of dense matrix</td></tr><tr><td>NumPy</td><td><code>numpy.linalg.eig(A)</code></td><td>Compute eigenvalues and right eigenvectors; returns w (eigenvalues array) and v (eigenvectors matrix)</td></tr><tr><td>NumPy</td><td><code>numpy.linalg.solve(A, b)</code></td><td>Solve linear system Ax = b using LAPACK gesv</td></tr><tr><td>SciPy</td><td><code>scipy.linalg.lu(A, permute_l=True)</code></td><td>LU decomposition with optional permutation</td></tr><tr><td>SciPy</td><td><code>scipy.sparse.linalg.eigs(A, k=6, which=&apos;LM&apos;)</code></td><td>ARPACK-based sparse eigenvalue solver, largest magnitude</td></tr><tr><td>SciPy</td><td><code>scipy.linalg.svdvals(A)</code></td><td>Compute singular values only (faster than full SVD)</td></tr><tr><td>SymPy</td><td><code>sympy.Matrix(A).rref()</code></td><td>Symbolic reduced row echelon form computation</td></tr><tr><td>PyTorch</td><td><code>torch.linalg.svd(A)</code></td><td>GPU-accelerated SVD for deep learning and tensor operations</td></tr><tr><td>TensorFlow</td><td><code>tf.linalg.eigh(tensor)</code></td><td>Eigendecomposition of Hermitian/symmetric tensors on GPU/TPU</td></tr></table>"},{"category":"Mathematics","title":"Probability & Statistics","tags":["math","statistics","probability","distributions","Bayesian","hypothesis-testing"],"summary":"Probability theory quantifies uncertainty. Statistics provides methods for data analysis, inference, and decision-making.","content":"<h3>Core Definitions &amp; Notation</h3><p>A <b>probability space</b> is a triple (Omega, F, P) where Omega is the sample space, F is a sigma-algebra of events, and P: F -&gt; [0,1] is a probability measure satisfying P(Omega) = 1 and countable additivity. A <b>random variable</b> X: Omega -&gt; R is a measurable function. The <b>cumulative distribution function</b> is F_X(x) = P(X &lt;= x). For discrete X, the <b>probability mass function</b> p(x) = P(X = x). For continuous X, the <b>probability density function</b> f(x) = dF/dx. <b>Expectation</b> E[X] = integral x dP; <b>variance</b> Var(X) = E[(X - mu)^2] = E[X^2] - E[X]^2. <b>Covariance</b> Cov(X,Y) = E[(X - mu_X)(Y - mu_Y)]. The <b>likelihood function</b> L(theta | x) = f(x | theta) treats data as fixed and parameters as varying. <b>Sufficient statistic</b> T(X) captures all information about theta in the sample.</p><h3>Key Theorems / Formulas</h3><ul><li><b>Law of Large Numbers (LLN):</b> Sample mean X_bar_n converges in probability to E[X] (weak LLN) or almost surely (strong LLN) as n -&gt; infinity, provided E[|X|] &lt; infinity.</li><li><b>Central Limit Theorem (CLT):</b> sqrt(n)(X_bar_n - mu) / sigma -&gt; N(0,1) in distribution as n -&gt; infinity, for i.i.d. samples with finite variance.</li><li><b>Bayes Theorem:</b> P(A|B) = P(B|A) P(A) / P(B). In inference: posterior = (likelihood * prior) / marginal likelihood, i.e., p(theta | x) = p(x | theta) p(theta) / integral p(x | theta) p(theta) d theta.</li><li><b>Chebyshev Inequality:</b> P(|X - mu| &gt;= k sigma) &lt;= 1/k^2 for any k &gt; 0, holds for all distributions with finite variance.</li><li><b>Neyman-Pearson Lemma:</b> The most powerful test of size alpha for simple H0 vs H1 rejects when the likelihood ratio L(theta_0 | x) / L(theta_1 | x) &lt; c.</li><li><b>Cramér-Rao Lower Bound:</b> For unbiased estimator hat{theta}, Var(hat{theta}) &gt;= 1 / I(theta) where I(theta) is the Fisher information.</li></ul><h3>Common Algorithms</h3><table><tr><th>Algorithm</th><th>Type</th><th>Description</th></tr><tr><td>Expectation-Maximization (EM)</td><td>Parameter estimation</td><td>Iterative MLE for latent variable models; E-step computes expected log-likelihood, M-step maximizes parameters</td></tr><tr><td>Markov Chain Monte Carlo (MCMC)</td><td>Bayesian inference</td><td>Metropolis-Hastings, Gibbs sampling, Hamiltonian Monte Carlo (HMC) for posterior sampling</td></tr><tr><td>Kernel Density Estimation (KDE)</td><td>Non-parametric</td><td>F-hat(x) = (1/nh) sum K((x - x_i)/h) using Gaussian or Epanechnikov kernel with bandwidth h optimized via Silverman rule or cross-validation</td></tr><tr><td>Bootstrap</td><td>Resampling</td><td>Resample with replacement B=1000 times to estimate standard error, confidence intervals (percentile, BCa), and bias</td></tr><tr><td>PCA (Principal Component Analysis)</td><td>Dimensionality reduction</td><td>Eigendecomposition of covariance matrix C = (1/n) X^T X; project data onto top k eigenvectors</td></tr></table><h3>Popular Libraries</h3><table><tr><th>Library</th><th>Key Functions</th><th>Description</th></tr><tr><td>SciPy stats</td><td><code>scipy.stats.norm.pdf(x, loc=0, scale=1)</code></td><td>Normal distribution PDF, CDF (<code>.cdf</code>), PPF (<code>.ppf</code> for quantiles), RVS (<code>.rvs</code>)</td></tr><tr><td>SciPy stats</td><td><code>scipy.stats.ttest_ind(a, b, equal_var=True)</code></td><td>Independent two-sample t-test returning t-statistic and p-value</td></tr><tr><td>SciPy stats</td><td><code>scipy.stats.linregress(x, y)</code></td><td>Linear regression: slope, intercept, r-value, p-value, standard error</td></tr><tr><td>NumPy random</td><td><code>numpy.random.Generator.beta(a, b, size=1000)</code></td><td>Beta-distributed random variates via modern Generator API (default_rng)</td></tr><tr><td>StatsModels</td><td><code>statsmodels.api.OLS(y, X).fit()</code></td><td>Ordinary least squares with summary output including R-squared, F-statistic, confidence intervals</td></tr><tr><td>PyMC</td><td><code>pymc.Model() with pm.Normal, pm.sample(2000)</code></td><td>Probabilistic programming for Bayesian inference with HMC/NUTS sampling</td></tr><tr><td>Stan</td><td><code>stan::math::normal_lpdf(y | mu, sigma)</code></td><td>Bayesian inference engine with automatic differentiation and HMC</td></tr><tr><td>scikit-learn</td><td><code>sklearn.decomposition.PCA(n_components=2).fit_transform(X)</code></td><td>PCA via SVD on centered data, with explained_variance_ratio_ attribute</td></tr></table>"},{"category":"Mobile Development","title":"Android Development","tags":["mobile","Android","Kotlin","Jetpack","Compose","Gradle"],"summary":"Android development uses Kotlin/Java with Jetpack Compose or XML layouts to build apps for phones, tablets, and more.","content":"<h3>Core Framework APIs</h3><p><b>Jetpack Compose</b> (2019) is Android&apos;s modern declarative UI toolkit written in Kotlin. Core composable functions: <code>@Composable fun MyScreen()</code> defines UI components. Key modifiers: <code>Modifier.fillMaxSize().padding(16.dp).clickable { }</code>. State management: <code>remember { mutableStateOf(value) }</code>, <code>mutableStateListOf</code>, <code>StateFlow</code>. Side effects: <code>LaunchedEffect</code> (coroutine scope), <code>DisposableEffect</code> (cleanup), <code>rememberCoroutineScope</code>. Navigation: <code>NavHost(navController, startDestination)</code> with <code>composable(&quot;route/{param}&quot;) { backStackEntry -&gt; }</code>. <b>Android Jetpack</b> is a suite of libraries: <code>androidx.lifecycle</code> (ViewModel, LiveData, lifecycle-aware components), <code>androidx.room</code> (SQLite ORM with compile-time DAO verification), <code>androidx.work</code> (WorkManager for deferrable background tasks), <code>androidx.paging</code> (Paging 3 for efficient large list loading with RemoteMediator), <code>androidx.hilt</code> (Hilt dependency injection over Dagger), <code>androidx.datastore</code> (key-value and proto DataStore replacing SharedPreferences). <b>Android Framework</b>: <code>Activity</code> entry point, <code>Service</code> for background, <code>BroadcastReceiver</code> for system events, <code>ContentProvider</code> for inter-app data sharing.</p><h3>Key Classes &amp; Methods</h3><table><tr><th>API</th><th>Signature</th><th>Description</th></tr><tr><td>Activity</td><td><code>class MainActivity : ComponentActivity() { override fun onCreate(savedInstanceState: Bundle?) }</code></td><td>Entry point window; setContent { } for Compose; lifecycle: onCreate, onStart, onResume, onPause, onStop, onDestroy, onSaveInstanceState</td></tr><tr><td>ViewModel</td><td><code>class MyViewModel : ViewModel() { val state: StateFlow&lt;UiState&gt; }</code></td><td>UI-related data holder surviving configuration changes; exposes StateFlow/LiveData; use viewModel() from compose or by viewModels() delegate</td></tr><tr><td>Room DAO</td><td><code>@Dao interface UserDao { @Query(&quot;SELECT * FROM users&quot;) fun getAll(): Flow&lt;List&lt;User&gt;&gt; }</code></td><td>Data Access Object; supports @Insert, @Update, @Delete, @Query with SQL; returns Flow, LiveData, or suspend for reactive/async queries</td></tr><tr><td>Retrofit</td><td><code>interface Api { @GET(&quot;users/{id}&quot;) suspend fun getUser(@Path(&quot;id&quot;) id: Int): User }</code></td><td>Type-safe HTTP client with Kotlin coroutines; Gson/Moshi converter, OkHttp interceptor chain, suspend functions for async</td></tr><tr><td>Navigation Compose</td><td><code>NavHost(navController, startDestination = &quot;home&quot;) { composable(&quot;detail/{id}&quot;) { DetailScreen(it.arguments?.getString(&quot;id&quot;)) } }</code></td><td>Type-safe navigation with back stack, deep linking, argument passing, transition animations</td></tr><tr><td>WorkManager</td><td><code>OneTimeWorkRequestBuilder&lt;MyWorker&gt;().setConstraints(constraints).build() / WorkManager.enqueue(request)</code></td><td>Guaranteed background work; supports Constraints (network, charging, idle), periodic work, chaining with beginWith/then, expedited work</td></tr></table><h3>Build &amp; Package APIs</h3><ul><li><code>Gradle / Gradle KTS</code> — Build system: <code>gradle wrapper --gradle-version 8.5</code>, <code>./gradlew assembleRelease</code>, <code>./gradlew lint</code>. Config in <code>build.gradle.kts</code> with <code>android { ... }</code> block: compileSdk, minSdk, targetSdk, buildTypes, productFlavors</li><li><code>AAPT2</code> — Android Asset Packaging Tool: <code>aapt2 compile res/layout.xml -o compiled/</code>, <code>aapt2 link compiled/ -o app.apk --manifest AndroidManifest.xml</code></li><li><code>APK / AAB</code> — Android App Bundle (AAB) is the preferred publishing format: <code>./gradlew bundleRelease</code> produces .aab; Google Play generates optimized APKs per device config (split APKs)</li><li><code>App Signing</code> — <code>apksigner sign --ks key.jks --ks-key-alias alias app.apk</code>, Play App Signing (Google manages signing key), <code>zipalign -v -p 4 app.apk</code> for alignment</li><li><code>Google Play Developer API</code> — <code>POST /androidpublisher/v3/applications/{packageName}/edits</code>, in-app products, subscriptions, reviews API</li></ul><h3>Platform-Specific APIs</h3><table><tr><th>API</th><th>Example</th><th>Capability</th></tr><tr><td>CameraX</td><td><code>ProcessCameraProvider.bindToLifecycle(owner, selector, preview, imageCapture)</code></td><td>Lifecycle-aware camera; Preview, ImageCapture, ImageAnalysis, VideoCapture use cases</td></tr><tr><td>FCM</td><td><code>FirebaseMessaging.getInstance().token.addOnCompleteListener { }</code></td><td>Push notifications; notification channels, data messages, FCM HTTP v1 API</td></tr><tr><td>Google Maps</td><td><code>googleMap.addMarker(MarkerOptions().position(latLng).title(&quot;Marker&quot;))</code></td><td>Maps with markers, polylines, polygons, heatmaps, camera animations, clustering</td></tr><tr><td>ML Kit</td><td><code>TextRecognition.getClient(TextRecognizerOptions.DEFAULT_OPTIONS).process(image)</code></td><td>On-device ML: text recognition, barcode scanning, face/object detection</td></tr><tr><td>Biometric Prompt</td><td><code>BiometricPrompt(this, executor, callback).authenticate(info)</code></td><td>Fingerprint/face auth; BiometricManager.canAuthenticate() strength check</td></tr></table>"},{"category":"Mobile Development","title":"Flutter","tags":["mobile","cross-platform","Dart","Google","widget","UI","framework"],"summary":"Flutter is Google UI toolkit for building natively compiled apps for mobile, web, and desktop from a single codebase.","content":"<h3>Core Framework APIs</h3><p>Flutter (Google 2017) uses Dart language and renders its own widgets using Skia / Impeller graphics engine without platform UI bridges. <b>Everything is a Widget</b>: <code>StatelessWidget</code> for immutable configuration, <code>StatefulWidget</code> for mutable state with <code>createState()</code>. The <b>Widget Tree</b> describes the UI declaratively; <b>Element Tree</b> manages widget lifecycle; <b>Render Tree</b> handles layout and painting. Key layout widgets: <code>Container</code> (convenience with padding, margin, decoration, constraints), <code>Row</code> (horizontal flex layout with MainAxisAlignment and CrossAxisAlignment), <code>Column</code> (vertical flex), <code>Stack</code> (overlay positioning with Positioned), <code>Expanded</code> / <code>Flexible</code> (flex sizing within Row/Column), <code>SizedBox</code> (fixed-size box), <code>Padding</code> / <code>EdgeInsets</code>, <code>Align</code> / <code>Center</code>, <code>AspectRatio</code>, <code>ConstrainedBox</code>, <code>FittedBox</code>. Material Design widgets: <code>Scaffold</code> (app structure with AppBar, Drawer, BottomNavigationBar, FloatingActionButton, SnackBar), <code>AppBar</code>, <code>Drawer</code>, <code>BottomNavigationBar</code> / <code>NavigationBar</code>, <code>Card</code>, <code>ListTile</code>, <code>DataTable</code>, <code>Stepper</code>, <code>Chip</code>. Cupertino (iOS-style) widgets: <code>CupertinoPageScaffold</code>, <code>CupertinoNavigationBar</code>, <code>CupertinoTabBar</code>, <code>CupertinoPicker</code>, <code>CupertinoSlider</code>. <b>State Management</b> ecosystem: <code>Provider</code> (ChangeNotifier-based, Google recommended), <code>Riverpod</code> (compile-safe, no BuildContext needed), <code>Bloc</code> (event-driven with Streams), <code>Redux</code>, <code>GetX</code> (all-in-one), <code>MobX</code>.</p><h3>Key Classes &amp; Methods</h3><table><tr><th>API</th><th>Signature</th><th>Description</th></tr><tr><td>StatelessWidget</td><td><code>class MyWidget extends StatelessWidget { @override Widget build(BuildContext context) =&gt; Text(&apos;Hello&apos;); }</code></td><td>Widget that never mutates; build method called once; requires BuildContext for theme, MediaQuery, Navigator access</td></tr><tr><td>StatefulWidget</td><td><code>class MyStateful extends StatefulWidget { @override State&lt;MyStateful&gt; createState() =&gt; _MyState(); } class _MyState extends State&lt;MyStateful&gt; { @override Widget build(BuildContext context) =&gt; ... }</code></td><td>Widget with mutable state; State object persists across rebuilds via the Element; call setState(() {}) to trigger rebuild</td></tr><tr><td>Navigator 2.0 / Router</td><td><code>Navigator.push(context, MaterialPageRoute(builder: (context) =&gt; DetailPage(id: id))) / Navigator.pop(context, result)</code></td><td>Declarative routing with RouteInformationParser, RouterDelegate, BackButtonDispatcher; supports web URL deep linking, nested navigation, guards</td></tr><tr><td>FutureBuilder</td><td><code>FutureBuilder&lt;T&gt;(future: myFuture, builder: (context, snapshot) { if (snapshot.hasData) return Text(snapshot.data); return CircularProgressIndicator(); })</code></td><td>Asynchronous data binding; ConnectionState: none, waiting, active, done; snapshot.data, snapshot.error, snapshot.connectionState</td></tr><tr><td>StreamBuilder</td><td><code>StreamBuilder&lt;T&gt;(stream: myStream, builder: (context, snapshot) { if (snapshot.hasData) return ListView(...); })</code></td><td>Reactive data binding for continuous data streams (Firestore, WebSocket, BLoC); supports async snapshot transformations</td></tr><tr><td>BuildContext</td><td><code>Theme.of(context) / MediaQuery.of(context).size / Navigator.of(context) / ScaffoldMessenger.of(context).showSnackBar()</code></td><td>Widget location in element tree; used for inherited widget lookups (Theme, MediaQuery, Provider); do not store across async gaps</td></tr></table><h3>Build &amp; Package APIs</h3><ul><li><code>Flutter CLI</code> — <code>flutter create my_app</code>, <code>flutter run --debug --device-id &lt;id&gt;</code>, <code>flutter build apk --split-per-abi --target-platform android-arm,android-arm64</code></li><li><code>Dart Dev Tools</code> — Performance profiling: <code>flutter pub global activate dart_devtools</code>; Flutter Inspector (widget tree), Timeline (frame rendering, raster/UI threads), Memory (GC analysis)</li><li><code>pub.dev</code> — Package ecosystem: <code>dart pub add package_name</code>, <code>flutter pub outdated</code>, <code>dart pub publish</code>; packages governed by semantic versioning with lockfile pubspec.lock</li><li><code>Flutter Build Modes</code> — Debug (JIT, hot reload), Profile (tracing, no assertions), Release (AOT compiled, optimized, no Dart VM observatory) configured via <code>flutter run --profile</code> or <code>flutter build --release</code></li><li><code>Code Signing &amp; Distribution</code> — iOS: Xcode archive + App Store Connect; Android: <code>keytool -genkey -v -keystore key.jks -alias key -keyalg RSA</code>, then <code>flutter build appbundle</code>; Play Console upload</li></ul><h3>Platform-Specific APIs</h3><table><tr><th>Plugin</th><th>API</th><th>Capability</th></tr><tr><td>camera</td><td><code>CameraController(cam[0], ResolutionPreset.high)</code></td><td>Preview/capture; flash, zoom, video</td></tr><tr><td>geolocator</td><td><code>Geolocator.getCurrentPosition(highAccuracy)</code></td><td>GPS; background, geocoding, geofencing</td></tr><tr><td>firebase_messaging</td><td><code>FirebaseMessaging.instance.getToken()</code></td><td>FCM push; foreground/background handlers</td></tr><tr><td>shared_preferences</td><td><code>SharedPreferences.getInstance().setString(k,v)</code></td><td>Key-value store</td></tr><tr><td>google_maps_flutter</td><td><code>GoogleMap(initialCameraPosition: CameraPosition(target: LatLng(..)))</code></td><td>Maps; markers, polylines, cluster</td></tr></table>"},{"category":"Mobile Development","title":"React Native","tags":["mobile","cross-platform","React","JavaScript","native","Meta"],"summary":"React Native lets you build native mobile apps using React and JavaScript, sharing code across iOS and Android.","content":"<h3>Core Framework APIs</h3><p>React Native (Meta 2015) uses React with JavaScript/TypeScript to render native iOS and Android UI components. The <b>JavaScript Thread</b> executes React reconciliation and business logic, while the <b>Native Thread</b> handles UI rendering on the platform UI thread. The <b>Bridge</b> serializes JSON messages between threads. <b>Hermes</b> is Meta&apos;s JS engine optimized for RN: ahead-of-time bytecode compilation, reduced memory and startup time. The <b>Fabric Renderer</b> (New Architecture) replaces the bridge with JSI (JavaScript Interface) for synchronous native method calls, reducing serialization overhead. <b>Turbo Modules</b> enable lazy-loaded native module initialization. Core components: <code>View</code> (equivalent to UIView/View), <code>Text</code> (single/multi-line text), <code>TextInput</code> (keyboard input with secureTextEntry for passwords), <code>ScrollView</code> (scrollable content container), <code>FlatList</code> (virtualized list with windowing, supports pull-to-refresh using RefreshControl), <code>SectionList</code> (sectioned list with sticky headers), <code>Pressable</code> (touch handler with state-based styling), <code>Image</code> (network/static/local images with caching), <code>Modal</code> (native overlay modals). <b>React Navigation</b> is the de facto navigation library: <code>createNativeStackNavigator()</code> for stack transitions, <code>createBottomTabNavigator()</code> for tab bars, <code>createDrawerNavigator()</code> for side drawers.</p><h3>Key Classes &amp; Methods</h3><table><tr><th>API</th><th>Signature</th><th>Description</th></tr><tr><td>useState</td><td><code>const [state, setState] = useState&lt;Type&gt;(initialValue)</code></td><td>Functional component state hook; setState triggers re-render with new state value (shallow comparison)</td></tr><tr><td>useEffect</td><td><code>useEffect(() =&gt; { setup; return cleanup; }, [dependencies])</code></td><td>Side effects after render; supports cleanup on unmount; empty deps array for mount-only; no deps for every render</td></tr><tr><td>FlatList</td><td><code>&lt;FlatList data={items} renderItem={({item}) =&gt; &lt;Text&gt;{item.name}&lt;/Text&gt;} keyExtractor={item =&gt; item.id} /&gt;</code></td><td>Virtualized list with props: ListHeaderComponent, ListFooterComponent, ItemSeparatorComponent, onEndReached for infinite scroll, initialNumToRender, windowSize, getItemLayout for fixed-height optimization</td></tr><tr><td>Animated API</td><td><code>const opacity = useRef(new Animated.Value(0)).current; Animated.timing(opacity, { toValue: 1, duration: 500 }).start()</code></td><td>Declarative animation on native thread; supports timing, spring, decay; useNativeDriver sends to native for 60fps without JS bridge</td></tr><tr><td>Dimensions</td><td><code>Dimensions.get(&apos;window&apos;) / Dimensions.addEventListener(&apos;change&apos;, callback)</code></td><td>Screen dimensions (width, height, scale, fontScale); subscribe to orientation changes via event listener</td></tr><tr><td>Linking</td><td><code>Linking.openURL(url) / Linking.addEventListener(&apos;url&apos;, handler)</code></td><td>Open external URLs, deep links, universal links; parse incoming links for navigation</td></tr></table><h3>Build &amp; Package APIs</h3><ul><li><code>Metro Bundler</code> — React Native JS bundler: <code>npx react-native start --port 8081</code> starts dev server, <code>npx react-native bundle --platform ios --dev false --entry-file index.js --bundle-output main.jsbundle</code></li><li><code>Expo CLI</code> — Managed workflow: <code>npx create-expo-app MyApp</code>, <code>expo start</code>, <code>eas build --platform ios --profile production</code> (EAS Build cloud service), EAS Submit for App Store/Play Store upload</li><li><code>React Native CLI</code> — Bare workflow: <code>npx react-native init MyApp --template react-native-template-typescript</code>, <code>npx react-native run-ios --simulator &quot;iPhone 15&quot;</code>, <code>npx react-native run-android</code></li><li><code>CodePush / EAS Update</code> — Over-the-air JavaScript updates: <code>npx expo-updates</code> with codepush, OTA bundle serving from CDN without app store review</li><li><code>Xcode / Android Studio</code> — Native project configuration in ios/ and android/ directories; pod install for iOS CocoaPods, gradle build for Android</li></ul><h3>Platform-Specific APIs</h3><table><tr><th>Module</th><th>API Example</th><th>Capability</th></tr><tr><td>react-native-vision-camera</td><td><code>useCameraDevice(&apos;back&apos;) / &lt;Camera device={device} isActive={true} /&gt;</code></td><td>Camera preview with Frame Processors, barcode scanning, OCR, photo/video</td></tr><tr><td>react-native-geolocation</td><td><code>Geolocation.getCurrentPosition(info =&gt; {}) / watchPosition(success, error)</code></td><td>GPS location with requestAuthorization (iOS), enableHighAccuracy, timeout</td></tr><tr><td>react-native-push-notification</td><td><code>PushNotification.configure({ onNotification, onRegister, requestPermissions: true })</code></td><td>Local/remote push notifications; channels (Android), category actions, badge</td></tr><tr><td>react-native-reanimated</td><td><code>useSharedValue(0) / useAnimatedStyle(() =&gt; ({transform: [{translateX: v}]}))</code></td><td>Worklets on UI thread for 60fps animations; gesture handler integration</td></tr><tr><td>react-native-webview</td><td><code>&lt;WebView source={{ uri }} onMessage={handler} injectedJavaScript={js} /&gt;</code></td><td>Full WebKit/Chromium WebView; JS bridge via postMessage, cookie management</td></tr></table>"},{"category":"Mobile Development","title":"iOS Development","tags":["mobile","iOS","Apple","Swift","SwiftUI","AppKit","Xcode"],"summary":"iOS development uses Swift and SwiftUI/UIKit to build apps for iPhone, iPad, Apple Watch, and Apple TV.","content":"<h3>Core Framework APIs</h3><p><b>UIKit</b> is Apple&apos;s imperative UI framework (iOS 2+). Core classes: <code>UIApplication</code> manages the app event loop; <code>UIViewController</code> manages view hierarchies and responds to rotation/memory warnings; <code>UIView</code> is the base visual element; <code>UIWindow</code> provides the backdrop; <code>UINavigationController</code> manages hierarchical stack navigation; <code>UITabBarController</code> manages tab-based navigation. <b>SwiftUI</b> (iOS 13+) is Apple&apos;s declarative UI framework using struct conforming to <code>View</code>. Key property wrappers: <code>@State</code> for local view state (re-renders on change), <code>@Binding</code> for passing writable references between views, <code>@ObservedObject</code> / <code>@StateObject</code> for reference-type observable data conforming to <code>ObservableObject</code>, <code>@EnvironmentObject</code> for dependency injection via environment, <code>@AppStorage</code> for UserDefaults-backed values. Key iOS SDK frameworks: <code>Foundation</code> (data types, networking, JSON), <code>CoreData</code> (persistent object graph), <code>CloudKit</code> (iCloud sync), <code>Combine</code> (reactive async streams), <code>Swift Concurrency</code> (async/await, actors, Task, AsyncSequence).</p><h3>Key Classes &amp; Methods</h3><table><tr><th>API</th><th>Signature</th><th>Description</th></tr><tr><td>UILabel</td><td><code>UILabel(frame: CGRect) / .text = &quot;...&quot;</code></td><td>Display static or attributed text; properties: font, textColor, numberOfLines, lineBreakMode</td></tr><tr><td>UITableView</td><td><code>UITableView(frame:, style: .plain/.grouped) / .reloadData()</code></td><td>Scrollable list of cells; configure via UITableViewDataSource (cellForRowAt, numberOfRowsInSection) and UITableViewDelegate (didSelectRowAt)</td></tr><tr><td>URLSession</td><td><code>URLSession.shared.dataTask(with: url) async throws -&gt; (Data, URLResponse)</code> (iOS 15+ async variant)</td><td>HTTP/HTTPS networking; supports background sessions, URLSessionConfiguration with timeout, cache policy, waitsForConnectivity</td></tr>

Idempotency-Key header), TLS for all traffic.</p>"},{"category":"Web Development","title":"React","tags":["frontend","UI","component","virtual-DOM","Meta","hooks","JSX"],"summary":"React is a JavaScript library for building UIs with component-based architecture, declarative views, and efficient virtual DOM rendering.","content":"<h3>Core APIs</h3><table><tr><th>API</th><th>Signature</th><th>Description</th></tr><tr><td>createElement</td><td>createElement(type, props, ...children)</td><td>Creates a React element; JSX compiles to this function call</td></tr><tr><td>createRoot</td><td>createRoot(container[, options])</td><td>Creates a React root for concurrent rendering (React 18+)</td></tr><tr><td>hydrateRoot</td><td>hydrateRoot(container, element[, options])</td><td>Hydrates server-rendered content on the client</td></tr><tr><td>createContext</td><td>createContext(defaultValue)</td><td>Creates a context for prop drilling avoidance with Provider/Consumer</td></tr><tr><td>createRef</td><td>createRef()</td><td>Creates a mutable ref object initialized to null</td></tr><tr><td>forwardRef</td><td>forwardRef(renderFn)</td><td>Forwards a ref through a component to a child DOM element</td></tr><tr><td>lazy</td><td>lazy(loadFn)</td><td>Defines a lazily loaded component using dynamic import()</td></tr><tr><td>Suspense</td><td>&lt;Suspense fallback={loading}&gt;</td><td>Shows fallback UI while children and dependencies load</td></tr><tr><td>memo</td><td>memo(Component[, areEqual])</td><td>Memoizes component to skip re-renders on unchanged props</td></tr><tr><td>startTransition</td><td>startTransition(scope)</td><td>Marks state update as non-urgent for concurrent rendering</td></tr><tr><td>use</td><td>use(promiseOrContext)</td><td>React 19: resolves a promise or reads context directly in render</td></tr><tr><td>cache</td><td>cache(fn)</td><td>React 19: caches function results for memoization across renders</td></tr></table><h3>Hooks API</h3><table><tr><th>Hook</th><th>Signature</th><th>Description</th></tr><tr><td>useState</td><td>const [state, setState] = useState(initialState)</td><td>Returns stateful value and updater function; setState accepts function</td></tr><tr><td>useEffect</td><td>useEffect(setup, dependencies?)</td><td>Performs side effects after render; cleanup via returned function</td></tr><tr><td>useContext</td><td>const value = useContext(MyContext)</td><td>Reads and subscribes to context value; triggers re-render on change</td></tr><tr><td>useReducer</td><td>const [state, dispatch] = useReducer(reducer, initialArg, init?)</td><td>Manages complex state with reducer pattern; dispatch sends actions</td></tr><tr><td>useCallback</td><td>useCallback(fn, dependencies)</td><td>Returns memoized callback; same reference if deps unchanged</td></tr><tr><td>useMemo</td><td>useMemo(() => compute(), dependencies)</td><td>Returns memoized computed value; recomputes only when deps change</td></tr><tr><td>useRef</td><td>const ref = useRef(initialValue)</td><td>Creates mutable ref with .current property; persists across renders</td></tr><tr><td>useImperativeHandle</td><td>useImperativeHandle(ref, createHandle, dependencies?)</td><td>Customizes instance value exposed when parent uses ref</td></tr><tr><td>useLayoutEffect</td><td>useLayoutEffect(setup, dependencies?)</td><td>Fires synchronously before browser paint; DOM measurements</td></tr><tr><td>useDebugValue</td><td>useDebugValue(value, formatter?)</td><td>Displays label in React DevTools for custom hooks</td></tr><tr><td>useTransition</td><td>const [isPending, startTransition] = useTransition()</td><td>Returns pending state and transition starter for non-urgent updates</td></tr><tr><td>useDeferredValue</td><td>const deferred = useDeferredValue(value)</td><td>Defers re-rendering of non-urgent UI; debounce-like behavior</td></tr><tr><td>useId</td><td>const id = useId()</td><td>Generates unique IDs for a11y attributes; stable across SSR</td></tr><tr><td>useSyncExternalStore</td><td>useSyncExternalStore(subscribe, getSnapshot, getServerSnapshot?)</td><td>Subscribes to external stores with concurrent-safe tear detection</td></tr><tr><td>useActionState</td><td>useActionState(action, initialState, permalink?)</td><td>React 19: manages form action state with pending and form data</td></tr></table><h3>Component Model</h3><p>React components are functions returning JSX which compiles to createElement calls. Props are read-only inputs from parent. State is internal mutable data via useState or useReducer. Events flow up via callback props (onClick, onChange, onSubmit). Children via props.children. Unidirectional data flow: props down, events up. Server Components (React 19) execute on the server reducing bundle size. Client Components use the &apos;use client&apos; directive. Lifting state up hoists to nearest common ancestor. Composition over inheritance via children prop and render props.</p><pre>function Counter() { const [count, setCount] = useState(0); useEffect(() => { document.title = `Count: ${count}`; }, [count]); return &lt;button onClick={() => setCount(c => c + 1)}&gt;{count}&lt;/button&gt;; }</pre><h3>Key Patterns</h3><ul><li><b>Controlled Components:</b> Form inputs bound to React state with onChange; single source of truth</li><li><b>Render Props:</b> Components share logic via function prop returning JSX</li><li><b>Higher-Order Components:</b> Functions wrapping component to extend behavior</li><li><b>Compound Components:</b> Related components sharing implicit state via context</li><li><b>Custom Hooks:</b> Reusable logic extracted into functions prefixed with &quot;use&quot;</li></ul><h3>Ecosystem</h3><ul><li><b>Meta-Frameworks:</b> Next.js, Remix, Gatsby (static site), Astro (content-focused)</li><li><b>State Management:</b> Redux (flux), Zustand (minimal), Jotai (atomic), TanStack Query (server)</li><li><b>Routing:</b> React Router v6+, TanStack Router (type-safe), wouter (minimal)</li><li><b>Styling:</b> Tailwind CSS, CSS Modules, styled-components, Emotion, Vanilla Extract</li><li><b>Testing:</b> React Testing Library, Vitest, Playwright (E2E), Storybook</li></ul>"},{"category":"Web Development","title":"Svelte","tags":["frontend","compiler","reactive","lightweight","no-VDOM"],"summary":"Svelte is a frontend compiler that shifts work to compile time, producing highly optimized vanilla JS with no virtual DOM.","content":"<h3>Core APIs</h3><table><tr><th>API</th><th>Signature</th><th>Description</th></tr><tr><td>onMount</td><td>onMount(callback)</td><td>Runs after component mounts; return cleanup function for teardown</td></tr><tr><td>onDestroy</td><td>onDestroy(callback)</td><td>Runs before component unmounts; cleanup event listeners, intervals, subscriptions</td></tr><tr><td>beforeUpdate</td><td>beforeUpdate(callback)</td><td>Runs before DOM updates after state change; access previous DOM state</td></tr><tr><td>afterUpdate</td><td>afterUpdate(callback)</td><td>Runs after DOM updates; DOM measurements safe, avoid further state changes</td></tr><tr><td>tick</td><td>tick()</td><td>Returns promise that resolves after pending DOM updates; await for consistent DOM</td></tr><tr><td>setContext</td><td>setContext(key, value)</td><td>Sets context for child component access; key can be any value including objects</td></tr><tr><td>getContext</td><td>getContext(key)</td><td>Gets context previously set by parent component with the matching key</td></tr><tr><td>hasContext</td><td>hasContext(key)</td><td>Checks if a context key exists in ancestor chain</td></tr><tr><td>createEventDispatcher</td><td>createEventDispatcher()</td><td>Creates dispatcher for component events; returns dispatch(name, detail) function</td></tr></table><h3>Reactivity (Svelte 5 Runes)</h3><table><tr><th>Rune</th><th>Signature</th><th>Description</th></tr><tr><td>$state</td><td>let count = $state(0)</td><td>Declares reactive state; deep reactivity by default; use .raw() for shallow</td></tr><tr><td>$derived</td><td>let doubled = $derived(count * 2)</td><td>Declares derived value updating when dependencies change; read-only</td></tr><tr><td>$derived.by</td><td>let result = $derived.by(() =&gt; compute())</td><td>Derived value from expression block; for multi-statement computations</td></tr><tr><td>$effect</td><td>$effect(() =&gt; { ... })</td><td>Runs side effects tracking dependencies automatically; cleanup via returned function</td></tr><tr><td>$effect.pre</td><td>$effect.pre(() =&gt; { ... })</td><td>Runs before DOM update; like beforeUpdate lifecycle</td></tr><tr><td>$effect.root</td><td>$effect.root(() =&gt; { ... })</td><td>Creates non-tracking scope; dispose function cleans up all child effects</td></tr><tr><td>$props</td><td>let { title, count } = $props()</td><td>Declares component props with destructuring and default values</td></tr><tr><td>$bindable</td><td>let { value = $bindable() } = $props()</td><td>Declares bindable prop enabling two-way binding with parent</td></tr><tr><td>$inspect</td><td>$inspect(value).with(console.trace)</td><td>Debug rune: logs value in dev mode with custom callback</td></tr></table><h3>Stores (Svelte 4 API)</h3><table><tr><th>Store</th><th>Signature</th><th>Description</th></tr><tr><td>writable</td><td>writable(initialValue)</td><td>Creates writable store with subscribe, set, update methods; auto-unsubscribe via $ prefix</td></tr><tr><td>readable</td><td>readable(initialValue, startFn)</td><td>Creates read-only store; startFn receives set, returns stop cleanup function</td></tr><tr><td>derived</td><td>derived(stores, fn)</td><td>Creates derived store from one or more stores; supports async derivations</td></tr><tr><td>get</td><td>get(store)</td><td>Synchronously reads store value via temporary subscription</td></tr></table><h3>Component Model</h3><p>Svelte components are .svelte files with script, template (HTML), and style sections. Scoped CSS is default: class names are hashed. Props declared with $props() in Svelte 5 (or export let in Svelte 4). Event dispatching via createEventDispatcher. Two-way binding with bind:property. Template syntax: {expression} for output, {#if condition} / {:else}, {#each items as item}, {#await promise}, {@html content} for raw HTML. Slots with slot element and named slots for content projection. Svelte compiles to optimized vanilla JavaScript, eliminating virtual DOM overhead.</p><pre>&lt;script&gt; let { name, count = $bindable(0) } = $props(); $effect(() =&gt; console.log(&apos;count:&apos;, count)) &lt;/script&gt; &lt;h1&gt;Hello {name}!&lt;/h1&gt; &lt;button on:click={() =&gt; count++}&gt;Clicked {count}&lt;/button&gt; &lt;style&gt; h1 { color: purple; } &lt;/style&gt;</pre><h3>SvelteKit Features</h3><ul><li><b>Routing:</b> File-based in src/routes: +page.svelte, +layout.svelte, +page.server.js for SSR data, +layout.server.js for layout data</li><li><b>Form Actions:</b> +page.server.js exports actions object with named action handlers for form POST</li><li><b>API Endpoints:</b> +server.js exports named functions (GET, POST, PUT, PATCH, DELETE) for REST endpoints</li><li><b>Load Functions:</b> load(event) fetches data; event.fetch, event.params, event.locals, event.cookies</li><li><b>Adapters:</b> @sveltejs/adapter-auto, -node, -static, -vercel, -netlify, -cloudflare, -cloudflare-workers</li></ul>"},{"category":"Web Development","title":"Tailwind CSS","tags":["frontend","CSS","utility-first","responsive","design-system"],"summary":"Tailwind CSS is a utility-first CSS framework for building custom designs rapidly using low-level utility classes.","content":"<h3>Utility Classes Reference</h3><h4>Layout</h4><table><tr><th>Category</th><th>Example Classes</th><th>Description</th></tr><tr><td>Display</td><td>block, inline-block, inline, flex, grid, hidden, contents, flow-root</td><td>Element display behavior utilities</td></tr><tr><td>Flexbox</td><td>flex-row, flex-col, flex-wrap, flex-1, flex-auto, items-start, justify-center, gap-4, shrink-0, grow</td><td>Flex container and item properties</td></tr><tr><td>Grid</td><td>grid-cols-3, grid-rows-4, col-span-2, row-span-3, gap-x-4, gap-y-2, auto-rows-min</td><td>CSS Grid layout utilities</td></tr><tr><td>Position</td><td>static, fixed, absolute, relative, sticky, top-0, right-4, inset-0, z-50</td><td>Positioning and stacking order</td></tr><tr><td>Sizing</td><td>w-full, w-1/2, w-screen, h-64, h-dvh, max-w-xl, min-h-screen</td><td>Width, height, min/max constraints</td></tr></table><h4>Spacing and Typography</h4><p>Padding: p-4, px-2, py-6, pt-8. Margin: m-4, mx-auto, mt-2. Space between: space-x-4, space-y-2. Sizes: 0 to 96 in increments (0.5, 1-16 stepping by 1, 20, 24, 32, 40, 48, 56, 64, 72, 80, 96). Arbitrary: p-[13px]. Font size: text-xs through text-9xl. Font weight: font-thin (100) to font-black (900). Text alignment: text-left, text-center, text-right. Text color: text-{color}-{shade}. Line height: leading-3 through leading-10, leading-none, leading-tight, leading-relaxed, leading-loose. Letter spacing: tracking-tighter through tracking-widest.</p><h4>Backgrounds, Borders, and Effects</h4><p>Background: bg-{color}-{shade}, bg-gradient-to-{dir} (t, tr, r, br, b, bl, l, tl), bg-cover, bg-contain, bg-center, bg-no-repeat. Border radius: rounded-sm, rounded, rounded-md, rounded-lg, rounded-xl, rounded-2xl, rounded-3xl, rounded-full. Border width: border, border-2, border-4, border-t-2. Border color: border-{color}-{shade}. Outline: outline-{width}, outline-{color}. Shadow: shadow-sm, shadow, shadow-md, shadow-lg, shadow-xl, shadow-2xl, shadow-inner, shadow-none. Opacity: opacity-0 through opacity-100 (step 5). Scale: scale-50 through scale-150, scale-x-110, scale-y-95. Rotate: rotate-0 through rotate-180, -rotate-45. Translate: translate-x-4, -translate-y-2, translate-x-1/2, translate-y-full. Transition: transition-all, transition-colors, transition-opacity, transition-transform. Duration: duration-75 through duration-1000. Ease: ease-linear, ease-in, ease-out, ease-in-out. Animation: animate-spin, animate-ping, animate-pulse, animate-bounce.</p><h4>Responsive and State Variants</h4><p>Breakpoint prefixes: sm: (640px), md: (768px), lg: (1024px), xl: (1280px), 2xl: (1536px). State prefixes: hover:, focus:, active:, disabled:, visited:, focus-visible:, focus-within:, group-hover:, group-focus:, peer-checked:, peer-focus:, dark:, motion-safe:, motion-reduce:, print:, portrait:, landscape:. Arbitrary variants using arbitrary brackets: [@media(width<500px)]:flex-col.</p><h3>Configuration API (tailwind.config)</h3><pre>module.exports = { content: [&apos;./src/**/*.{js,ts,jsx,tsx,mdx}&apos;], theme: { extend: { colors: { primary: { 500: &apos;#3b82f6&apos; } }, fontFamily: { sans: [&apos;Inter&apos;, &apos;sans-serif&apos;] }, screens: { xs: &apos;480px&apos; }, spacing: { 18: &apos;4.5rem&apos; }, animation: { bounceOnce: &apos;bounce 0.5s ease 1&apos; }, keyframes: { bounceOnce: { &apos;0%, 100%&apos;: { transform: &apos;translateY(0)&apos; }, &apos;50%&apos;: { transform: &apos;-translateY(25%)&apos; } } } } }, plugins: [require(&apos;@tailwindcss/forms&apos;), require(&apos;@tailwindcss/typography&apos;), require(&apos;@tailwindcss/aspect-ratio&apos;)] }</pre><h3>Directives</h3><table><tr><th>Directive</th><th>Usage</th><th>Description</th></tr><tr><td>@tailwind</td><td>@tailwind base; @tailwind components; @tailwind utilities</td><td>Injects Tailwind layers (base reset, components, utilities) into CSS</td></tr><tr><td>@apply</td><td>.btn { @apply px-4 py-2 rounded-lg bg-blue-500 hover:bg-blue-600; }</td><td>Composes utility classes into custom CSS; supports variants</td></tr><tr><td>@layer</td><td>@layer components { .card { @apply p-4 shadow-lg; } }</td><td>Organizes custom CSS into Tailwind layers for correct cascade order</td></tr><tr><td>@config</td><td>@config &quot;./tailwind.config.custom.js&quot;</td><td>References a specific config file per CSS file (Tailwind v3+)</td></tr><tr><td>@screen</td><td>@screen md { .sidebar { display: block; } }</td><td>Generates breakpoint media query; replaced by @media in v3.4+</td></tr></table><h3>Just-In-Time Engine</h3><p>Tailwind v3+ uses an on-demand JIT compiler that scans content files and generates only the classes used. Enables arbitrary values: p-[13px], bg-[#1da1f1], text-[length:clamp(1rem,3vw,2rem)], grid-cols-[200px_1fr]. The JIT engine provides infinite design combinations while keeping output under 10KB gzipped. Variants can be arbitrary: [@media(prefers-color-scheme:dark)]:bg-black.</p>"},{"category":"Web Development","title":"Vue.js","tags":["frontend","reactive","component","composition-api","progressive"],"summary":"Vue.js is a progressive frontend framework with reactive data system, component architecture, and a gentle learning curve.","content":"<h3>Core APIs</h3><table><tr><th>API</th><th>Signature</th><th>Description</th></tr><tr><td>createApp</td><td>createApp(rootComponent[, rootProps])</td><td>Creates Vue application instance with global config methods</td></tr><tr><td>defineComponent</td><td>defineComponent(options)</td><td>TypeScript-friendly component definition with type inference</td></tr><tr><td>ref</td><td>ref(value)</td><td>Reactive reference for primitives; accessed via .value</td></tr><tr><td>reactive</td><td>reactive(target)</td><td>Deeply reactive Proxy for objects and arrays</td></tr><tr><td>computed</td><td>computed(getter[, options])</td><td>Derived reactive value with lazy evaluation and caching</td></tr><tr><td>watch</td><td>watch(source, callback, options?)</td><td>Watches reactive source; supports deep, immediate, flush, once</td></tr><tr><td>watchEffect</td><td>watchEffect(effect, options?)</td><td>Runs effect auto-tracking reactive deps; returns stop handle</td></tr><tr><td>provide</td><td>provide(key, value)</td><td>Provides value for injection by descendants at any depth</td></tr><tr><td>inject</td><td>inject(key, defaultValue?)</td><td>Injects value from ancestor; type-safe with injection keys</td></tr><tr><td>nextTick</td><td>nextTick(callback?)</td><td>Defers callback until next DOM update; returns Promise</td></tr><tr><td>defineProps</td><td>defineProps(propsDefinition)</td><td>Declares props with validation and type inference in script setup</td></tr><tr><td>defineEmits</td><td>defineEmits(emitDefinition)</td><td>Declares custom events with payload validation in script setup</td></tr><tr><td>defineExpose</td><td>defineExpose(exposed)</td><td>Exposes properties to parent via template refs</td></tr><tr><td>defineModel</td><td>defineModel(options?)</td><td>Declares v-model prop with automatic sync (Vue 3.4+)</td></tr></table><h3>Composition API Lifecycle Hooks</h3><table><tr><th>Hook</th><th>Signature</th><th>Description</th></tr><tr><td>onMounted</td><td>onMounted(callback)</td><td>Called after component mounted to DOM; DOM access safe</td></tr><tr><td>onUnmounted</td><td>onUnmounted(callback)</td><td>Called before unmount; cleanup timers and subscriptions</td></tr><tr><td>onBeforeMount</td><td>onBeforeMount(callback)</td><td>Called just before mounting begins</td></tr><tr><td>onUpdated</td><td>onUpdated(callback)</td><td>Called after DOM update from reactive state change</td></tr><tr><td>onBeforeUpdate</td><td>onBeforeUpdate(callback)</td><td>Called before DOM update when state changes</td></tr><tr><td>onActivated</td><td>onActivated(callback)</td><td>Called when kept-alive component is reactivated</td></tr><tr><td>onDeactivated</td><td>onDeactivated(callback)</td><td>Called when kept-alive component is deactivated</td></tr><tr><td>onErrorCaptured</td><td>onErrorCaptured(callback)</td><td>Called when child error propagates; return false to stop</td></tr></table><h3>Template Directives</h3><table><tr><th>Directive</th><th>Shorthand</th><th>Description</th></tr><tr><td>v-bind</td><td>:attr</td><td>Dynamically binds attribute, prop, class, or style</td></tr><tr><td>v-model</td><td>N/A</td><td>Two-way data binding on inputs and custom components</td></tr><tr><td>v-for</td><td>N/A</td><td>Renders list from array or object; requires :key</td></tr><tr><td>v-if / v-else / v-else-if</td><td>N/A</td><td>Conditional rendering with full branch support</td></tr><tr><td>v-show</td><td>N/A</td><td>Toggles visibility via display: none CSS property</td></tr><tr><td>v-on</td><td>@event</td><td>Attaches event listener with modifiers: .prevent, .stop, .once</td></tr><tr><td>v-slot</td><td>#name</td><td>Named or scoped slot content with destructuring</td></tr><tr><td>v-pre</td><td>N/A</td><td>Skips compilation for raw mustache output</td></tr><tr><td>v-once</td><td>N/A</td><td>Renders once and never re-renders</td></tr><tr><td>v-memo</td><td>N/A</td><td>Memoizes sub-tree based on deps (Vue 3.2+)</td></tr></table><h3>Component Model</h3><p>Vue components are Single-File Components (.vue) with template, script setup, and scoped style sections. Props declared with defineProps receive parent data. Events emitted via defineEmits notify parent. Slots enable content projection with named slots and scoped slots for child-to-parent data. Provide/inject enables DI across any descendant depth. Composition API offers better logic organization, TypeScript support, and code reuse via composables compared to Options API.</p><pre>&lt;script setup&gt; import { ref, computed, onMounted } from &apos;vue&apos;; const count = ref(0); const doubled = computed(() => count.value * 2); const emit = defineEmits([&apos;increment&apos;]); onMounted(() => console.log(&apos;mounted&apos;)); &lt;/script&gt; &lt;template&gt; &lt;button @click=&quot;emit(&apos;increment&apos;, count++)&quot;&gt;{{ count }} doubled is {{ doubled }}&lt;/button&gt; &lt;/template&gt;</pre><h3>Ecosystem</h3><ul><li><b>Meta-Framework:</b> Nuxt (SSR, SSG, file routing, auto-imports, server routes)</li><li><b>State:</b> Pinia (typed modular stores with devtools and plugins)</li><li><b>Routing:</b> Vue Router (nested routes, guards, lazy loading)</li><li><b>Build:</b> Vite (fast HMR with native ESM, plugin ecosystem)</li><li><b>Testing:</b> Vitest, Vue Test Utils, Playwright</li></ul>"},{"category":"Web Development","title":"WebAssembly","tags":["web","binary","performance","compiled","WASM","browser"],"summary":"WebAssembly (WASM) is a binary instruction format for stack-based virtual machines, enabling near-native performance in browsers.","content":"<h3>Core Concepts</h3><p>WebAssembly (WASM) is a binary instruction format standardized by W3C in 2017. It provides near-native performance in browsers by compiling languages like C, C++, Rust, Go, and Zig to a compact binary format. WASM runs in a sandboxed virtual machine with linear memory, limited only to explicit imports. Designed as a compilation target, not a language for direct authoring (though the .wat text format exists via S-expressions). WASM achieves predictable performance through low-level binary encoding and straightforward compilation to native machine code.</p><h3>API Reference</h3><table><tr><th>API</th><th>Signature</th><th>Description</th></tr><tr><td>WebAssembly.instantiate</td><td>instantiate(bytes, importObject)</td><td>Compiles and instantiates WASM binary; returns {module, instance}</td></tr><tr><td>WebAssembly.instantiateStreaming</td><td>instantiateStreaming(source, importObject)</td><td>Compiles and instantiates via streaming from fetch Response</td></tr><tr><td>WebAssembly.compile</td><td>compile(bytes)</td><td>Compiles WASM binary into a Module; returns Promise</td></tr><tr><td>WebAssembly.compileStreaming</td><td>compileStreaming(source)</td><td>Asynchronously compiles WASM from Response stream</td></tr><tr><td>WebAssembly.Module</td><td>new Module(bytes)</td><td>Synchronously compiles WASM binary (blocking call)</td></tr><tr><td>WebAssembly.Instance</td><td>new Instance(module, importObject)</td><td>Synchronously instantiates a Module with imports</td></tr><tr><td>WebAssembly.Global</td><td>new Global(descriptor, value)</td><td>Creates mutable global variable for WASM and JS</td></tr><tr><td>WebAssembly.Table</td><td>new Table(descriptor)</td><td>Array-like structure for function references or externref</td></tr><tr><td>WebAssembly.Memory</td><td>new Memory(descriptor)</td><td>Linear memory instance; grows via memory.grow (1 page = 64KB)</td></tr><tr><td>WebAssembly.CompileError</td><td>CompileError</td><td>Indicates WASM compilation error (invalid binary)</td></tr><tr><td>WebAssembly.LinkError</td><td>LinkError</td><td>Indicates module linking error (missing or mismatched imports)</td></tr><tr><td>WebAssembly.RuntimeError</td><td>RuntimeError</td><td>Indicates runtime trap (out of bounds, divide by zero, unreachable)</td></tr></table><h3>Memory Model</h3><p>WASM linear memory is a contiguous byte array starting at offset 0. Sandboxed: module cannot access outside allocated memory. JS reads/writes via TypedArray views: new Uint8Array(memory.buffer, offset, length). Memory grows via memory.grow(pages) where 1 page = 64KB. Multi-memory proposal allows separate memory spaces. Memory can be shared between multiple instances for inter-module communication.</p><h3>Import/Export Mechanism</h3><p>WASM modules define imports (functions, globals, memories, tables from JS) and exports (functions, globals, memories, tables exposed to JS). Imports are passed via the importObject parameter as a nested object matching module import namespaces. JS can provide functions for WASM to call, enabling DOM access, I/O, and other host capabilities.</p><h4>Usage Pattern</h4><pre>const response = await fetch(&apos;module.wasm&apos;); const { instance } = await WebAssembly.instantiateStreaming(response, { imports: { consoleLog: (ptr, len) => { const bytes = new Uint8Array(instance.exports.memory.buffer, ptr, len); console.log(new TextDecoder().decode(bytes)); } } }); instance.exports.main();</pre><h3>WAT Text Format</h3><p>.wat uses S-expressions: (module (func $add (param i32 i32) (result i32) local.get 0 local.get 1 i32.add) (export &quot;add&quot; (func $add))). Each instruction operates on a stack: local.get pushes locals, i32.add pops two, pushes sum. Control flow: block, loop, if/else/end, br, br_if, return.</p><h3>WASI (WebAssembly System Interface)</h3><p>WASI extends WASM outside the browser with system APIs: file I/O, networking, clocks, random. Runtimes: Wasmtime (Fastly), Wasmer, WAMR. WASI Preview 1 is stable. Preview 2 introduces components and capability-based security via wit.</p><h3>Advanced Features</h3><ul><li><b>GC Proposal (2024):</b> Direct support for garbage collected languages (Kotlin, Dart, Java)</li><li><b>Component Model:</b> Interoperability layer for composable modules with WIT type definitions</li><li><b>SIMD:</b> 128-bit vector operations for parallel computation (auto-vectorization, multimedia)</li><li><b>Multi-Value:</b> Functions can return multiple values (tuples) rather than single result</li><li><b>Tail Call:</b> Proper tail call optimization for recursive functional patterns</li><li><b>Exception Handling:</b> try/catch/throw for language interop without custom unwinding</li></ul><h3>Use Cases</h3><ul><li><b>Games:</b> Unity, Unreal Engine compile to WASM for browser gaming</li><li><b>Media:</b> FFmpeg.wasm, Squoosh for in-browser image/video processing</li><li><b>Design:</b> Figma, AutoCAD web use WASM for high-performance rendering</li><li><b>Databases:</b> SQLite compiled to WASM for browser-based data storage</li><li><b>AI/ML:</b> TensorFlow.js WebAssembly backend, ONNX Runtime Web</li></ul>"}];

// ===== CORE =====
const $ = id => document.getElementById(id);
const out = $('out'), body = $('body'), inp = $('inp'), cur = $('cur');
let hist = [], hIdx = -1, curInp = '', startTime = Date.now();
let devdocs = null, devdocsIdx = {};
let modes = { note: false, game: false, matrix: false };

function pr(html, cls) {
  const d = document.createElement('div'); d.className = 'ln' + (cls ? ' ' + cls : '');
  if (typeof html === 'string') d.innerHTML = html; else d.appendChild(html);
  out.appendChild(d); body.scrollTop = body.scrollHeight;
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function promptHtml(path) {
  path = path || '/home/user';
  if (path === '/home/user') path = '~';
  return '<span class="p"><span class="at">devweb</span><span class="path">:' + esc(path) + '</span><span class="mark">$</span> </span>';
}
function prCmd(cmd) { pr(promptHtml() + esc(cmd)); }

function banner() {
  pr('');
  pr('  <b>devweb</b> <span class="d">v3.0 &mdash; Knowledge Terminal</span>');
  pr('  <span class="d">Minimal. Monochrome. Maximum capability.</span>');
  pr('  <span class="d">Type <b>help</b> or <b>help --full</b> for commands</span>');
  pr('');
}

// ===== CLOCK =====
setInterval(() => { $('st').textContent = new Date().toLocaleTimeString(); }, 1000);
$('st').textContent = new Date().toLocaleTimeString();

// ===== COMMANDS =====
const C = {};
const cwd = '/home/user';

C.help = function(a) {
  const full = a.includes('--full') || a.includes('-a');
  pr('');
  pr('  <b>devweb Commands</b> <span class="d">(' + Object.keys(C).length + ' total)</span>');
  pr('  <span class="d">' + '-'.repeat(50) + '</span>');
  const cats = {
    'Basic': ['help','clear','echo','date','whoami','uptime','history','neofetch','cal'],
    'Filesystem': ['ls','cd','pwd','cat','touch','mkdir'],
    'Documentation': ['docs','search','man'],
    'Code': ['code','detect'],
    'Algorithms': ['algo'],
    'Math & Conversion': ['calc','units','base'],
    'Text Tools': ['base64','rot13','hex','rev','wc','case'],
    'Random & Games': ['random','snake','guess','coin','dice'],
    'Utilities': ['timer','note','weather','curl','json','ping','matrix'],
    'System': ['theme','reload','export','banner']
  };
  Object.keys(cats).forEach(c => {
    pr('  <span class="i">' + c + '</span>');
    cats[c].forEach(cmd => {
      const desc = cmdHelp[cmd] || '';
      pr('    <b>' + cmd + '</b> <span class="d">' + desc + '</span>');
    });
  });
  pr('');
};

const cmdHelp = {
  help:'Show help', clear:'Clear screen', echo:'Print text', date:'Show date/time',
  whoami:'Show user', uptime:'Show session uptime', history:'Show command history',
  neofetch:'System info', cal:'Show calendar', ls:'List directory', cd:'Change directory',
  pwd:'Print working directory', cat:'View documentation', touch:'Create file', mkdir:'Create directory',
  docs:'Browse DevDocs', search:'Search docs', man:'Manual page',
  code:'Code analysis mode', detect:'Detect programming language',
  algo:'Algorithm visualization', calc:'Calculator', units:'Unit conversion',
  base:'Number base converter', base64:'Base64 encode/decode', rot13:'ROT13 cipher',
  hex:'Hex dump', rev:'Reverse text', wc:'Word/char/line count', case:'Change text case',
  random:'Random values', snake:'Play Snake game', guess:'Guess the number',
  coin:'Coin flip', dice:'Roll dice',
  timer:'Timer/stopwatch', note:'Take notes', weather:'Show weather',
  curl:'Fetch URL', json:'Format/validate JSON', ping:'Ping simulation',
  matrix:'Matrix rain effect', theme:'Change theme', reload:'Reload DevDocs',
  export:'Export doc info', banner:'Show banner'
};

C.clear = function() { out.innerHTML = ''; };
C.echo = function(a) { pr(esc(a.join(' '))); };
C.date = function() { pr(new Date().toString()); };
C.whoami = function() { pr('devweb'); };
C.pwd = function() { pr(cwd); };
C.banner = function() { banner(); };
C.uptime = function() {
  const d = Date.now() - startTime;
  const s = Math.floor(d / 1000), m = Math.floor(s / 60), h = Math.floor(m / 60);
  pr('up ' + h + ':' + String(m % 60).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0'));
};
C.history = function() { hist.forEach((c,i) => pr('  ' + (i+1) + '  ' + esc(c))); };
C.detect = function(a) {
  if (!a.length) { pr('Usage: detect <code or file> or pipe from code mode', 'w'); return; }
  const lang = detectLang(a.join(' '));
  pr('Detected language: <b>' + lang + '</b>', 's');
};
C.cal = function() {
  const now = new Date(), y = now.getFullYear(), m = now.getMonth();
  const first = new Date(y, m, 1).getDay(), days = new Date(y, m + 1, 0).getDate();
  const months = 'January February March April May June July August September October November December'.split(' ');
  pr('  ' + months[m] + ' ' + y);
  pr('  Su Mo Tu We Th Fr Sa');
  let line = '   '.repeat(first);
  for (let d = 1; d <= days; d++) {
    const today = (d === now.getDate()) ? '<b>' + String(d).padStart(2) + '</b>' : String(d).padStart(2);
    line += today + ' ';
    if ((first + d) % 7 === 0 || d === days) { pr('  ' + line); line = ''; }
  }
};

// ===== CALCULATOR =====
C.calc = function(a) {
  if (!a.length) { pr('Usage: calc <expression>', 'w'); return; }
  try {
    const expr = a.join(' ');
    // Safe eval - only allow math expressions
    const sanitized = expr.replace(/[^0-9+*\/.()%^ \t-]/g, '');
    if (!sanitized) { pr('Invalid expression', 'e'); return; }
    const result = Function('"use strict"; return (' + sanitized + ')')();
    pr(esc(expr) + ' = <b>' + result + '</b>');
  } catch(e) { pr('Error: ' + e.message, 'e'); }
};

// ===== UNIT CONVERTER =====
C.units = function(a) {
  if (a.length < 3) {
    pr('Usage: units <value> <from> <to>', 'w');
    pr('  <span class="d">Supported: length (m,cm,mm,km,in,ft,yd,mi), weight (kg,g,lb,oz), temp (c,f,k), speed (kmh,mph,ms,kn)</span>');
    return;
  }
  const val = parseFloat(a[0]);
  if (isNaN(val)) { pr('Invalid number', 'e'); return; }
  const from = a[1].toLowerCase(), to = a[2].toLowerCase();
  
  const length = { m:1, cm:100, mm:1000, km:0.001, in:39.3701, ft:3.28084, yd:1.09361, mi:0.000621371 };
  const weight = { kg:1, g:1000, mg:1000000, lb:2.20462, oz:35.274 };
  const speed = { kmh:1, mph:0.621371, ms:0.277778, kn:0.539957 };
  
  function convertLength(v, f, t) {
    if (!length[f] || !length[t]) return null;
    return v / length[f] * length[t];
  }
  function convertWeight(v, f, t) {
    if (!weight[f] || !weight[t]) return null;
    return v / weight[f] * weight[t];
  }
  function convertTemp(v, f, t) {
    let c;
    if (f === 'c') c = v;
    else if (f === 'f') c = (v - 32) * 5/9;
    else if (f === 'k') c = v - 273.15;
    else return null;
    if (t === 'c') return c;
    if (t === 'f') return c * 9/5 + 32;
    if (t === 'k') return c + 273.15;
    return null;
  }
  function convertSpeed(v, f, t) {
    if (!speed[f] || !speed[t]) return null;
    return v / speed[f] * speed[t];
  }
  
  let result = null, unitType = '';
  if (length[from] && length[to]) { result = convertLength(val, from, to); unitType = 'length'; }
  else if (weight[from] && weight[to]) { result = convertWeight(val, from, to); unitType = 'weight'; }
  else if (['c','f','k'].includes(from) && ['c','f','k'].includes(to)) { result = convertTemp(val, from, to); unitType = 'temperature'; }
  else if (speed[from] && speed[to]) { result = convertSpeed(val, from, to); unitType = 'speed'; }
  
  if (result === null) { pr('Cannot convert ' + from + ' to ' + to, 'e'); return; }
  
  const formatted = result < 0.001 || result > 999999 ? result.toExponential(6) : result.toFixed(6).replace(/.?0+$/, '');
  pr(esc(val) + ' ' + esc(from) + ' = <b>' + formatted + '</b> ' + esc(to) + ' <span class="d">(' + unitType + ')</span>');
};

// ===== NUMBER BASE =====
C.base = function(a) {
  if (a.length < 2) { pr('Usage: base <number> <from_base> [to_base]', 'w'); return; }
  const from = parseInt(a[1]);
  if (from < 2 || from > 36) { pr('Base must be 2-36', 'e'); return; }
  const to = a[2] ? parseInt(a[2]) : 10;
  if (to < 2 || to > 36) { pr('Base must be 2-36', 'e'); return; }
  const dec = parseInt(a[0], from);
  if (isNaN(dec)) { pr('Invalid number for base ' + from, 'e'); return; }
  pr(esc(a[0]) + '<sub>' + from + '</sub> = <b>' + dec.toString(to).toUpperCase() + '</b><sub>' + to + '</sub>');
  pr('  <span class="d">dec: ' + dec + ' | bin: ' + dec.toString(2) + ' | oct: ' + dec.toString(8) + ' | hex: ' + dec.toString(16).toUpperCase() + '</span>');
};

// ===== TEXT UTILITIES =====
C.base64 = function(a) {
  const op = a[0], text = a.slice(1).join(' ');
  if (!op || !text) { pr('Usage: base64 <encode|decode> <text>', 'w'); return; }
  try {
    if (op === 'encode') pr(btoa(text));
    else if (op === 'decode') pr(atob(text));
    else pr('Unknown op: ' + op + ' (use encode/decode)', 'e');
  } catch(e) { pr('Error: ' + e.message, 'e'); }
};

C.rot13 = function(a) {
  const text = a.join(' ');
  if (!text) { pr('Usage: rot13 <text>', 'w'); return; }
  pr(text.replace(/[a-zA-Z]/g, c => String.fromCharCode(c <= 'Z' ? (c.charCodeAt(0) - 65 + 13) % 26 + 65 : (c.charCodeAt(0) - 97 + 13) % 26 + 97)));
};

C.hex = function(a) {
  const text = a.join(' ');
  if (!text) { pr('Usage: hex <text>', 'w'); return; }
  pr(Array.from(text).map(c => c.charCodeAt(0).toString(16).padStart(2, '0')).join(' '));
};

C.rev = function(a) { pr(esc(a.join(' ').split('').reverse().join(''))); };

C.wc = function(a) {
  const text = a.join(' ');
  if (!text) { pr('Usage: wc <text>', 'w'); return; }
  pr('  chars: ' + text.length + ' | words: ' + (text.match(/\S+/g) || []).length + ' | lines: ' + (text.match(/\n/g) || []).length + 1);
};

C.case = function(a) {
  const op = a[0], text = a.slice(1).join(' ');
  if (!op || !text) { pr('Usage: case <upper|lower|title|sentence|toggle> <text>', 'w'); return; }
  let r;
  switch(op) {
    case 'upper': r = text.toUpperCase(); break;
    case 'lower': r = text.toLowerCase(); break;
    case 'title': r = text.replace(/\w\S*/g, w => w[0].toUpperCase() + w.slice(1).toLowerCase()); break;
    case 'sentence': r = text.charAt(0).toUpperCase() + text.slice(1).toLowerCase(); break;
    case 'toggle': r = text.replace(/[a-zA-Z]/g, c => c === c.toLowerCase() ? c.toUpperCase() : c.toLowerCase()); break;
    default: pr('Unknown op: ' + op, 'e'); return;
  }
  pr(r);
};

// ===== RANDOM =====
C.random = function(a) {
  const type = a[0];
  if (!type) { pr('Usage: random <password|number|uuid|hex|bytes> [length]', 'w'); return; }
  const len = parseInt(a[1]) || 16;
  if (type === 'number') {
    const max = parseInt(a[1]) || 100, min = parseInt(a[2]) || 0;
    pr(Math.floor(Math.random() * (max - min + 1)) + min);
  } else if (type === 'password') {
    const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=[]{}|;:,.<>?';
    let pwd = '';
    for (let i = 0; i < len; i++) pwd += chars.charAt(Math.floor(Math.random() * chars.length));
    pr(pwd);
  } else if (type === 'uuid') {
    pr('xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { const r = Math.random() * 16 | 0; return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16); }));
  } else if (type === 'hex') {
    pr(Array.from({length: len}, () => Math.floor(Math.random() * 16).toString(16)).join(''));
  } else if (type === 'bytes') {
    pr(Array.from({length: len}, () => Math.floor(Math.random() * 256)).map(b => b.toString(16).padStart(2, '0')).join(' '));
  } else pr('Unknown: ' + type, 'e');
};

C.coin = function() { pr(Math.random() < 0.5 ? 'Heads' : 'Tails'); };
C.dice = function(a) {
  const n = parseInt(a[0]) || 1;
  const rolls = Array.from({length: Math.min(n, 10)}, () => Math.floor(Math.random() * 6) + 1);
  pr(rolls.join(' ') + '  <span class="d">(total: ' + rolls.reduce((a,b)=>a+b, 0) + ')</span>');
};

// ===== FILESYSTEM SIMULATION =====
const fsStore = {
  '': { type:'dir', children: ['home','docs','tmp'] },
  'home': { type:'dir', children: ['user'] },
  'home/user': { type:'dir', children: ['docs.txt','readme.md','projects'] },
  'home/user/docs.txt': { type:'file', content:'devweb documentation system\nType help to get started.' },
  'home/user/readme.md': { type:'file', content:'# devweb\nMinimal terminal encyclopedia.\nPowered by DevDocs.io + built-in entries.' },
  'home/user/projects': { type:'dir', children: [] },
  'docs': { type:'dir', children: [] },
  'tmp': { type:'dir', children: [] }
};

function resolvePath(p) {
  if (!p || p === '~') return '/home/user';
  if (p === '.') return cwd;
  if (p === '/') return '';
  if (p.startsWith('/')) return p.replace(/\/+$/, '');
  if (p.startsWith('./')) p = p.slice(2);
  if (p.startsWith('~')) p = '/home/user' + p.slice(1);
  const parts = (cwd + '/' + p).split('/').filter(Boolean);
  const result = [];
  for (const part of parts) {
    if (part === '..') result.pop();
    else if (part !== '.') result.push(part);
  }
  return '/' + result.join('/');
}

C.ls = function(a) {
  const target = a[0] || '.';
  const dir = target === '.' ? cwd : resolvePath(target);
  const entry = fsStore[dir];
  if (!entry || entry.type !== 'dir') {
    // Try resolving as DevDocs slug
    if (devdocs) {
      const slug = dir.replace(/^\//, '');
      const match = devdocs.find(d => d.slug === slug || d.name.toLowerCase() === slug);
      if (match) { C.docs([match.slug]); return; }
      const matches = devdocs.filter(d => d.slug.indexOf(slug) >= 0 || d.name.toLowerCase().indexOf(slug.toLowerCase()) >= 0);
      if (matches.length) {
        matches.slice(0, 20).forEach(m => pr('  <span class="s">' + esc(m.slug) + '</span>  <span class="d">' + esc(m.name) + ' v' + esc(m.version||m.release||'') + '</span>'));
        if (matches.length > 20) pr('  <span class="d">... and ' + (matches.length - 20) + ' more</span>');
        return;
      }
    }
    pr('ls: ' + esc(target) + ': No such directory', 'e'); return;
  }
  if (!entry.children || !entry.children.length) { pr(''); return; }
  entry.children.forEach(ch => {
    const fullPath = (dir + '/' + ch).replace(/\/+/g, '/').replace(/\/$/, '');
    const e = fsStore[fullPath];
    if (e && e.type === 'dir') pr('  <b>' + esc(ch) + '/</b>');
    else pr('  ' + esc(ch));
  });
};

C.cd = function(a) {
  const target = a[0] || '/home/user';
  if (target === '~' || target === '') { cwd = '/home/user'; updatePrompt(); return; }
  const resolved = resolvePath(target);
  const entry = fsStore[resolved];
  if (entry && entry.type === 'dir') { cwd = resolved; updatePrompt(); }
  else pr('cd: ' + esc(target) + ': No such directory', 'e');
};

C.touch = function(a) {
  if (!a.length) { pr('Usage: touch <filename>', 'w'); return; }
  const path = resolvePath(a[0]);
  if (fsStore[path]) { pr(path + ' already exists', 'w'); return; }
  fsStore[path] = { type: 'file', content: '' };
  const parent = path.substring(0, path.lastIndexOf('/')) || '';
  if (fsStore[parent] && fsStore[parent].children) fsStore[parent].children.push(a[0].split('/').pop());
  pr('Created ' + a[0], 's');
};

C.mkdir = function(a) {
  if (!a.length) { pr('Usage: mkdir <dirname>', 'w'); return; }
  const path = resolvePath(a[0]);
  if (fsStore[path]) { pr(path + ' already exists', 'w'); return; }
  fsStore[path] = { type: 'dir', children: [] };
  const parent = path.substring(0, path.lastIndexOf('/')) || '';
  if (fsStore[parent] && fsStore[parent].children) fsStore[parent].children.push(a[0].split('/').pop());
  pr('Created directory ' + a[0], 's');
};

C.cat = function(a) {
  if (!a.length) { pr('Usage: cat <path|doc-name>', 'w'); return; }
  // Try filesystem
  const path = resolvePath(a[0]);
  const entry = fsStore[path];
  if (entry && entry.type === 'file') { pr(esc(entry.content)); return; }
  
  // Try built-in
  const slug = a[0].toLowerCase();
  const builtin = BUILTIN.filter(e => e.title.toLowerCase() === slug);
  if (builtin.length) {
    pr('  <span class="docs-cat">' + esc(builtin[0].category) + '</span>');
    pr('  <span class="docs-title">' + esc(builtin[0].title) + '</span>');
    pr('  <span class="docs-desc">' + esc(builtin[0].summary) + '</span>');
    pr('  <span class="d">Tags: ' + builtin[0].tags.join(', ') + '</span>');
    pr('');
    const text = builtin[0].content.replace(/<br\s*\/?>/g, '\n').replace(/<[^>]+>/g, '');
    text.split('\n').forEach(l => pr(esc(l)));
    return;
  }
  
  // Try DevDocs
  if (devdocs) {
    const doc = devdocs.find(d => d.slug === slug || d.name.toLowerCase() === slug);
    if (doc) { C.docs([doc.slug]); return; }
  }
  pr('cat: ' + esc(a[0]) + ': No such file', 'e');
};

// ===== DEVDOCS =====
function fetchCors(url) {
  // Try direct first; fallback to CORS proxies for file:// protocol
  return fetch(url).catch(function() {
    var proxies = [
      'https://api.allorigins.win/raw?url=',
      'https://corsproxy.io/?url=',
    ];
    function tryProxy(i) {
      if (i >= proxies.length) throw new Error('All proxies failed');
      return fetch(proxies[i] + encodeURIComponent(url))
        .then(function(r) {
          // allorigins wraps in {contents: "..."} sometimes
          if (r.headers.get('content-type') && r.headers.get('content-type').indexOf('application/json') >= 0) return r.json();
          return r.text().then(function(t) {
            try { return JSON.parse(t); } catch(e) { return JSON.parse(JSON.parse(t).contents); }
          });
        })
        .catch(function() { return tryProxy(i + 1); });
    }
    return tryProxy(0);
  }).then(function(r) { return r; });
}

function fetchDevDocs() {
  pr('  <span class="d">Loading DevDocs manifest...</span>');
  fetchCors('https://devdocs.io/docs.json')
    .then(function(data) {
      devdocs = data;
      var unique = new Set(data.map(function(d) { return d.name; }));
      var byType = {};
      data.forEach(function(d) { var t = d.type || 'other'; if (!byType[t]) byType[t] = []; byType[t].push(d); });
      $('sd').textContent = 'docs: ' + unique.size + ' titles (' + data.length + ' v)';
      pr('  <span class="s">Loaded ' + data.length + ' doc versions (' + unique.size + ' unique)</span>');
      pr('  <span class="d">Categories: ' + Object.keys(byType).join(', ') + '</span>');
    })
    .catch(function(err) {
      pr('  <span class="e">DevDocs: ' + err.message + '</span>');
      pr('  <span class="d">Using ' + BUILTIN.length + ' built-in entries as fallback</span>');
    });
}

C.docs = function(a) {
  if (!devdocs) { pr('DevDocs not loaded. Type <b>reload</b> to fetch.', 'w'); return; }
  if (!a.length) {
    const unique = new Set(); const byType = {};
    devdocs.forEach(d => { unique.add(d.name); const t = d.type||'other'; if(!byType[t])byType[t]=0; byType[t]++; });
    pr('');
    pr('  <b>DevDocs Documentation</b> <span class="d">(' + unique.size + ' titles)</span>');
    pr('  <span class="d">' + '-'.repeat(50) + '</span>');
    const sorted = [...unique].sort();
    sorted.forEach(name => {
      const versions = devdocs.filter(d => d.name === name);
      pr('  <span class="s">' + esc(name) + '</span> <span class="d">(' + versions.length + ' v, latest: ' + esc(versions[0].version||versions[0].release||'') + ')</span>');
    });
    pr('');
    pr('  <span class="d">Usage: docs &lt;slug&gt; &mdash; view doc entries</span>');
    return;
  }
  
  const slug = a[0];
  let doc = devdocs.find(d => d.slug === slug);
  if (!doc) doc = devdocs.find(d => d.name.toLowerCase() === slug.toLowerCase());
  if (!doc) {
    const matches = devdocs.filter(d => d.name.toLowerCase().indexOf(slug.toLowerCase()) >= 0);
    if (matches.length) {
      pr('Multiple matches:');
      matches.forEach(m => pr('  <span class="i">' + esc(m.slug) + '</span> <span class="d">' + esc(m.name) + '</span>'));
      return;
    }
    pr('Doc not found: ' + esc(slug), 'e'); return;
  }
  
  pr('  <span class="docs-cat">' + esc(doc.type||'doc') + '</span>');
  pr('  <span class="docs-title">' + esc(doc.name) + ' ' + esc(doc.version||doc.release||'') + '</span>');
  if (doc.links && doc.links.home) pr('  <span class="d">' + esc(doc.links.home) + '</span>');
  pr('  <span class="d">' + esc(doc.slug) + ' | ' + (doc.db_size ? (doc.db_size/1024/1024).toFixed(1)+'MB' : 'N/A') + '</span>');
  pr('');
  
  pr('  <span class="d">Loading index...</span>');
  fetchCors('https://devdocs.io/docs/' + doc.slug + '/index.json')
    .then(function(idx) {
      devdocsIdx[doc.slug] = idx;
      pr('  <span class="s">' + idx.entries.length + ' entries loaded</span>');
      var byType = {};
      idx.entries.forEach(function(e) { var t = e.type||'other'; if(!byType[t])byType[t]=[]; byType[t].push(e); });
      Object.keys(byType).sort().forEach(function(t) {
        pr('  <span class="i">' + esc(t) + '</span> <span class="d">(' + byType[t].length + ')</span>');
        byType[t].slice(0, 20).forEach(function(e) { pr('    <span class="s">' + esc(e.name) + '</span> <span class="d">' + esc(e.path||'') + '</span>'); });
        if (byType[t].length > 20) pr('    <span class="d">... and ' + (byType[t].length - 20) + ' more</span>');
      });
      pr('');
      pr('  <span class="d">Open: https://devdocs.io/' + esc(doc.slug) + '/</span>');
    })
    .catch(function(err) { pr('  <span class="e">Failed: ' + err.message + '</span>'); });
};

C.search = function(a) {
  const q = a.join(' ').toLowerCase();
  if (!q) { pr('Usage: search <query>', 'w'); return; }
  
  const builtin = BUILTIN.filter(e => e.title.toLowerCase().indexOf(q) >= 0 || e.summary.toLowerCase().indexOf(q) >= 0 || e.tags.some(t => t.indexOf(q) >= 0));
  if (builtin.length) {
    pr('');
    pr('  <b>Built-in (' + builtin.length + ')</b>');
    builtin.forEach(e => pr('  <span class="docs-cat">' + esc(e.category) + '</span>  <span class="i">' + esc(e.title) + '</span> <span class="d">' + esc(e.summary.slice(0,80)) + '...</span>'));
  }
  
  if (devdocs) {
    const matches = devdocs.filter(d => d.name.toLowerCase().indexOf(q) >= 0 || d.slug.indexOf(q) >= 0);
    if (matches.length) {
      pr('');
      pr('  <b>DevDocs (' + matches.length + ')</b>');
      const seen = new Set();
      matches.forEach(d => { if (!seen.has(d.name)) { seen.add(d.name); pr('  <span class="s">' + esc(d.name) + '</span> <span class="d">(' + esc(d.slug) + ')</span>'); } });
    }
  }
  
  if (!builtin.length && (!devdocs || !devdocs.some(d => d.name.toLowerCase().indexOf(q) >= 0)))
    pr('No results for "' + esc(q) + '"', 'w');
};
